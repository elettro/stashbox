<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stashbox Does Dylan | The Man In Me</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: black; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="container" class="min-h-screen w-full relative overflow-hidden bg-black text-white font-sans">
        <canvas id="visualizer" class="absolute inset-0 block"></canvas>
        
        <!-- Top Left: Titles -->
        <div class="absolute top-8 left-8 z-10 select-none pointer-events-none">
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter text-yellow-400 drop-shadow-[0_4px_4px_rgba(0,0,0,0.9)] uppercase">
                STASHBOX DOES DYLAN
            </h1>
            <p class="text-xl md:text-2xl font-bold mt-2 text-red-500 drop-shadow-[0_2px_2px_rgba(0,0,0,0.9)] uppercase tracking-tight">
                THE MAN IN ME (BY BOB DYLAN)
            </p>
        </div>

        <!-- Top Right: Share -->
        <div class="absolute top-8 right-8 z-30">
            <button id="shareButton" class="p-3 bg-green-600 hover:bg-green-500 rounded-full transition-all duration-300 shadow-2xl group border border-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-white group-hover:scale-110"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
            </button>
        </div>

        <!-- Bottom: YouTube Link -->
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-30 text-center">
            <a href="https://www.youtube.com/watch?v=OaNd1lYS1Rg" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 px-8 py-4 bg-black/50 hover:bg-black/80 backdrop-blur-xl rounded-full border border-white/20 text-sm font-black tracking-widest uppercase hover:border-yellow-400 transition-all duration-500 shadow-2xl">
                <span>Watch on YouTube</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            </a>
        </div>

        <!-- Initial Start Overlay -->
        <div id="overlay" class="absolute inset-0 z-40 flex items-center justify-center bg-black/70 backdrop-blur-md cursor-pointer transition-opacity duration-1000">
            <div class="text-center group">
                <div class="w-20 h-20 mb-6 mx-auto border-4 border-yellow-400 border-t-transparent rounded-full animate-spin group-hover:scale-110 transition-transform"></div>
                <p class="text-3xl font-black uppercase tracking-[0.3em] text-white group-hover:text-yellow-400 transition-colors">Click to Vibe</p>
            </div>
        </div>

        <!-- Paused Indicator -->
        <div id="pausedOverlay" class="absolute inset-0 z-20 hidden items-center justify-center bg-black/30 backdrop-blur-sm pointer-events-none">
            <p class="text-4xl font-black uppercase tracking-[0.5em] text-white/50">PAUSED</p>
        </div>
    </div>

    <script>
        // Set this to "song.m4a" once you've named your file
        const AUDIO_URL = "song.m4a"; 

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            precision mediump float;
            uniform vec2 uResolution;
            uniform float uTime;
            uniform sampler2D uData;
            uniform vec2 uMouse;
            varying vec2 vUv;

            vec2 hash(vec2 p) {
                p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
                return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
            }

            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                vec2 u = f * f * (3.0 - 2.0 * f);
                return mix(mix(dot(hash(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0)),
                               dot(hash(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0)), u.x),
                           mix(dot(hash(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0)),
                               dot(hash(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0)), u.x), u.y);
            }

            float getSmokeText(vec2 p, float time, float bass) {
                float cycle = mod(time, 6.0);
                float phase = smoothstep(0.0, 2.0, cycle) - smoothstep(4.0, 6.0, cycle);
                float drift = (cycle > 2.0) ? (cycle - 2.0) * 0.4 : 0.0;
                vec2 sp = p;
                sp.y -= drift;
                float n = noise(sp * 4.0 + time * 0.5) * 0.1;
                sp += n;
                float d = 100.0;
                d = min(d, length(sp - vec2(-0.4, 0.0)) - 0.15);
                d = min(d, length(sp - vec2(0.0, 0.0)) - 0.12);
                d = min(d, length(sp - vec2(0.4, 0.0)) - 0.15);
                float blur = 0.05 + drift * 0.5 + (1.0 - phase) * 0.2;
                float alpha = smoothstep(blur, -blur, d);
                float turbulence = noise(p * 8.0 - time) * 0.5 + 0.5;
                return alpha * phase * (0.4 + turbulence * 0.6);
            }

            void main() {
                float bass = texture2D(uData, vec2(0.02, 0.0)).r;
                float pulse = pow(bass, 2.2);
                float aspect = uResolution.x / uResolution.y;
                
                // Ken Burns
                float zoom = 1.0 + sin(uTime * 0.1) * 0.12;
                vec2 panOffset = vec2(sin(uTime * 0.08), cos(uTime * 0.07)) * 0.2;
                
                vec2 p = (vUv - 0.5) * 2.0;
                p.x *= aspect;
                p *= zoom;
                p += panOffset;

                // Mouse Vortex
                vec2 m = (uMouse - 0.5) * 2.0;
                m.x *= aspect;
                float mouseStrength = smoothstep(0.8, 0.0, length(p - m));
                float swirl = mouseStrength * 5.0;
                vec2 vp = p - m;
                vp = vec2(vp.x * cos(swirl) - vp.y * sin(swirl), vp.x * sin(swirl) + vp.y * cos(swirl));
                vp *= (1.0 + mouseStrength * 2.5);
                vec2 flowP = vp + m;
                flowP *= (2.5 - pulse * 0.5);

                vec2 flow = flowP;
                float t = uTime * 0.4;
                for(int i = 0; i < 7; i++) {
                    float fi = float(i);
                    flow.x += (0.5 + pulse) * sin(flow.y * 1.2 + t + fi);
                    flow.y += (0.4 + pulse) * cos(flow.x * 0.8 - t * 0.7 + fi);
                }

                vec3 rRed = vec3(0.85, 0.05, 0.05);
                vec3 rGold = vec3(1.0, 0.8, 0.0);
                vec3 rGreen = vec3(0.0, 0.5, 0.15);
                vec3 rBlack = vec3(0.01);

                float pattern = sin(flow.x * 0.4) * cos(flow.y * 0.4) + noise(flow * 0.3) * 2.0;
                float mixVal = fract(pattern * 0.2 + uTime * 0.02 + pulse * 0.1);
                
                vec3 col;
                float boundary = 0.0;
                if(mixVal < 0.33) {
                    col = rRed;
                    boundary = smoothstep(0.31, 0.33, mixVal) + (1.0 - smoothstep(0.0, 0.02, mixVal));
                } else if(mixVal < 0.66) {
                    col = rGold;
                    boundary = smoothstep(0.64, 0.66, mixVal) + (1.0 - smoothstep(0.33, 0.35, mixVal));
                } else {
                    col = rGreen;
                    boundary = smoothstep(0.98, 1.0, mixVal) + (1.0 - smoothstep(0.66, 0.68, mixVal));
                }
                col = mix(col, rBlack, clamp(boundary * 1.4, 0.0, 1.0));

                float smoke = getSmokeText(p - panOffset, uTime, bass);
                col = mix(col, mix(vec3(1.0), rGold, 0.4), smoke * 0.8);

                float vignette = smoothstep(2.5, 0.4, length(vUv - 0.5) * 2.2);
                gl_FragColor = vec4(col * vignette + (vec3(1.0, 0.8, 0.5) * smoke * pulse * 0.5), 1.0);
            }
        `;

        const canvas = document.getElementById('visualizer');
        const overlay = document.getElementById('overlay');
        const pausedOverlay = document.getElementById('pausedOverlay');
        const container = document.getElementById('container');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const uniforms = {
            uTime: { value: 0 },
            uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uMouse: { value: new THREE.Vector2(0.5, 0.5) },
            uData: { value: null }
        };

        const scene = new THREE.Scene();
        const camera = new THREE.Camera();
        const mesh = new THREE.Mesh(new THREE.PlaneBufferGeometry(2, 2), new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader }));
        scene.add(mesh);

        let audioCtx, analyser, dataArray, texture, audio;

        async function start() {
            if (audio) return; // Already started
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);

            audio = new Audio(AUDIO_URL);
            audio.crossOrigin = "anonymous";
            audio.loop = true;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            texture = new THREE.DataTexture(dataArray, analyser.frequencyBinCount, 1, THREE.LuminanceFormat);
            uniforms.uData.value = texture;
            
            audio.play();
        }

        function togglePlayback(e) {
            // Don't toggle if we are clicking UI elements like share or link
            if (e.target.closest('button') || e.target.closest('a')) return;
            
            if (!audio) {
                start();
                return;
            }

            if (audio.paused) {
                audio.play();
                pausedOverlay.style.display = 'none';
            } else {
                audio.pause();
                pausedOverlay.style.display = 'flex';
            }
        }

        container.addEventListener('click', togglePlayback);
        
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        });
        
        window.addEventListener('mousemove', (e) => {
            uniforms.uMouse.value.set(e.clientX / window.innerWidth, 1 - e.clientY / window.innerHeight);
        });

        document.getElementById('shareButton').addEventListener('click', (e) => {
            e.stopPropagation();
            if (navigator.share) navigator.share({ title: 'Stashbox Does Dylan', url: window.location.href });
        });

        function animate() {
            requestAnimationFrame(animate);
            uniforms.uTime.value += 0.01;
            if (texture && audio && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                texture.needsUpdate = true;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
