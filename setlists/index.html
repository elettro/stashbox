<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlists – Stashbox</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {--green:#2d6a2d;--gold:#c9a84c;--gold-light:#f0d080;--dark:#111;--mid:#1a1a1a;--surface:#222;--border:rgba(201,168,76,0.25);--text:#e8e0cc;--muted:#888;}
  body {background: var(--dark);color: var(--text);font-family: 'DM Sans', sans-serif;font-weight: 300;line-height: 1.7;min-height: 100vh;}
  nav {background: #0d0d0d;border-bottom: 1px solid var(--border);padding: 0 2rem;display: flex;align-items: center;justify-content: space-between;height: 64px;position: sticky;top: 0;z-index: 100;}
  .nav-logo img { height: 36px; display: block; }
  .nav-links {display: flex;gap: 2rem;list-style: none;}
  .nav-links a {color: var(--muted);text-decoration: none;font-size: 13px;letter-spacing: 0.05em;text-transform: uppercase;transition: color 0.2s;}
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }
  .hero {padding: 5rem 2rem 3rem;text-align: center;border-bottom: 1px solid var(--border);background: radial-gradient(ellipse at 50% 0%, rgba(45,106,45,0.15) 0%, transparent 70%);}
  .hero h1 {font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,10vw,7rem);letter-spacing:.08em;color:#fff;line-height:1;margin-bottom:.75rem;}
  .hero p {color:var(--muted);font-size:14px;letter-spacing:.12em;text-transform:uppercase;}
  main {max-width:860px;margin:0 auto;padding:3rem 2rem 6rem;}
  .accordion-item{border-bottom:1px solid var(--border)} .accordion-item:first-child{border-top:1px solid var(--border)}
  .accordion-trigger{width:100%;background:none;border:none;cursor:pointer;padding:1.4rem 0;display:flex;align-items:center;justify-content:space-between;gap:1rem;text-align:left;color:var(--text);transition:color .2s}
  .accordion-trigger:hover,.accordion-trigger.open{color:var(--gold)} .accordion-title{font-family:'Bebas Neue',sans-serif;font-size:1.65rem;letter-spacing:.07em}
  .accordion-icon{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .2s,transform .35s}
  .accordion-trigger.open .accordion-icon{border-color:var(--gold);transform:rotate(45deg)} .accordion-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
  .accordion-panel{display:grid;grid-template-rows:0fr;transition:grid-template-rows .4s ease}.accordion-panel.open{grid-template-rows:1fr}.accordion-inner{overflow:hidden}.accordion-body{padding-bottom:2.5rem}
  .sets-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem}.set-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.25rem 1.5rem}
  .set-card h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;color:var(--gold);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
  .set-card ol{list-style:none;counter-reset:track;padding:0}.set-card ol li{counter-increment:track;display:flex;align-items:baseline;gap:.75rem;font-size:14px;color:var(--text);padding:3px 0;line-height:1.5}.set-card ol li::before{content:counter(track, decimal-leading-zero);font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.05em;flex-shrink:0;min-width:22px}
  .performers{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)} .performer-item{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)} .performer-item span{color:var(--gold);font-weight:500}
  .chord{font-size:11px;color:var(--muted);font-style:italic;margin-left:2px}.set-card.full{grid-column:1 / -1}
  footer {border-top:1px solid var(--border);padding:2rem;text-align:center;font-size:12px;color:var(--muted);letter-spacing:.05em} footer a{color:var(--gold);text-decoration:none}
</style>
</head><body>
<nav><a class="nav-logo" href="https://stashbox.com"><img src="https://stashbox.com/wp-content/uploads/2023/09/cropped-Stashbox-Logo-Transparent-RastaColors-1024x294.png" alt="Stashbox"></a><ul class="nav-links"><li><a href="https://stashbox.com/dylan/">Dylan</a></li><li><a href="https://stashbox.com/bookband/">Booking</a></li><li><a href="https://stashbox.com/setlists/" class="active">Setlists</a></li><li><a href="https://stashbox.com/posts/">Posts</a></li></ul></nav>
<div class="hero"><h1>Setlists</h1><p>Classic Rock &nbsp;·&nbsp; Reggae &nbsp;·&nbsp; Blues &nbsp;·&nbsp; South Florida</p></div>
<main><div class="accordion" id="accordion">
<div class="set-card full"><h3>Featured Tribute</h3><ol><li><a href="https://stashbox.com/dylan/" style="color:var(--gold);text-decoration:none;">Dylan</a></li></ol></div>
</div></main>
<footer>&copy; 2026 <a href="https://stashbox.com">Stashbox</a></footer>
<script>document.querySelectorAll('.accordion-trigger').forEach(btn=>{btn.addEventListener('click',()=>{const isOpen=btn.classList.contains('open');const idx=btn.dataset.index;const panel=document.getElementById('panel-'+idx);document.querySelectorAll('.accordion-trigger').forEach(b=>{b.classList.remove('open');b.setAttribute('aria-expanded','false')});document.querySelectorAll('.accordion-panel').forEach(p=>p.classList.remove('open'));if(!isOpen){btn.classList.add('open');btn.setAttribute('aria-expanded','true');panel.classList.add('open')}})});</script>
</body></html>
