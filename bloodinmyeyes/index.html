<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elettro Nebula - BloodEyes Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useRef, useEffect, useState } = React;

        function ElettroNebula() {
            const canvasRef = useRef(null);
            const [isAudioActive, setIsAudioActive] = useState(false);
            const [error, setError] = useState(null);
            const [sensitivity, setSensitivity] = useState(1.0);
            const [currentLine, setCurrentLine] = useState(0);
            const [burst, setBurst] = useState(0);
            const sensitivityRef = useRef(1.0);
            const burstRef = useRef(0);
            const analyserRef = useRef(null);
            const dataArrayRef = useRef(null);
            const audioRef = useRef(null);

            // Relative path to your file
            const audioUrl = "./BloodEyes.m4a";

            const lyrics = [
                "Oh, good morning", "Sweet and blue", "Sweet good-looking girl", "And I'm gonna make love to you",
                "Hey, hey baby", "Got blood in my eyes for you", "Hey, hey baby", "Got blood in my eyes for you",
                "Blood in my eyes for you baby", "I don't care what the world you do", "I went back home",
                "Put on my tie", "Gonna get that girl", "That money can't buy", "Hey, hey baby",
                "Got blood in my eyes for you", "Hey, hey baby", "Got blood in my eyes for you",
                "Blood in my eyes for you baby", "Don't care what the world gonna do", "She looked at me",
                "Began to smile", "She said, \"Hey man, I can't\"", "\"Wait here a little while\"",
                "Hey, hey baby", "Got blood in my eyes for you", "Hey, hey baby", "Got blood in my eyes for you",
                "Blood in my eyes for you baby", "Don't care what the world is gonna do", "No, no man",
                "I can't wait", "You got my money now", "You're trying to break away", "Hey, hey baby",
                "Blood in my eyes for you", "Hey, hey baby", "I got blood in my eyes for you",
                "Got blood in my eyes for you baby", "I don't care what the world",
                "I said, I don't care what in the world", "I don't care what in the world you do"
            ];

            const lineTimestamps = [27, 30, 33, 37, 41, 45, 50, 55, 60, 64, 68, 72, 75, 78, 82, 86, 91, 96, 101, 104, 154, 158, 161, 165, 169, 173, 178, 183, 188, 193, 198, 202, 205, 208, 209, 213, 218, 223, 228, 232, 234, 235];

            const startAudio = async () => {
                setError(null);
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const audio = new Audio();
                    audio.src = audioUrl;
                    audio.crossOrigin = "anonymous";
                    
                    audio.onerror = () => {
                        setError(`Could not find "${audioUrl}". Check the filename!`);
                    };

                    const source = audioContext.createMediaElementSource(audio);
                    const analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                    analyserRef.current = analyser;
                    dataArrayRef.current = new Uint8Array(analyser.frequencyBinCount);
                    audioRef.current = audio;
                    
                    await audio.play();
                    setIsAudioActive(true);
                } catch (err) {
                    setError("Interaction required or file error. Try clicking again.");
                    console.error(err);
                }
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext("2d");
                let animationFrameId;
                let particles = [];
                let hueOffset = 0;
                const numParticles = 70;

                class Particle {
                    constructor(w, h) {
                        this.x = Math.random() * w; this.y = Math.random() * h;
                        this.vx = (Math.random() - 0.5) * 1.5; this.vy = (Math.random() - 0.5) * 1.5;
                        this.baseSize = Math.random() * 1.2 + 0.5; this.size = this.baseSize;
                        this.hue = Math.random() * 360;
                    }
                    update(w, h, energy) {
                        const mult = sensitivityRef.current;
                        const bM = 1 + burstRef.current * 10;
                        this.x += this.vx * (1 + energy * 8 * mult) * bM;
                        this.y += this.vy * (1 + energy * 8 * mult) * bM;
                        this.size = this.baseSize + energy * 20 * mult + (burstRef.current * 10);
                        if (this.x < 0 || this.x > w) this.vx *= -1;
                        if (this.y < 0 || this.y > h) this.vy *= -1;
                    }
                    draw(context, energy, globalHue) {
                        context.beginPath(); context.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        let h = (this.hue + globalHue + energy * 120) % 360;
                        if (h > 270 && h < 330) h = h < 300 ? 270 : 330;
                        context.fillStyle = `hsla(${h}, 100%, 50%, ${0.5 + energy * 0.5})`;
                        context.fill();
                        if (energy > 0.4) { context.shadowBlur = energy * 30; context.shadowColor = `hsla(${h}, 100%, 60%, 0.9)`; }
                    }
                }

                const init = () => {
                    particles = [];
                    for (let i = 0; i < numParticles; i++) particles.push(new Particle(canvas.width, canvas.height));
                };

                const render = () => {
                    let avgEnergy = 0;
                    hueOffset = (hueOffset + 0.3) % 360;
                    if (audioRef.current && !audioRef.current.paused) {
                        const time = audioRef.current.currentTime;
                        const targetLine = lineTimestamps.findIndex(t => t > time) - 1;
                        const activeLine = targetLine < 0 ? (time > lineTimestamps[lineTimestamps.length-1] ? lyrics.length - 1 : 0) : targetLine;
                        if (activeLine !== currentLine && activeLine >= 0) {
                            setCurrentLine(activeLine);
                            setBurst(1); burstRef.current = 1.5;
                            setTimeout(() => { setBurst(0); burstRef.current = 0; }, 500);
                        }
                    }
                    if (analyserRef.current && dataArrayRef.current) {
                        analyserRef.current.getByteFrequencyData(dataArrayRef.current);
                        let sum = 0;
                        for (let i = 0; i < dataArrayRef.current.length; i++) sum += dataArrayRef.current[i];
                        avgEnergy = sum / dataArrayRef.current.length / 255;
                    }
                    ctx.fillStyle = "rgba(5, 5, 5, 0.25)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => { p.update(canvas.width, canvas.height, avgEnergy); p.draw(ctx, avgEnergy, hueOffset); });
                    const mult = sensitivityRef.current;
                    const maxDist = 90 + avgEnergy * 220 * mult;
                    ctx.lineWidth = 0.4 + avgEnergy * 3 * mult;
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < maxDist) {
                                let lh = (hueOffset + 180) % 360; if (lh > 270 && lh < 330) lh = lh < 300 ? 270 : 330;
                                ctx.strokeStyle = `hsla(${lh}, 100%, 55%, ${(1 - dist / maxDist) * (0.25 + avgEnergy * 0.6)})`;
                                ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                            }
                        }
                    }
                    animationFrameId = requestAnimationFrame(render);
                };

                const handleResize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); };
                window.addEventListener("resize", handleResize);
                handleResize(); render();
                return () => { window.removeEventListener("resize", handleResize); cancelAnimationFrame(animationFrameId); };
            }, [currentLine]);

            return (
                <div className="min-h-screen w-full bg-black flex items-center justify-center p-8 select-none" tabIndex={0}>
                    <div className="relative w-full max-w-4xl aspect-video bg-[#050505] rounded-3xl overflow-hidden shadow-2xl border border-white/5">
                        <canvas ref={canvasRef} className="w-full h-full" />
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-12 text-center">
                            {isAudioActive && (
                                <div className={`transition-all duration-300 transform ${burst > 0 ? 'scale-110 opacity-100' : 'scale-100 opacity-60'}`}>
                                    <p className="text-white text-3xl md:text-5xl font-light tracking-wide uppercase italic drop-shadow-[0_0_20px_rgba(255,255,255,0.4)]">{lyrics[currentLine]}</p>
                                    <p className="text-white/10 text-[10px] uppercase tracking-[0.4em] mt-8 font-mono italic">BloodEyes Auto-Sync</p>
                                </div>
                            )}
                            {error && <p className="text-red-500 font-mono text-xs bg-black/80 p-4 rounded-lg border border-red-500/20">{error}</p>}
                        </div>
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            {!isAudioActive && !error && (
                                <button onClick={startAudio} className="pointer-events-auto px-8 py-4 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 rounded-full text-white font-medium transition-all active:scale-95">Launch BloodEyes</button>
                            )}
                            {error && (
                                <button onClick={() => window.location.reload()} className="pointer-events-auto px-8 py-4 bg-red-500/20 hover:bg-red-500/40 backdrop-blur-md border border-red-500/40 rounded-full text-white font-medium transition-all active:scale-95">Restart & Check File</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ElettroNebula />);
    </script>
</body>
</html>
