<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stashbox Does Dylan | Visions of Johanna</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: black; cursor: crosshair; }
        canvas { display: block; }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        .sidebar-controls {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }

        @media (min-width: 769px) {
            .sidebar-controls {
                top: 2rem;
                right: 2rem;
                transform: none;
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div id="container" class="min-h-screen w-full relative overflow-hidden bg-black text-white font-sans">
        
        <!-- LAYER 0: Visualizer (Blurred Background) -->
        <div class="absolute inset-0 z-0 blur-xl scale-110">
            <canvas id="visualizer" class="w-full h-full block"></canvas>
        </div>
        
        <!-- LAYER 1: Sharp UI (Top Layer) -->
        <div class="absolute inset-0 z-[100] pointer-events-none no-select flex flex-col justify-between p-8">
            
            <!-- Top Left: Title -->
            <div class="select-none pointer-events-auto text-left max-w-[85%]">
                <h1 class="text-3xl md:text-6xl font-black tracking-tighter text-yellow-400 drop-shadow-[0_4px_4px_rgba(0,0,0,1)] uppercase">
                    STASHBOX DOES DYLAN
                </h1>
                <p class="text-lg md:text-2xl font-bold mt-1 text-red-500 drop-shadow-[0_2px_2px_rgba(0,0,0,1)] uppercase">
                    VISIONS OF JOHANNA
                </p>
            </div>

            <!-- Sidebar Controls -->
            <div class="sidebar-controls pointer-events-auto">
                <button id="playPauseButton" onclick="togglePlayback(event)" class="p-5 bg-white/10 backdrop-blur-xl rounded-full border border-white/20 shadow-2xl active:scale-95 transition-all">
                    <svg id="playPauseIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </button>
                <button onclick="handleShare(event)" class="p-5 bg-green-600 rounded-full border border-white/20 shadow-2xl active:scale-95 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                </button>
            </div>

            <!-- YouTube Button (Fixed Bottom Position) -->
            <div class="w-full flex justify-center pb-8 md:pb-4">
                <a href="https://www.youtube.com/watch?v=pDAoszT31UU&list=OLAK5uy_mTxa7EUb2bprobpr4r-s-cmy6AymkYcdA&index=19" target="_blank" rel="noopener noreferrer" class="pointer-events-auto flex items-center gap-3 px-8 py-4 bg-black/60 hover:bg-black/90 backdrop-blur-2xl rounded-full border border-white/20 text-sm font-black tracking-widest uppercase hover:border-yellow-400 transition-all duration-500 shadow-2xl">
                    <span>Watch on YouTube</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </a>
            </div>
        </div>

        <div id="pausedOverlay" class="absolute inset-0 z-30 hidden items-center justify-center bg-black/30 backdrop-blur-sm pointer-events-none no-select">
            <p class="text-5xl font-black uppercase tracking-[0.5em] text-white/30">PAUSED</p>
        </div>
    </div>

    <!-- CROSSORIGIN is critical for the visualizer to 'see' the audio data -->
    <audio id="mainAudio" src="visionsofjoanna.mp3" loop playsinline crossorigin="anonymous"></audio>

    <script>
        const canvas = document.getElementById('visualizer');
        const audio = document.getElementById('mainAudio');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        
        let audioCtx, analyser, dataArray, texture;

        // --- YOUR ORIGINAL SHADER CODE ---
        const vertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`;
        const fragmentShader = `
            precision mediump float;
            uniform vec2 uResolution; uniform float uTime; uniform sampler2D uData; uniform vec2 uMouse; uniform sampler2D uPrevFrame;
            varying vec2 vUv;
            float noise(vec2 p) {
                vec2 i = floor(p), f = fract(p), u = f*f*(3.0-2.0*f);
                float a = fract(sin(dot(i, vec2(12.7, 31.1))) * 43758.5);
                float b = fract(sin(dot(i + vec2(1.0, 0.0), vec2(12.7, 31.1))) * 43758.5);
                float c = fract(sin(dot(i + vec2(0.0, 1.0), vec2(12.7, 31.1))) * 43758.5);
                float d = fract(sin(dot(i + vec2(1.0, 1.0), vec2(12.7, 31.1))) * 43758.5);
                return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
            }
            void main() {
                float bass = texture2D(uData, vec2(0.02, 0.5)).r;
                float pulse = pow(bass, 2.2), aspect = uResolution.x / uResolution.y;
                float zoom = 1.0 + sin(uTime * 0.1) * 0.12;
                vec2 pan = vec2(sin(uTime * 0.08), cos(uTime * 0.07)) * 0.2;
                vec2 p = (vUv - 0.5) * 2.0; p.x *= aspect; p *= zoom; p += pan;
                vec2 m = (uMouse - 0.5) * 2.0; m.x *= aspect;
                float mouseStrength = smoothstep(0.8, 0.0, length(p - m));
                float swirl = mouseStrength * 5.0;
                vec2 vp = p - m;
                vp = vec2(vp.x * cos(swirl) - vp.y * sin(swirl), vp.x * sin(swirl) + vp.y * cos(swirl));
                vp *= (1.0 + mouseStrength * 2.5);
                vec2 flow = (vp + m) * (2.5 - pulse * 0.5);
                for(int i = 0; i < 7; i++) {
                    float fi = float(i);
                    flow.x += (0.5 + pulse) * sin(flow.y * 1.2 + uTime * 0.4 + fi);
                    flow.y += (0.4 + pulse) * cos(flow.x * 0.8 - uTime * 0.28 + fi);
                }
                vec3 rRed = vec3(0.85, 0.05, 0.05), rGold = vec3(1.0, 0.8, 0.0), rGreen = vec3(0.0, 0.5, 0.15), rBlack = vec3(0.01);
                float mixVal = fract(sin(flow.x * 0.4) * cos(flow.y * 0.4) * 0.2 + uTime * 0.02 + pulse * 0.1 + noise(flow * 0.5) * 0.08);
                vec3 col = (mixVal < 0.33) ? mix(rRed, rGold, smoothstep(0.0, 0.33, mixVal)) : (mixVal < 0.66) ? mix(rGold, rGreen, smoothstep(0.33, 0.66, mixVal)) : mix(rGreen, rRed, smoothstep(0.66, 1.0, mixVal));
                col = mix(col, rBlack, (smoothstep(0.06 + pulse * 0.1, 0.0, abs(mixVal - 0.33)) + smoothstep(0.06 + pulse * 0.1, 0.0, abs(mixVal - 0.66))) * 0.65);
                vec2 trailUv = vUv - 0.5; trailUv *= 0.99 + pulse * 0.02;
                trailUv = vec2(trailUv.x * cos(0.01) - trailUv.y * sin(0.01), trailUv.x * sin(0.01) + trailUv.y * cos(0.01)) + 0.5;
                vec3 prev = texture2D(uPrevFrame, trailUv).rgb;
                prev.r = texture2D(uPrevFrame, trailUv + 0.002).r; prev.b = texture2D(uPrevFrame, trailUv - 0.002).b;
                col = mix(col, prev, 0.93 + pulse * 0.02);
                gl_FragColor = vec4(col * smoothstep(2.5, 0.4, length(vUv - 0.5) * 2.2), 1.0);
            }
        `;

        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const targetA = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight), targetB = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
        let currentTarget = targetA, prevTarget = targetB;

        const uniforms = {
            uTime: { value: 0 }, uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uMouse: { value: new THREE.Vector2(0.5, 0.5) }, uData: { value: null }, uPrevFrame: { value: null }
        };

        const scene = new THREE.Scene(), camera = new THREE.Camera();
        scene.add(new THREE.Mesh(new THREE.PlaneBufferGeometry(2, 2), new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader })));

        function initAudioEngine() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaElementSource(audio);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                texture = new THREE.DataTexture(dataArray, analyser.frequencyBinCount, 1, THREE.LuminanceFormat);
                uniforms.uData.value = texture;
            } catch (err) { console.error("Web Audio fail:", err); }
        }

        window.togglePlayback = (e) => {
            if (e) e.stopPropagation();
            
            // Critical for mobile: initialize context on user tap
            initAudioEngine();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
            updateIcon();
        };

        function updateIcon() {
            const icon = document.getElementById('playPauseIcon');
            icon.innerHTML = audio.paused ? 
                '<polygon points="5 3 19 12 5 21 5 3"></polygon>' : 
                '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            document.getElementById('pausedOverlay').style.display = audio.paused ? 'flex' : 'none';
        }

        window.handleShare = (e) => {
            if (e) e.stopPropagation();
            if (navigator.share) navigator.share({ title: 'Stashbox Does Dylan', url: window.location.href });
        };

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            targetA.setSize(window.innerWidth, window.innerHeight); targetB.setSize(window.innerWidth, window.innerHeight);
            uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        });

        const updateMouse = (x, y) => uniforms.uMouse.value.set(x / window.innerWidth, 1 - y / window.innerHeight);
        window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => updateMouse(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', (e) => updateMouse(e.touches[0].clientX, e.touches[0].clientY));

        function animate() {
            requestAnimationFrame(animate);
            uniforms.uTime.value += 0.01;
            
            // Visualizer pulse only updates if audio is playing
            if (texture && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                texture.needsUpdate = true;
            }
            
            uniforms.uPrevFrame.value = prevTarget.texture;
            renderer.setRenderTarget(currentTarget);
            renderer.render(scene, camera);
            renderer.setRenderTarget(null);
            renderer.render(scene, camera);
            let tmp = currentTarget; currentTarget = prevTarget; prevTarget = tmp;
        }
        animate();
    </script>
</body>
</html>
