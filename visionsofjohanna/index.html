<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stashbox Does Dylan | Visions of Johanna</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: black; cursor: crosshair; }
        canvas { display: block; }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body>
    <div id="container" class="min-h-screen w-full relative overflow-hidden bg-black text-white font-sans">
        
        <!-- Layer 0: The Trippy Background (Blurred) -->
        <div class="absolute inset-0 z-0 blur-xl scale-110">
            <canvas id="visualizer" class="w-full h-full block"></canvas>
        </div>
        
        <!-- Layer 1: Sharp UI elements (Titles, Share, YouTube) -->
        <div class="relative z-50 w-full h-screen pointer-events-none no-select">
            <div class="absolute top-8 left-8 select-none pointer-events-auto text-left">
                <h1 class="text-4xl md:text-6xl font-black tracking-tighter text-yellow-400 drop-shadow-[0_4px_4px_rgba(0,0,0,0.9)] uppercase">
                    STASHBOX DOES DYLAN
                </h1>
                <p class="text-xl md:text-2xl font-bold mt-2 text-red-500 drop-shadow-[0_2px_2px_rgba(0,0,0,0.9)] uppercase">
                    VISIONS OF JOHANNA (BY BOB DYLAN)
                </p>
            </div>

            <div class="absolute top-8 right-8 pointer-events-auto">
                <button id="shareButton" class="p-4 bg-green-600 hover:bg-green-500 rounded-full transition-all duration-300 shadow-2xl border border-white/10 group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white group-hover:scale-110"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                </button>
            </div>

            <div class="absolute bottom-28 md:bottom-12 left-1/2 -translate-x-1/2 pointer-events-auto">
                <a href="https://www.youtube.com/watch?v=pDAoszT31UU&list=OLAK5uy_mTxa7EUb2bprobpr4r-s-cmy6AymkYcdA&index=19" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 px-8 py-4 bg-black/60 hover:bg-black/80 backdrop-blur-xl rounded-full border border-white/20 text-sm font-black tracking-widest uppercase hover:border-yellow-400 transition-all duration-500 shadow-2xl">
                    <span>Watch on YouTube</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </a>
            </div>
        </div>

        <!-- Overlays -->
        <div id="startOverlay" class="absolute inset-0 z-40 flex items-center justify-center bg-black/70 backdrop-blur-md cursor-pointer transition-opacity duration-1000 no-select">
            <div class="text-center group pointer-events-none">
                <div class="w-20 h-20 mb-6 mx-auto border-4 border-yellow-400 border-t-transparent rounded-full animate-spin group-hover:scale-110 transition-transform"></div>
                <p class="text-3xl font-black uppercase tracking-[0.3em] text-white group-hover:text-yellow-400 transition-colors">Click to Vibe</p>
            </div>
        </div>

        <div id="pausedOverlay" class="absolute inset-0 z-30 hidden items-center justify-center bg-black/30 backdrop-blur-sm pointer-events-none no-select">
            <p class="text-5xl font-black uppercase tracking-[0.5em] text-white/30">PAUSED</p>
        </div>
    </div>

    <!-- CLEAN AUDIO TAG -->
    <audio id="mainAudio" src="./visionsofjoanna.mp3" loop prefetch="auto"></audio>

    <script>
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            precision mediump float;
            uniform vec2 uResolution;
            uniform float uTime;
            uniform sampler2D uData;
            uniform vec2 uMouse;
            uniform sampler2D uPrevFrame;
            varying vec2 vUv;

            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                vec2 u = f * f * (3.0 - 2.0 * f);
                float a = fract(sin(dot(i, vec2(12.7, 31.1))) * 43758.5);
                float b = fract(sin(dot(i + vec2(1.0, 0.0), vec2(12.7, 31.1))) * 43758.5);
                float c = fract(sin(dot(i + vec2(0.0, 1.0), vec2(12.7, 31.1))) * 43758.5);
                float d = fract(sin(dot(i + vec2(1.0, 1.0), vec2(12.7, 31.1))) * 43758.5);
                return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
            }

            float getSmokeText(vec2 p, float time, float bass) {
                float cycle = mod(time, 6.0);
                float phase = smoothstep(0.0, 2.0, cycle) - smoothstep(4.0, 6.0, cycle);
                float drift = (cycle > 2.0) ? (cycle - 2.0) * 0.4 : 0.0;
                vec2 sp = p;
                sp.y -= drift;
                sp += noise(sp * 4.0 + time * 0.5) * 0.1;
                float d = 100.0;
                d = min(d, length(sp - vec2(-0.4, 0.0)) - 0.15);
                d = min(d, length(sp - vec2(0.0, 0.0)) - 0.12);
                d = min(d, length(sp - vec2(0.4, 0.0)) - 0.15);
                float blur = 0.05 + drift * 0.5 + (1.0 - phase) * 0.2;
                return smoothstep(blur, -blur, d) * phase;
            }

            void main() {
                float bass = texture2D(uData, vec2(0.02, 0.0)).r;
                float pulse = pow(bass, 2.2);
                float aspect = uResolution.x / uResolution.y;
                float zoom = 1.0 + sin(uTime * 0.1) * 0.12;
                vec2 pan = vec2(sin(uTime * 0.08), cos(uTime * 0.07)) * 0.2;
                
                vec2 p = (vUv - 0.5) * 2.0;
                p.x *= aspect;
                p *= zoom;
                p += pan;

                vec2 m = (uMouse - 0.5) * 2.0;
                m.x *= aspect;
                float mouseStrength = smoothstep(0.8, 0.0, length(p - m));
                float swirl = mouseStrength * 5.0;
                vec2 vp = p - m;
                vp = vec2(vp.x * cos(swirl) - vp.y * sin(swirl), vp.x * sin(swirl) + vp.y * cos(swirl));
                vp *= (1.0 + mouseStrength * 2.5);
                vec2 flowP = (vp + m) * (2.5 - pulse * 0.5);

                vec2 flow = flowP;
                float t = uTime * 0.4;
                for(int i = 0; i < 7; i++) {
                    float fi = float(i);
                    flow.x += (0.5 + pulse) * sin(flow.y * 1.2 + t + fi);
                    flow.y += (0.4 + pulse) * cos(flow.x * 0.8 - t * 0.7 + fi);
                }

                vec3 rRed = vec3(0.85, 0.05, 0.05), rGold = vec3(1.0, 0.8, 0.0), rGreen = vec3(0.0, 0.5, 0.15), rBlack = vec3(0.01);
                float mixVal = fract(sin(flow.x * 0.4) * cos(flow.y * 0.4) * 0.2 + uTime * 0.02 + pulse * 0.1);
                
                vec3 col;
                float colorCoord = fract(mixVal + noise(flow * 0.5 + t * 0.1) * 0.08);
                if(colorCoord < 0.33) col = mix(rRed, rGold, smoothstep(0.0, 0.33, colorCoord));
                else if(colorCoord < 0.66) col = mix(rGold, rGreen, smoothstep(0.33, 0.66, colorCoord));
                else col = mix(rGreen, rRed, smoothstep(0.66, 1.0, colorCoord));
                
                float trim = smoothstep(0.06 + pulse * 0.1, 0.0, abs(colorCoord - 0.33)) + smoothstep(0.06 + pulse * 0.1, 0.0, abs(colorCoord - 0.66));
                col = mix(col, rBlack, trim * 0.65);

                vec2 trailUv = vUv - 0.5;
                trailUv *= 0.99 + pulse * 0.02;
                trailUv = vec2(trailUv.x * cos(0.01) - trailUv.y * sin(0.01), trailUv.x * sin(0.01) + trailUv.y * cos(0.01)) + 0.5;
                vec3 prev = texture2D(uPrevFrame, trailUv).rgb;
                prev.r = texture2D(uPrevFrame, trailUv + 0.002).r;
                prev.b = texture2D(uPrevFrame, trailUv - 0.002).b;
                col = mix(col, prev, 0.93 + pulse * 0.02);

                float smoke = getSmokeText(p - pan, uTime, bass);
                col = mix(col, mix(vec3(1.0), rGold, 0.4), smoke * 0.8);

                gl_FragColor = vec4(col * smoothstep(2.5, 0.4, length(vUv - 0.5) * 2.2) + (vec3(1.0, 0.8, 0.5) * smoke * pulse * 0.5), 1.0);
            }
        `;

        const canvas = document.getElementById('visualizer'), overlay = document.getElementById('startOverlay');
        const audio = document.getElementById('mainAudio'), renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const targetA = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight), targetB = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
        let currentTarget = targetA, prevTarget = targetB;

        const uniforms = {
            uTime: { value: 0 }, uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uMouse: { value: new THREE.Vector2(0.5, 0.5) }, uData: { value: null }, uPrevFrame: { value: null }
        };

        const scene = new THREE.Scene(), camera = new THREE.Camera();
        scene.add(new THREE.Mesh(new THREE.PlaneBufferGeometry(2, 2), new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader })));

        let audioCtx, analyser, dataArray, texture, isPlaying = false;

        async function start() {
            if (isPlaying) return;

            // Diagnostic check: Test if file exists
            try {
                const response = await fetch(audio.src, { method: 'HEAD' });
                if (!response.ok) {
                    alert("ERROR: The song file 'visionsofjoanna.mp3' was not found in this folder.");
                    return;
                }
            } catch (e) {}

            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaElementSource(audio);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                texture = new THREE.DataTexture(dataArray, analyser.frequencyBinCount, 1, THREE.LuminanceFormat);
                uniforms.uData.value = texture;
                
                audio.play();
                isPlaying = true;
            } catch (err) {
                alert("Audio Blocked: Please ensure you are viewing this on a web server (http://) and not as a local file (file://)");
            }
        }

        document.getElementById('container').addEventListener('click', (e) => {
            if (e.target.closest('button') || e.target.closest('a')) return;
            if (!isPlaying) { start(); return; }
            audio.paused ? audio.play() : audio.pause();
            document.getElementById('pausedOverlay').style.display = audio.paused ? 'flex' : 'none';
        });

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            targetA.setSize(window.innerWidth, window.innerHeight);
            targetB.setSize(window.innerWidth, window.innerHeight);
            uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('mousemove', (e) => uniforms.uMouse.value.set(e.clientX / window.innerWidth, 1 - e.clientY / window.innerHeight));
        
        document.getElementById('shareButton').addEventListener('click', (e) => {
            e.stopPropagation();
            if (navigator.share) navigator.share({ title: 'Stashbox Does Dylan', url: window.location.href });
        });

        function animate() {
            requestAnimationFrame(animate);
            uniforms.uTime.value += 0.01;
            if (texture && isPlaying && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                texture.needsUpdate = true;
            }
            uniforms.uPrevFrame.value = prevTarget.texture;
            renderer.setRenderTarget(currentTarget);
            renderer.render(scene, camera);
            renderer.setRenderTarget(null);
            renderer.render(scene, camera);
            let tmp = currentTarget; currentTarget = prevTarget; prevTarget = tmp;
        }
        animate();
    </script>
</body>
</html>
