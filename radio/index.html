<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Stashbox Radio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0c0e;--surface:#131316;--surface2:#1a1a1f;--surface3:#222228;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.16);
  --text:#eeeae3;--muted:#666;--muted2:#3a3a3a;
  --accent:#f0a500;--accent-d:rgba(240,165,0,0.1);
  --green:#3ecf6e;--red:#e05c5c;
  --fh:'Bebas Neue',sans-serif;--fb:'Karla',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}

/* LOADING */
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px}
.load-logo{width:220px;max-width:70vw;animation:pulse 1.4s ease-in-out infinite}
.load-sub{font-size:13px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* SHARED BADGES */
.badge{font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.bwav{background:rgba(240,165,0,0.15);color:var(--accent)}
.bimg{background:rgba(100,180,255,0.12);color:#64b4ff}
.bvid{background:rgba(62,207,110,0.12);color:var(--green)}

/* ══════════════════════════════════════
   DESKTOP (≥768px)
══════════════════════════════════════ */
#desktop{display:none}

/* nav */
#d-nav{position:sticky;top:0;z-index:100;background:rgba(8,9,12,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08)}
.d-nav-inner{max-width:1600px;margin:0 auto;padding:0 12px;display:grid;grid-template-columns:auto 1fr auto;grid-template-rows:auto auto;column-gap:14px;row-gap:6px;align-items:center;min-height:86px}
.d-logo{font-family:var(--fh);font-size:30px;letter-spacing:0.06em;color:var(--accent);white-space:nowrap;line-height:1}
.d-logo span{color:var(--text)}
.logo-link{text-decoration:none;color:inherit;display:inline-flex;align-items:center}
.d-div{width:1px;height:22px;background:rgba(255,255,255,.12);flex-shrink:0}
.d-filters{display:contents}
.d-row{display:flex;align-items:center;gap:8px;min-width:0}
.d-row.genre{grid-column:2;grid-row:1}
.d-row.album{grid-column:2;grid-row:2}
#d-chips,#d-album-chips{display:flex;align-items:center;gap:7px;flex-wrap:nowrap;min-width:0;overflow-x:auto;scrollbar-width:none}
#d-chips::-webkit-scrollbar,#d-album-chips::-webkit-scrollbar{display:none}
.d-flabel{font-size:14px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#7a7d84;white-space:nowrap}
.chip{height:34px;padding:0 15px;border-radius:100px;font-size:24px;font-weight:400;font-family:var(--fh);border:1px solid rgba(255,255,255,.09);background:transparent;color:#7f8288;cursor:pointer;transition:all 0.15s;white-space:nowrap;letter-spacing:0.06em;line-height:1}
.chip:hover{border-color:var(--border-h);color:var(--text)}
.chip.active{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}
.chip.vc.active{background:rgba(62,207,110,0.1);border-color:var(--green);color:var(--green)}
.d-nav-right{grid-column:3;grid-row:1 / span 2;display:flex;align-items:center;gap:12px;flex-shrink:0}
.d-total{font-size:25px;color:#6f737c;white-space:nowrap;font-family:var(--fh);letter-spacing:.04em}
.dash-link{height:30px;padding:0 12px;border-radius:6px;font-size:11px;font-weight:600;font-family:var(--fb);letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap;transition:all .15s}
.dash-link:hover{border-color:var(--border-h);color:var(--text)}
.btn-reset{height:30px;padding:0 12px;border-radius:6px;font-size:11px;font-weight:600;font-family:var(--fb);letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer;transition:all 0.15s;white-space:nowrap;display:none}
.btn-reset:hover{background:rgba(224,92,92,0.1)}
.btn-reset.visible{display:inline-block}
.d-srch-wrap{position:relative}
.d-srch-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.d-srch{width:190px;height:34px;padding:0 12px 0 30px;background:rgba(21,23,29,.95);border:1px solid rgba(255,255,255,.09);border-radius:10px;color:var(--text);font-family:var(--fb);font-size:22px;outline:none;transition:all 0.2s}
.d-srch::placeholder{color:var(--muted)}
.d-srch:focus{border-color:var(--border-h);width:210px}

@media (min-width:768px) and (max-width:1200px){
  .d-nav-inner{grid-template-columns:auto 1fr;grid-template-rows:auto auto auto;padding:8px 10px}
  .d-nav-right{grid-column:2;grid-row:3;justify-content:flex-end}
  .chip{font-size:20px;height:32px}
  .d-total{font-size:22px}
}
/* page */
.d-page{max-width:1400px;margin:0 auto;padding:1.5rem}

/* shuffle hero */
.shero{background:linear-gradient(135deg,rgba(240,165,0,0.12),rgba(224,92,42,0.08));border:1px solid rgba(240,165,0,0.25);border-radius:14px;padding:1.75rem 2rem;margin-bottom:1.75rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap}
.shero-title{font-family:var(--fh);font-size:clamp(28px,5vw,44px);letter-spacing:0.05em;color:var(--text);line-height:1}
.shero-sub{font-size:13px;color:var(--muted);margin-top:6px}
.shero-btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn-sha{font-family:var(--fh);font-size:22px;letter-spacing:0.08em;padding:12px 36px;background:var(--accent);color:#0c0c0e;border:none;border-radius:10px;cursor:pointer;transition:opacity 0.2s,transform 0.15s;white-space:nowrap}
.btn-sha:hover{opacity:0.88;transform:translateY(-1px)}
.btn-shf{font-family:var(--fh);font-size:18px;letter-spacing:0.06em;padding:12px 24px;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:10px;cursor:pointer;transition:all 0.2s;white-space:nowrap;display:none}
.btn-shf:hover{background:var(--accent-d)}

/* desktop player */
#dp{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:1.5rem;overflow:hidden;display:none}
.dp-media{width:100%;background:#000;display:none;border-radius:14px 14px 0 0}
.dp-media.toggleable{cursor:pointer}
.dp-media img{width:100%;max-height:420px;object-fit:contain;display:block;background:#000}
.dp-media iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.video-player-wrap{width:100%;aspect-ratio:16/9;background:#000}
.video-player-wrap #youtube-player{width:100%;height:100%}
.dp-vis{display:none;width:100%;height:120px;border-radius:14px 14px 0 0;background:var(--surface2);align-items:flex-end;justify-content:center;padding:0 0 8px;overflow:hidden;position:relative}
.dp-vis-title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--fh);font-size:clamp(18px,4vw,32px);letter-spacing:0.04em;color:rgba(255,255,255,0.15);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%;text-align:center}
#d-vis-cv{width:100%;height:80px;display:block}
.dp-bottom{display:flex;align-items:center;gap:10px;padding:12px 16px;flex-wrap:wrap}
.dp-info{flex:1;min-width:0}
.dp-title{font-family:var(--fh);font-size:18px;letter-spacing:0.04em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-meta{font-size:12px;color:var(--muted);margin-top:2px}
.dp-gtag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-left:6px}
.dp-notes{font-size:11px;color:var(--muted);font-style:italic;margin-top:3px}
.dp-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.bb{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:14px}
.bb:hover{border-color:var(--border-h);color:var(--text)}
.bb.pp{width:44px;height:44px;background:var(--accent);border-color:var(--accent);color:#0c0c0e;font-size:18px}
.bb.pp:hover{opacity:0.88}
.bb.ron{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
.dp-awrap{width:100%;padding:0 16px 12px;display:none}
.dp-awrap audio{width:100%;height:32px;accent-color:var(--accent)}
.dp-scrub{width:100%;padding:0 16px 12px;display:none}
.dp-scrub-row{display:flex;align-items:center;gap:12px}
.dp-scrub-time{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:42px}
.dp-scrub-time.end{text-align:right}
.dp-scrubber{flex:1;appearance:none;height:4px;border-radius:999px;background:var(--surface3);outline:none;cursor:pointer}
.dp-scrubber::-webkit-slider-thumb{appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);border:none}
.dp-scrubber::-moz-range-thumb{width:12px;height:12px;border:none;border-radius:50%;background:var(--accent)}
.dp-typical{font-size:10px;color:var(--muted2);margin-top:6px;letter-spacing:.05em;text-transform:uppercase}

/* desktop sections */
.dsec{margin-bottom:2rem}
.dsec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.sdot{border-radius:50%;flex-shrink:0}
.dsec-name{font-family:var(--fh);font-size:26px;letter-spacing:.05em;color:var(--text)}
.dsec-cnt{font-size:12px;color:var(--muted)}
.dsec-shuf{margin-left:auto;height:30px;padding:0 14px;font-size:11px;font-weight:600;font-family:var(--fb);letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.dsec-shuf:hover{border-color:var(--border-h);color:var(--text)}
.d-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:10px}
.dcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.dcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .2s}
.dcard:hover{border-color:var(--border-h);background:var(--surface2)}
.dcard.playing{border-color:var(--accent);background:var(--accent-d)}
.dcard.playing::before{background:var(--accent)}
.dcard-num{font-size:11px;color:var(--muted2);width:20px;text-align:center;flex-shrink:0}
.dcard.playing .dcard-num{color:var(--accent)}
.dcard-thumb{width:40px;height:40px;border-radius:6px;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.dcard-thumb img{width:100%;height:100%;object-fit:cover}
.dcard-info{flex:1;min-width:0}
.dcard-title{font-size:13px;font-weight:600;color:var(--text);white-space:normal;overflow:visible;text-overflow:clip;line-height:1.3;word-break:break-word}
.dcard.playing .dcard-title{color:var(--accent)}
.dcard-artist{font-size:11px;color:var(--muted);margin-top:1px}
.dcard-date{font-size:10px;color:var(--muted2);margin-top:1px}
.dcard-album{font-size:10px;color:var(--muted);font-style:italic;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dcard-badges{display:flex;gap:4px;align-items:center;flex-shrink:0}
.play-badge{margin-left:auto;display:inline-flex;align-items:center;justify-content:center;gap:5px;border-radius:999px;font-weight:800;letter-spacing:.04em;white-space:nowrap;background:rgba(240,165,0,.14);color:var(--accent);border:1px solid rgba(240,165,0,.3);padding:4px 8px;font-size:10px;flex-shrink:0}
.now-plays{margin-left:auto;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--accent);color:#111;padding:10px 16px;font-weight:800;border-radius:999px;white-space:nowrap;flex-shrink:0}
.dplay-icon{font-size:16px;color:var(--muted);flex-shrink:0}
.dcard:hover .dplay-icon,.dcard.playing .dplay-icon{color:var(--accent)}
.d-nores{text-align:center;padding:4rem 2rem;color:var(--muted)}
.d-nores .big{font-family:var(--fh);font-size:48px;color:var(--muted2);display:block;margin-bottom:.5rem}

/* desktop video modal */
#d-vmod{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;padding:2rem}
.d-vmod-inner{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;max-width:860px;width:100%}
.d-vmod-hdr{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.d-vmod-title{font-family:var(--fh);font-size:22px;letter-spacing:.04em;color:var(--text)}
.d-vmod-close{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;width:32px;height:32px;font-size:18px;display:flex;align-items:center;justify-content:center}
.d-vmod-close:hover{border-color:var(--border-h);color:var(--text)}
#d-vmod-iframe{width:100%;aspect-ratio:16/9;border:none}

/* ══════════════════════════════════════
   MOBILE (<768px)
══════════════════════════════════════ */
#mobile{display:none;flex-direction:column;height:100vh;overflow:hidden}
#m-nav{height:52px;flex-shrink:0;background:rgba(12,12,14,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:10px}
.m-logo{font-family:var(--fh);font-size:26px;letter-spacing:.06em;color:var(--accent)}
.m-logo span{color:var(--text)}
.m-total{font-size:11px;color:var(--muted);letter-spacing:.06em}
.m-reset-btn{height:28px;padding:0 10px;border-radius:6px;font-size:10px;font-weight:600;font-family:var(--fb);letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer;white-space:nowrap;display:none}
.m-reset-btn.visible{display:inline-block}
.m-srch-btn{margin-left:auto;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.m-srch-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.m-dash-link{height:28px;padding:0 10px;border-radius:6px;font-size:10px;font-weight:600;font-family:var(--fb);letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap}
#m-genre-bar{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;padding:10px 1rem;display:flex;gap:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#m-genre-bar::-webkit-scrollbar{display:none}
.mtab{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:100px;font-size:13px;font-weight:600;font-family:var(--fb);border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.mtab.active{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}
.mtab.vtab.active{background:rgba(62,207,110,.1);border-color:var(--green);color:var(--green)}
.mtab.atab.active{background:rgba(200,140,255,.1);border-color:#c88cff;color:#c88cff}
.m-abar-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;flex-shrink:0;padding-right:4px}
.mtab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#m-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--safe-b) + 8px)}
.mshero{background:linear-gradient(135deg,rgba(240,165,0,.13),rgba(224,92,42,.07));border-bottom:1px solid rgba(240,165,0,.2);padding:1.25rem 1rem}
.mshero-title{font-family:var(--fh);font-size:32px;letter-spacing:.05em;color:var(--text);line-height:1}
.mshero-sub{font-size:12px;color:var(--muted);margin-top:4px}
.mshero-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.m-btn-sha{font-family:var(--fh);font-size:20px;letter-spacing:.08em;padding:10px 28px;background:var(--accent);color:#0c0c0e;border:none;border-radius:10px;cursor:pointer}
.m-btn-sha:active{opacity:.8}
.m-btn-shf{font-family:var(--fh);font-size:17px;letter-spacing:.06em;padding:10px 20px;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:10px;cursor:pointer;display:none}
.msec{border-bottom:1px solid var(--border)}
.msec-hdr{display:flex;align-items:center;gap:10px;padding:14px 1rem 10px}
.msec-name{font-family:var(--fh);font-size:22px;letter-spacing:.05em;color:var(--text)}
.msec-cnt{font-size:11px;color:var(--muted)}
.msec-shuf{margin-left:auto;font-size:11px;font-weight:600;font-family:var(--fb);letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;padding:6px 10px;white-space:nowrap}
.msec-shuf:active{background:var(--surface2)}
.mrow{display:flex;align-items:center;gap:10px;padding:10px 1rem;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;min-height:60px;position:relative;transition:background .1s}
.mrow:active{background:var(--surface2)}
.mrow.playing{background:var(--accent-d)}
.mrow.playing::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.mthumb{width:44px;height:44px;border-radius:7px;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.mthumb img{width:100%;height:100%;object-fit:cover;border-radius:7px}
.mtrack-info{flex:1;min-width:0}
.mtrack-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrow.playing .mtrack-title{color:var(--accent)}
.mtrack-artist{font-size:12px;color:var(--muted);margin-top:2px}
.mtrack-date{font-size:11px;color:var(--muted2);margin-top:1px}
.mtrack-album{font-size:11px;color:var(--muted);font-style:italic;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtrack-badges{display:flex;gap:4px;align-items:center;flex-shrink:0}
.m-play-badge{display:inline-flex;align-items:center;justify-content:center;gap:4px;border-radius:999px;font-weight:800;white-space:nowrap;background:rgba(240,165,0,.14);color:var(--accent);border:1px solid rgba(240,165,0,.3);padding:3px 7px;font-size:10px;flex-shrink:0}
.mplay-icon{font-size:18px;color:var(--muted2);flex-shrink:0;width:24px;text-align:center}
.mrow.playing .mplay-icon{color:var(--accent)}
.m-nores{text-align:center;padding:3rem 1rem;color:var(--muted)}

#m-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:calc(72px + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(19,19,22,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:none;align-items:center;padding-left:12px;padding-right:12px;gap:10px;cursor:pointer}
#m-bar.vis{display:flex}
.m-barprog{position:absolute;top:0;left:0;right:0;height:2px;background:var(--surface3)}
.m-barprog-fill{height:100%;background:var(--accent);width:0%;transition:width .5s linear}
.m-barthumb{width:44px;height:44px;border-radius:8px;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.m-barthumb img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.m-barinfo{flex:1;min-width:0}
.m-bartitle{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-barartist{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-barplays{font-size:10px;color:var(--accent);font-weight:800;margin-top:2px;white-space:nowrap}
.m-barbtns{display:flex;align-items:center;gap:4px;flex-shrink:0}
.m-barbtn{width:38px;height:38px;border-radius:50%;border:none;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.m-barbtn:active{background:var(--surface2)}
.m-barbtn.play{background:var(--accent);color:#0c0c0e;font-size:18px}
.m-barbtn.play:active{opacity:.85}
#m-now{position:fixed;inset:0;z-index:150;background:var(--bg);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;-webkit-overflow-scrolling:touch}
#m-now.open{transform:translateY(0)}
.m-now-drag{height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.m-now-pill{width:36px;height:4px;border-radius:2px;background:var(--muted2)}
.m-now-media{flex:1;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0}
.m-now-media.toggleable{cursor:pointer}
.m-now-media img{max-width:100%;max-height:100%;object-fit:contain}
.m-now-media iframe{width:100%;height:100%;border:none}
.m-now-vis{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;background:var(--surface)}
.m-now-vis-title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--fh);font-size:clamp(20px,6vw,36px);letter-spacing:.04em;color:rgba(255,255,255,.15);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88%;text-align:center}
#m-vis-cv{width:100%;height:100px;display:block}
.m-now-info{flex-shrink:0;padding:16px 20px 8px}
.m-now-title{font-family:var(--fh);font-size:clamp(22px,6vw,30px);letter-spacing:.04em;color:var(--text);line-height:1.1}
.m-now-meta{font-size:13px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.m-now-gtag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.m-now-notes{font-size:12px;color:var(--muted);font-style:italic;margin-top:6px}

.song-share-btn:hover{border-color:rgba(240,165,0,.45);color:var(--accent);background:rgba(240,165,0,.1)}
.song-share-btn:active{transform:scale(.96)}
.song-share-main{height:40px;padding:0 14px;border-radius:999px;border:1px solid rgba(240,165,0,.35);background:rgba(240,165,0,.12);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;font-weight:800;font-family:var(--fb);font-size:12px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0;transition:all .15s}
.song-share-main:hover{background:var(--accent);color:#111}
.watch-video-btn{display:none}
.watch-video-btn.is-visible{display:inline-flex}
.m-song-share-btn{width:32px;height:32px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px}
.m-song-share-btn:active{background:rgba(240,165,0,.12);color:var(--accent)}

.share-toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:9999;background:rgba(19,19,22,.96);color:var(--text);border:1px solid rgba(240,165,0,.35);border-radius:999px;padding:10px 16px;font-size:13px;font-weight:700;box-shadow:0 12px 30px rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
.share-toast.visible{opacity:1;transform:translateX(-50%) translateY(-4px)}
.m-now-art-inline{display:none;flex-shrink:0;padding:8px 20px 6px}

.m-now-audio{flex-shrink:0;padding:0 20px 8px}
.m-now-audio audio{width:100%;height:36px;accent-color:var(--accent)}
.m-now-ctrl{flex-shrink:0;padding:8px 20px;display:flex;align-items:center;justify-content:space-between}
.mnc{width:52px;height:52px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.mnc:active{background:var(--surface2)}
.mnc.play{width:64px;height:64px;background:var(--accent);border-color:var(--accent);color:#0c0c0e;font-size:24px}
.mnc.play:active{opacity:.85}
.mnc.ron{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
.m-now-qlabel{flex-shrink:0;padding:0 20px 12px;font-size:11px;color:var(--muted);letter-spacing:.06em}
#m-search{position:fixed;inset:0;z-index:200;background:rgba(12,12,14,.97);backdrop-filter:blur(20px);display:none;flex-direction:column;padding:1rem;gap:12px}
#m-search.open{display:flex}
.m-srch-top{display:flex;align-items:center;gap:10px}
.m-srch-bwrap{position:relative;flex:1}
.m-srch-bwrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.m-srch-box{width:100%;height:44px;padding:0 14px 0 40px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--fb);font-size:15px;outline:none}
.m-srch-box::placeholder{color:var(--muted)}
.m-srch-cancel{background:none;border:none;color:var(--accent);font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;padding:0 4px}
#m-srch-res{overflow-y:auto;flex:1}
.m-srch-slabel{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:10px 1rem 4px}
.m-srch-empty{color:var(--muted);text-align:center;padding:3rem 0;font-size:14px}

// ════════ YOUTUBE API ════════
function ensureYouTubeApi() {
  return new Promise(resolve => {
    if (typeof YT !== 'undefined' && YT.Player) { resolve(); return; }
    if (window.__ytApiLoading) {
      const poll = setInterval(() => {
        if (typeof YT !== 'undefined' && YT.Player) { clearInterval(poll); resolve(); }
      }, 100);
      return;
    }
    window.__ytApiLoading = true;
    window.onYouTubeIframeAPIReady = resolve;
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  });
}

// ════════ IMAGE HELPERS ════════
function clearImageRetry() {
  if (imageRetryTimer) { clearTimeout(imageRetryTimer); imageRetryTimer = null; }
  imageRetryTrackIdx = -1;
}

// Keeps probing the image URL while the track is playing.
// On success: re-inserts artwork and hides the visualizer on both desktop and mobile.
function startImageRetry(t) {
  clearImageRetry();
  if (!t?.imageUrl) return;
  imageRetryTrackIdx = t.idx;

  function attempt(delay) {
    imageRetryTimer = setTimeout(() => {
      if (!currentTrack || currentTrack.idx !== imageRetryTrackIdx) return;
      const freshSrc = t.imageUrl + (t.imageUrl.includes('?') ? '&' : '?') + '_r=' + Date.now();
      const probe = new Image();
      probe.onload = () => {
        if (!currentTrack || currentTrack.idx !== t.idx) return;
        // Restore desktop artwork
        const dpImg   = document.getElementById('dp-img');
        const dpMedia = document.getElementById('dp-media');
        const dpVis   = document.getElementById('dp-vis');
        if (dpImg && dpMedia) {
          dpImg.onerror = null;
          dpImg.src = freshSrc;
          dpImg.style.display = 'block';
          dpMedia.style.display = 'block';
          dpMedia.classList.add('toggleable');
          dpVis.style.display = 'none';
          dpVis.classList.remove('toggleable');
        }
        // Restore mobile now-screen artwork
        const mMedia = document.getElementById('m-now-media');
        if (mMedia) {
          if (visAnim) { cancelAnimationFrame(visAnim); visAnim = null; }
          mMedia.innerHTML = `<img src="${escapeHtml(freshSrc)}" alt="${escapeHtml(t.title)}" style="max-width:100%;max-height:100%;object-fit:contain" loading="eager" onerror="onMobileTrackImageError()"/>`;
          mMedia.classList.add('toggleable');
        }
        // Restore mobile bar thumbnail
        const mbt2 = document.getElementById('m-barthumb');
        if (mbt2) {
          const _ri = document.createElement('img');
          _ri.alt='';_ri.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:8px';
          _ri.onerror=()=>{mbt2.innerHTML=mbt2.dataset.emoji||'🎵';};
          _ri.src=freshSrc;
          mbt2.innerHTML='';mbt2.appendChild(_ri);
        }
        imageRetryTimer = null;
      };
      probe.onerror = () => {
        if (currentTrack?.idx === imageRetryTrackIdx) {
          attempt(4000); // fixed 4s interval
        }
      };
      probe.src = freshSrc;
    }, delay);
  }

  attempt(3000); // first probe after 3 seconds
}

// ─── Thumbnail retry (track list cards / rows) ───
// Shows a text emoji immediately when a thumbnail fails, then keeps probing the
// original URL in the background. When the image finally loads, all matching
// thumbnails on-screen are restored and the emoji spans are removed.
function onThumbError(img) {
  const src = img.dataset.src; if (!src) return;
  img.style.display = 'none';
  const container = img.parentElement;
  if (container && !container.querySelector('.thumb-emoji')) {
    const sp = document.createElement('span');
    sp.className = 'thumb-emoji';
    sp.textContent = img.dataset.emoji || '🎵';
    container.appendChild(sp);
  }
  if (!thumbRetryingSrcs.has(src)) retryThumb(src);
}
function retryThumb(src) {
  thumbRetryingSrcs.add(src);
  setTimeout(() => {
    const fresh = src + (src.includes('?') ? '&' : '?') + '_r=' + Date.now();
    const p = new Image();
    p.onload = () => {
      thumbRetryingSrcs.delete(src);
      document.querySelectorAll('img.thumb-img').forEach(img => {
        if (img.dataset.src !== src) return;
        img.parentElement?.querySelector('.thumb-emoji')?.remove();
        img.onerror = null; img.src = fresh; img.style.display = '';
        img.onerror = function() { onThumbError(this); };
      });
    };
    p.onerror = () => { thumbRetryingSrcs.delete(src); retryThumb(src); };
    p.src = fresh;
  }, 4000);
}

// Called by onerror on the mobile now-screen image — switches to visualizer and starts retry
function onMobileTrackImageError() {
  const media = document.getElementById('m-now-media');
  if (!media || !currentTrack) return;
  const title = currentTrack.title || '';
  media.innerHTML = `<div class="m-now-vis"><div class="m-now-vis-title">${escapeHtml(title)}</div><canvas id="m-vis-cv" style="width:100%;height:100px;display:block"></canvas></div>`;
  mStartVis();
  startImageRetry(currentTrack);
}

// Warm the browser cache for the next/prev track images while current is playing
function preloadAdjacentImages() {
  [qIdx + 1, qIdx - 1].forEach(i => {
    if (i >= 0 && i < queue.length && queue[i]?.imageUrl) {
      new Image().src = queue[i].imageUrl;
    }
  });
}

// ════════ FETCH ════════
async function init() {
  try {
    const csvText = await fetchSheetCSV();
    allTracks = parseCSV(csvText);
    boot();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--red);font-family:var(--fh);font-size:42px">ERROR</div>
       <div style="color:var(--muted);font-size:13px;margin-top:8px;text-align:center;padding:0 2rem">${e.message}<br>Make sure the sheet is published to the web.</div>`;
  }
}

async function fetchSheetCSV() {
  let lastErr = null;
  for (const url of SHEET_CSV_URLS) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (text && text.trim()) return text;
      throw new Error('Empty CSV response');
    } catch (err) { lastErr = err; }
  }
  throw lastErr || new Error('Unable to fetch sheet CSV');
}

function parseCSV(csv) {
  const rows = parseCSVRows(csv).filter(r => r.some(col => cl(col)));
  return rows.slice(1).map((c, i) => {
    if (!cl(c[0])) return null;
    const genre = cl(c[3]);
    return {
      title:      cl(c[0]),
      album:      cl(c[1]) || 'Stashbox Radio',
      artist:     cl(c[2]),
      genre,
      sectionKey: resSec(genre),
      date:       cl(c[4]),
      audioUrl:   fixDb(cl(c[6])),
      imageUrl:   fixDb(cl(c[8])),
      videoUrl:   cl(c[9]),
      videoLink:  cl(c[9]),
      notes:      cl(c[10]),
      plays:      Number(cl(c[11])) || 0,
      songShares: Number(cl(c[15])) || 0,
      idx: i
    };
  }).filter(Boolean);
}

function resSec(g){ return SECTIONS.find(s=>s.key.toLowerCase()===(g||'').toLowerCase())?.key||'Other'; }

function parseCSVRows(csv) {
  const rows=[]; let row=[],cur='',inQ=false;
  for(let i=0;i<csv.length;i++){
    const ch=csv[i],next=csv[i+1];
    if(ch==='"'){if(inQ&&next==='"'){cur+='"';i++;}else inQ=!inQ;continue;}
    if(ch===','&&!inQ){row.push(cur);cur='';continue;}
    if((ch==='\n'||ch==='\r')&&!inQ){
      if(ch==='\r'&&next==='\n')i++;
      row.push(cur);rows.push(row);row=[];cur='';continue;
    }
    cur+=ch;
  }
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  return rows;
}

const cl      = s => (s||'').trim().replace(/^"|"$/g,'');
const fixDb   = u => u ? u.replace('www.dropbox.com','dl.dropboxusercontent.com').replace(/\?dl=[01]/,'') : '';
const escapeHtml = v => String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
const ytEmbed = url => {
  let id='';
  if(url.includes('youtube.com/watch')){try{id=new URL(url).searchParams.get('v')}catch(e){}}
  else if(url.includes('youtu.be/')){id=url.split('youtu.be/')[1].split('?')[0]}
  return id ? `https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1&enablejsapi=1` : url;
};
function grpBySec(tracks){const g={};SECTIONS.forEach(s=>g[s.key]=[]);tracks.forEach(t=>(g[t.sectionKey]||g['Other']).push(t));return g;}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}

function normalizeQueryText(v){ return String(v||'').trim().toLowerCase().replace(/\s+/g,' '); }

function getSharedSongFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const song   = normalizeQueryText(params.get('song'));
  const artist = normalizeQueryText(params.get('artist'));
  if (!song) return null;
  return allTracks.find(t =>
    normalizeQueryText(t.title) === song &&
    (artist ? normalizeQueryText(t.artist) === artist : true)
  ) || null;
}

function loadSharedSongFromUrl() {
  const sharedTrack = getSharedSongFromUrl();
  if (!sharedTrack) return false;
  const sameSec = allTracks.filter(t => t.sectionKey === sharedTrack.sectionKey);
  queue = sameSec.length ? sameSec : [...allTracks];
  qIdx  = Math.max(0, queue.findIndex(t => t.idx === sharedTrack.idx));
  loadTrack(sharedTrack);
  const shouldPlay = new URLSearchParams(window.location.search).get('autoplay') === '1';
  if (shouldPlay) {
    audio.play().catch(() => {});
  } else {
    audio.pause();
    setPlayBtns(true);
  }
  if (isMob()) document.getElementById('m-bar')?.classList.add('vis');
  document.title = `${sharedTrack.title} by ${sharedTrack.artist || 'Stashbox'} | Stashbox Radio`;
  return true;
}

      <div class="mtrack-title">${t.title}</div>
      <div class="mtrack-artist">${t.artist||''}</div>
      ${t.album?`<div class="mtrack-album">${t.album}</div>`:''}
      <div class="mtrack-date">${t.date||''}</div>
    </div>
    <div class="m-play-badge" data-track-plays="${t.idx}">▶ ${t.plays||0}</div>
    <button class="m-song-share-btn" title="Share song" onclick="shareSong(event,${t.idx})">⤴</button>
  </div>`;
}

// ════════ SHARING ════════
function getSongShareUrl(t){
  const base=window.location.origin+window.location.pathname;
  const p=new URLSearchParams();
  if(t?.title) p.set('song',t.title);
  if(t?.artist) p.set('artist',t.artist);
  return `${base}?${p.toString()}`;
}
function recordSongShare(t){
  if(!PLAY_TRACKING_URL||!t)return;
  t.songShares=(Number(t.songShares)||0)+1;
  const payload={type:'radio_song_share',title:t.title||'',artist:t.artist||'',album:t.album||'',genre:t.genre||'',shareUrl:getSongShareUrl(t),page:window.location.pathname,timestamp:new Date().toISOString()};
  fetch(PLAY_TRACKING_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload),keepalive:true}).catch(()=>{});
}
async function shareSong(event,trackIdx){
  if(event){event.preventDefault();event.stopPropagation();}
  const t=allTracks.find(t=>Number(t.idx)===Number(trackIdx));
  if(!t)return;
  recordSongShare(t);
  const data={title:`${t.title} by ${t.artist}`,text:`Listen to ${t.title} by ${t.artist||'Stashbox'} on Stashbox Radio.`,url:getSongShareUrl(t)};
  try{
    if(navigator.share){await navigator.share(data);showShareToast('Share opened');}
    else if(navigator.clipboard?.writeText){await navigator.clipboard.writeText(data.url);showShareToast('Song link copied');}
    else window.prompt('Copy this song link:',data.url);
  }catch(_){}
}
async function copyCurrentSongLink(event){
  if(event){event.preventDefault();event.stopPropagation();}
  if(!currentTrack)return;
  const link=getSongShareUrl(currentTrack);
  recordSongShare(currentTrack);
  try{
    if(navigator.clipboard?.writeText){await navigator.clipboard.writeText(link);showShareToast('Song link copied');}
    else window.prompt('Copy this song link:',link);
  }catch(_){window.prompt('Copy this song link:',link);}
}
function showShareToast(msg){
  let t=document.getElementById('share-toast');
  if(!t){t=document.createElement('div');t.id='share-toast';t.className='share-toast';document.body.appendChild(t);}
  t.textContent=msg||'Song link copied';t.classList.add('visible');
  clearTimeout(window.__shareToastTimer);
  window.__shareToastTimer=setTimeout(()=>t.classList.remove('visible'),1800);
}

// ════════ PLAYBACK ════════
function playFrom(trackIdx,sectionKey,mode) {
  const src=mode==='m'?mFiltered():dFiltered();
  const sec=src.filter(t=>t.sectionKey===sectionKey);
  const fromSec=sec.findIndex(t=>t.idx===trackIdx);
  if(sec.length&&fromSec>=0){queue=sec;qIdx=fromSec;}
  else{queue=src.length?src:allTracks;qIdx=Math.max(0,queue.findIndex(t=>t.idx===trackIdx));}
  if(queue.length)loadTrack(queue[qIdx],{scrollToTop:true});
  if(mode==='m')mOpenNow();
  updateResetBtns();
}
function doShuffle(type,mode,key) {
  const src=mode==='m'?mFiltered():dFiltered();
  if(type==='all')queue=shuf([...allTracks]);
  else if(type==='filtered')queue=shuf([...src]);
  else queue=shuf([...src.filter(t=>t.sectionKey===key)]);
  qIdx=0;loadTrack(queue[0],{scrollToTop:true});
  if(mode==='m')mOpenNow();
  updateResetBtns();
}
function getCurrentPlayableList(){return isMob()?mFiltered():dFiltered();}

function getYouTubeId(url) {
  const v=String(url||'').trim();if(!v)return'';
  const patterns=[/youtube\.com\/watch\?v=([^&]+)/i,/youtu\.be\/([^?&]+)/i,/youtube\.com\/embed\/([^?&]+)/i,/youtube\.com\/shorts\/([^?&]+)/i];
  for(const p of patterns){const m=v.match(p);if(m&&m[1])return m[1].trim();}
  return'';
}

function switchToVideoMode() {
  playerMode='video';
  const dpImg=document.getElementById('dp-img');
  const dpVis=document.getElementById('dp-vis');
  const dpMedia=document.getElementById('dp-media');
  const dpVid=document.getElementById('dp-vid');
  if(dpImg)dpImg.style.display='none';
  if(dpVis)dpVis.style.display='none';
  if(dpMedia)dpMedia.style.display='block';
  if(dpVid){dpVid.style.display='none';dpVid.src='';}
  if(dpYouTubeWrap)dpYouTubeWrap.hidden=false;
}
function switchToAudioMode() {
  playerMode='audio';videoMode=false;youtubePlaying=false;
  const dpVid=document.getElementById('dp-vid');
  if(dpVid){dpVid.style.display='none';dpVid.src='';}
  if(dpYouTubeWrap)dpYouTubeWrap.hidden=true;
  if(youtubePlayer&&typeof youtubePlayer.stopVideo==='function'){try{youtubePlayer.stopVideo();}catch(e){}}
}

function postToYouTube(command) {
  const iframe=document.getElementById('dp-vid');
  if(!iframe||!iframe.contentWindow)return;
  iframe.contentWindow.postMessage(JSON.stringify({event:'command',func:command,args:[]}),'*');
}
function playYouTubeVideo(){postToYouTube('playVideo');}
function pauseYouTubeVideo(){postToYouTube('pauseVideo');}
function toggleYouTubePlayback(){
  if(!youtubePlayer)return;
  if(youtubePlaying){
    try{youtubePlayer.pauseVideo();}catch(e){}
    youtubePlaying=false;setPlayBtns(true);
  }else{
    try{youtubePlayer.playVideo();}catch(e){}
    youtubePlaying=true;setPlayBtns(false);
  }
}

function playVideoForTrack(track) {
  if(!audio||!track)return;
  const videoId=getYouTubeId(track.videoLink||track.videoUrl);
  if(!videoId)return;
  audio.pause();
  videoMode=true;youtubePlaying=true;setPlayBtns(false);
  switchToVideoMode();
  ensureYouTubeApi().then(()=>{
    if(typeof YT==='undefined'||!YT.Player)return;
    if(!youtubePlayer){
      youtubePlayer=new YT.Player('youtube-player',{
        videoId,playerVars:{autoplay:1,playsinline:1},
        events:{onStateChange:e=>{if(e.data===YT.PlayerState.ENDED)playNextAfterVideoEnd();}}
      });
    }else{youtubePlayer.loadVideoById(videoId);}
  });
}

function playNextAfterVideoEnd() {
  const list=getCurrentPlayableList(),current=currentTrack;
  const vids=list.filter(t=>t&&t!==current&&String(t.videoLink||'').trim());
  if(vids.length){const n=vids[Math.floor(Math.random()*vids.length)];loadTrack(n);playVideoForTrack(n);return;}
  const auds=list.filter(t=>t&&t!==current&&String(t.audioUrl||'').trim());
  if(auds.length){const n=auds[Math.floor(Math.random()*auds.length)];loadTrack(n);switchToAudioMode();audio.play().catch(()=>{});return;}
  switchToAudioMode();playNext();
}

function watchCurrentTrackVideo(event) {
  if(event){event.preventDefault();event.stopPropagation();}
  if(!currentTrack||!String(currentTrack.videoLink||currentTrack.videoUrl||'').trim())return;
  playVideoForTrack(currentTrack);
}
function playNext() {
  if(!queue.length)return;switchToAudioMode();
  const dpVid=document.getElementById('dp-vid');if(dpVid)dpVid.src='';
  qIdx=radioMode?Math.floor(Math.random()*queue.length):(qIdx+1)%queue.length;
  loadTrack(queue[qIdx]);
}
function playPrev() {
  if(!queue.length)return;switchToAudioMode();
  const dpVid=document.getElementById('dp-vid');if(dpVid)dpVid.src='';
  qIdx=(qIdx-1+queue.length)%queue.length;loadTrack(queue[qIdx]);
}
function togglePause() {
  if(!audio)return;
  if(videoMode){toggleYouTubePlayback();return;}
  if(!currentTrack){
    const list=getCurrentPlayableList();
    const first=list.find(t=>String(t?.audioUrl||'').trim())||allTracks.find(t=>String(t?.audioUrl||'').trim());
    if(!first)return;
    queue=list.length?list:[...allTracks];
    qIdx=Math.max(0,queue.findIndex(t=>t.idx===first.idx));
    loadTrack(first);return;
  }
  if(currentTrack.audioUrl&&audio.src!==currentTrack.audioUrl){audio.src=currentTrack.audioUrl;updateMediaSession(currentTrack);}
  audio.paused?audio.play().catch(()=>{}):audio.pause();
}
function togglePauseFromArtwork(e) {
  if(!currentTrack?.audioUrl)return;
  if(e?.target?.closest('iframe'))return;
  togglePause();
}
function toggleRadio() {
  radioMode=!radioMode;
  document.getElementById('d-radio')?.classList.toggle('ron',radioMode);
  document.getElementById('m-radio')?.classList.toggle('ron',radioMode);
}

// ════════ SCRUBBER ════════
function fmtTime(s){if(!Number.isFinite(s)||s<0)return'0:00';const m=Math.floor(s/60);return`${m}:${String(Math.floor(s%60)).padStart(2,'0')}`;}
function updateDesktopTimes(){
  if(!dpCur||!dpDur)return;
  dpCur.textContent=fmtTime(audio.currentTime||0);
  dpDur.textContent=fmtTime(audio.duration||0);
  if(dpTypical&&audio.duration){const m=audio.duration/60;dpTypical.textContent=`Typical song length: ${Math.max(1,Math.floor(m-1))}:00–${Math.ceil(m+1)}:00`;}
}

// ════════ AUDIO EVENTS ════════
audio.addEventListener('ended',()=>{sendListenTime('ended');recordSongFullPlay(currentTrack,playSessionId);playNextAfterVideoEnd();});
audio.addEventListener('play',()=>{setPlayBtns(false);resumeListenClock();recordSongPlay(currentTrack,playSessionId);});
audio.addEventListener('pause',()=>{setPlayBtns(true);pauseListenClock();});
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  const pct=audio.currentTime/audio.duration*100;
  const el=document.getElementById('m-prog');if(el)el.style.width=pct+'%';
  if(dpScrubber&&!isScrubbingDesktop)dpScrubber.value=String(pct);
  updateDesktopTimes();
});
audio.addEventListener('loadedmetadata',()=>{if(dpScrubber)dpScrubber.value='0';updateDesktopTimes();});

// Retry on audio load failure — up to 2 attempts, then skip to next track
audio.addEventListener('error', () => {
  if (!currentTrack?.audioUrl) return;
  if (audioRetryCount >= 2) { setTimeout(()=>playNext(), 1500); return; }
  audioRetryCount++;
  const sep = currentTrack.audioUrl.includes('?') ? '&' : '?';
  const retryUrl = currentTrack.audioUrl + sep + '_r=' + Date.now();
  setTimeout(() => {
    audio.src = retryUrl;
    audio.load();
    audio.play().catch(() => {});
  }, 1500 * audioRetryCount);
});

// Stall watchdog — detects when currentTime stops advancing while supposedly playing
// (keeps music going when screen is locked or browser throttles JS)
let _stallTimer=null,_lastCT=-1,_lastCTAt=0;
function _startStallWatchdog(){
  _clearStallWatchdog();
  _lastCT=audio.currentTime;_lastCTAt=Date.now();
  _stallTimer=setInterval(()=>{
    if(audio.paused||audio.ended)return;
    if(audio.currentTime!==_lastCT){_lastCT=audio.currentTime;_lastCTAt=Date.now();return;}
    if(Date.now()-_lastCTAt>9000){
      // currentTime hasn't moved in 9s — try to resume, or skip
      audio.play().catch(()=>playNext());
      _lastCTAt=Date.now(); // reset so we don't spam
    }
  },3000);
}
function _clearStallWatchdog(){if(_stallTimer){clearInterval(_stallTimer);_stallTimer=null;}}
audio.addEventListener('play',()=>{_startStallWatchdog();});
audio.addEventListener('pause',()=>{_clearStallWatchdog();});
audio.addEventListener('ended',()=>{_clearStallWatchdog();});
// Browser stopped fetching data — reload from current position
audio.addEventListener('stalled',()=>{
  if(audio.paused||!currentTrack?.audioUrl)return;
  setTimeout(()=>{
    if(!audio.paused){const ct=audio.currentTime;audio.load();audio.currentTime=ct;audio.play().catch(()=>{});}
  },3000);
});

function setPlayBtns(paused){
  const icon=paused?'&#9654;':'&#9646;&#9646;';
  ['d-pp','m-bar-pp','m-nc-pp'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=icon;});
}

// ════════ TRACKING ════════
function recordSongPlay(t,sessionId){
  if(!PLAY_TRACKING_URL||!t||!sessionId)return;
  const key=`${sessionId}:${t.idx}:${t.title}`;
  if(trackedPlaySessions.has(key))return;
  trackedPlaySessions.add(key);
  t.plays=(Number(t.plays)||0)+1;
  updateCurrentPlaysDisplay(t);
  fetch(PLAY_TRACKING_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({type:'radio_play',title:t.title||'',artist:t.artist||'',album:t.album||'',genre:t.genre||'',audioUrl:t.audioUrl||'',page:window.location.pathname,timestamp:new Date().toISOString()})}).catch(()=>{});
}
function recordSongFullPlay(t,sessionId){
  if(!PLAY_TRACKING_URL||!t||!sessionId)return;
  fetch(PLAY_TRACKING_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({type:'radio_full_play',title:t.title||'',artist:t.artist||'',album:t.album||'',genre:t.genre||'',audioUrl:t.audioUrl||'',page:window.location.pathname,timestamp:new Date().toISOString()})}).catch(()=>{});
}
function startListenSession(t,sessionId){
  if(!t||!sessionId)return;
  activeListenSession={track:t,sessionId,startedAt:Date.now(),accumulatedMs:0,lastPlayStartedAt:audio&&!audio.paused?Date.now():null};
}
function pauseListenClock(){
  if(!activeListenSession?.lastPlayStartedAt)return;
  activeListenSession.accumulatedMs+=Date.now()-activeListenSession.lastPlayStartedAt;
  activeListenSession.lastPlayStartedAt=null;
}
function resumeListenClock(){
  if(!activeListenSession)return;
  if(!activeListenSession.lastPlayStartedAt)activeListenSession.lastPlayStartedAt=Date.now();
}
function getActiveListenedSeconds(){
  if(!activeListenSession)return 0;
  let ms=activeListenSession.accumulatedMs||0;
  if(activeListenSession.lastPlayStartedAt)ms+=Date.now()-activeListenSession.lastPlayStartedAt;
  return Math.round(ms/1000);
}
function sendListenTime(reason){
  if(!PLAY_TRACKING_URL||!activeListenSession?.track)return;
  pauseListenClock();
  const t=activeListenSession.track,sid=activeListenSession.sessionId;
  const key=`${sid}:${t.idx}:${t.title}`;
  if(listenTimeSentSessions.has(key))return;
  const secs=getActiveListenedSeconds();
  if(!secs||secs<=0)return;
  listenTimeSentSessions.add(key);
  fetch(PLAY_TRACKING_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({type:'radio_listen_time',title:t.title||'',artist:t.artist||'',album:t.album||'',genre:t.genre||'',audioUrl:t.audioUrl||'',listenedSeconds:secs,reason:reason||'',page:window.location.pathname,timestamp:new Date().toISOString()}),keepalive:true}).catch(()=>{});
  activeListenSession=null;
}
function updateCurrentPlaysDisplay(t){
  if(!t)return;
  const txt=`▶ ${Number(t.plays)||0} Plays`,short=`▶ ${Number(t.plays)||0}`;
  const dp=document.getElementById('dp-plays');if(dp)dp.textContent=txt;
  const mn=document.getElementById('m-now-plays');if(mn)mn.textContent=txt;
  const mb=document.getElementById('m-barplays');if(mb)mb.textContent=txt;
  document.querySelectorAll(`[data-track-plays="${t.idx}"]`).forEach(el=>el.textContent=el.classList.contains('m-play-badge')?short:txt);
}

// ════════ MEDIA SESSION ════════
function updateMediaSession(t){
  if(!('mediaSession' in navigator)||typeof MediaMetadata==='undefined'||!t)return;
  const rawUrl=t.imageUrl||'';
  const artUrl=rawUrl?(rawUrl+(rawUrl.includes('?')?'&':'?')+'mediaArtwork=1'):'';
  const sizes=['96x96','128x128','192x192','256x256','384x384','512x512'];
  const types=['image/jpeg','image/png'];
  const artwork=[];
  sizes.forEach(sz=>types.forEach(tp=>{
    if(artUrl)artwork.push({src:artUrl,sizes:sz,type:tp});
    if(rawUrl)artwork.push({src:rawUrl,sizes:sz,type:tp});
  }));
  navigator.mediaSession.metadata=new MediaMetadata({title:t.title||'Stashbox Radio',artist:t.artist||'Stashbox',album:t.album||'Stashbox Radio',artwork});
  navigator.mediaSession.setActionHandler('play',()=>audio.play());
  navigator.mediaSession.setActionHandler('pause',()=>audio.pause());
  navigator.mediaSession.setActionHandler('previoustrack',playPrev);
  navigator.mediaSession.setActionHandler('nexttrack',playNext);
}

function scrollToPlayerTop(){
  const mobileScroll=document.getElementById('m-scroll');
  if(mobileScroll)mobileScroll.scrollTo({top:0,behavior:'smooth'});
  window.scrollTo({top:0,behavior:'smooth'});
}

// ════════ LOAD TRACK ════════
function loadTrack(t,options={}) {
  if(!t||!audio)return;
  audioRetryCount=0;   // reset retry counter for new track
  clearImageRetry();   // cancel any in-flight image retry from previous track
  const shouldScrollToTop=options.scrollToTop===true;
  if(currentTrack&&activeListenSession)sendListenTime('track_changed');

  currentTrack=t;
  window.currentTrack=t;   // expose for shop1.js
  videoMode=false;youtubePlaying=false;
  updateMediaSession(t);
  switchToAudioMode();
  playSessionId++;
  startListenSession(t,playSessionId);

  const sec=SECTIONS.find(s=>s.key===t.sectionKey)||SECTIONS[SECTIONS.length-1];
  if(visAnim){cancelAnimationFrame(visAnim);visAnim=null;}

  // ── Desktop ──
  const dpEl=document.getElementById('dp');
  const dpMedia=document.getElementById('dp-media');
  const dpImg=document.getElementById('dp-img');
  const dpVid=document.getElementById('dp-vid');
  const dpVis=document.getElementById('dp-vis');
  const dpAudio=document.getElementById('dp-awrap');
  const dpScrub=document.getElementById('dp-scrub');

  dpEl.style.display='block';
  dpImg.style.display='none';dpVid.style.display='none';dpVid.src='';
  if(dpYouTubeWrap)dpYouTubeWrap.hidden=true;
  dpMedia.style.display='none';dpVis.style.display='none';dpAudio.style.display='none';
  if(dpScrub)dpScrub.style.display='none';
  dpMedia.classList.remove('toggleable');dpVis.classList.remove('toggleable');

  if(t.imageUrl){
    dpImg.src=t.imageUrl;
    dpImg.style.display='block';
    dpMedia.style.display='block';
    dpMedia.classList.add('toggleable');
    dpAudio.style.display='block';
    if(dpScrub)dpScrub.style.display='block';
    dpAudio.appendChild(audio);
    // If the player image fails, fall through to visualizer and keep retrying in background
    dpImg.onerror=function(){
      this.onerror=null;
      this.style.display='none';
      dpMedia.style.display='none';
      dpMedia.classList.remove('toggleable');
      document.getElementById('dp-vis-title').textContent=t.title;
      dpVis.style.display='flex';
      dpVis.classList.add('toggleable');
      dStartVis();
      startImageRetry(t);
    };
    if(t.audioUrl){audio.src=t.audioUrl;updateMediaSession(t);audio.play().catch(()=>{});}
  }else{
    document.getElementById('dp-vis-title').textContent=t.title;
    dpVis.style.display='flex';dpAudio.style.display='block';if(dpScrub)dpScrub.style.display='block';dpAudio.appendChild(audio);
    dpVis.classList.add('toggleable');
    if(t.audioUrl){audio.src=t.audioUrl;updateMediaSession(t);audio.play().catch(()=>{});}
    dStartVis();
  }

  document.getElementById('dp-title').textContent=t.title;
  document.getElementById('dp-artist').textContent=t.artist||'';
  const dpAlbum=document.getElementById('dp-album');
  if(dpAlbum){dpAlbum.textContent=t.album||'';dpAlbum.style.display=t.album?'inline':'none';}
  const dg=document.getElementById('dp-gtag');dg.textContent=t.genre||'';dg.style.background=sec.color+'22';dg.style.color=sec.color;
  const dn=document.getElementById('dp-notes');dn.textContent=t.notes||'';dn.style.display=t.notes?'block':'none';
  const dpPlays=document.getElementById('dp-plays');if(dpPlays)dpPlays.textContent=`▶ ${t.plays||0} Plays`;
  const dpShare=document.getElementById('dp-share');if(dpShare)dpShare.style.display='inline-flex';
  const watchBtn=document.getElementById('watch-video-btn');
  if(watchBtn)watchBtn.classList.toggle('is-visible',!!String(t.videoLink||t.videoUrl||'').trim());

  // ── Mobile bar ──
  document.getElementById('m-bar').classList.add('vis');
  document.getElementById('m-bartitle').textContent=t.title;
  document.getElementById('m-barartist').textContent=t.artist||'';
  const mBarPlays=document.getElementById('m-barplays');if(mBarPlays)mBarPlays.textContent=`▶ ${t.plays||0} Plays`;
  const mbt=document.getElementById('m-barthumb');
  mbt.dataset.emoji=sec.emoji;
  if(t.imageUrl){
    const _bi=document.createElement('img');
    _bi.alt='';_bi.loading='lazy';_bi.decoding='async';
    _bi.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:8px';
    _bi.onerror=()=>{mbt.innerHTML=mbt.dataset.emoji||'🎵';};
    _bi.src=t.imageUrl;
    mbt.innerHTML='';mbt.appendChild(_bi);
  }else{mbt.innerHTML=sec.emoji;}

  // ── Mobile now screen ──
  document.getElementById('m-now-title').textContent=t.title;
  document.getElementById('m-now-artist').textContent=t.artist||'';
  const mAlbumEl=document.getElementById('m-now-album');if(mAlbumEl)mAlbumEl.textContent=t.album?'· '+t.album:'';
  const mg=document.getElementById('m-now-gtag');mg.textContent=t.genre||'';mg.style.background=sec.color+'22';mg.style.color=sec.color;
  const mn=document.getElementById('m-now-notes');mn.textContent=t.notes||'';mn.style.display=t.notes?'block':'none';
  const mNowPlays=document.getElementById('m-now-plays');if(mNowPlays)mNowPlays.textContent=`▶ ${t.plays||0} Plays`;
  const mNowShare=document.getElementById('m-now-share');if(mNowShare)mNowShare.style.display='inline-flex';
  document.getElementById('m-qlabel').textContent=queue.length?`${qIdx+1} of ${queue.length} in queue`:'';

  const mMedia=document.getElementById('m-now-media');
  const mAudio=document.getElementById('m-now-audio');
  const mNowArtInline=document.getElementById('m-now-art-inline');
  mAudio.style.display='none';mMedia.classList.remove('toggleable');
  if(mNowArtInline){mNowArtInline.style.display='none';mNowArtInline.innerHTML='';}

  if(t.imageUrl){
    // onerror calls onMobileTrackImageError() which switches to visualizer
    mMedia.innerHTML=`<img src="${escapeHtml(t.imageUrl)}" alt="${escapeHtml(t.title)}" style="max-width:100%;max-height:100%;object-fit:contain" loading="lazy" onerror="onMobileTrackImageError()"/>`;
    if(mNowArtInline){
      mNowArtInline.innerHTML=`<img src="${escapeHtml(t.imageUrl)}" alt="${escapeHtml(t.title)}" loading="lazy" onerror="this.closest('.m-now-art-inline').style.display='none'"/>`;
      mNowArtInline.style.display='block';
    }
    mMedia.classList.add('toggleable');
    mAudio.style.display='block';mAudio.appendChild(audio);
    if(t.audioUrl){audio.src=t.audioUrl;updateMediaSession(t);audio.play().catch(()=>{});}
  }else{
    mMedia.innerHTML=`<div class="m-now-vis"><div class="m-now-vis-title">${escapeHtml(t.title)}</div><canvas id="m-vis-cv" style="width:100%;height:100px;display:block"></canvas></div>`;
    mMedia.classList.add('toggleable');
    mAudio.style.display='block';mAudio.appendChild(audio);
    if(t.audioUrl){audio.src=t.audioUrl;updateMediaSession(t);audio.play().catch(()=>{});}
    mStartVis();
  }

  dRender(); mRender();

  if(shouldScrollToTop)scrollToPlayerTop();

  // Notify shop — guarded so missing shop1.js never breaks playback
  if(typeof window.updateRadioMerch==='function'){
    window.updateRadioMerch(t);
  }
  window.dispatchEvent(new CustomEvent('stashbox:trackchange',{detail:{track:t}}));

  // Warm the cache for adjacent tracks so next/prev transitions are instant
  preloadAdjacentImages();
}

// ════════ VISUALIZERS ════════
function dStartVis(){const cv=document.getElementById('d-vis-cv');if(!cv)return;cv.width=cv.offsetWidth||800;cv.height=80;runVis(cv,48);}
function mStartVis(){setTimeout(()=>{const cv=document.getElementById('m-vis-cv');if(!cv)return;cv.width=cv.offsetWidth||window.innerWidth;cv.height=100;runVis(cv,40);},60);}
function runVis(cv,bars){
  if(visAnim){cancelAnimationFrame(visAnim);visAnim=null;}
  const ctx=cv.getContext('2d');let phase=0;
  function draw(){
    const w=cv.width,h=cv.height,bw=(w/bars)-1;
    ctx.clearRect(0,0,w,h);
    for(let i=0;i<bars;i++){const amp=0.25+0.75*Math.abs(Math.sin(i*0.25+phase));const bh=amp*h*0.85;ctx.fillStyle=`rgba(240,165,0,${0.3+amp*0.6})`;ctx.fillRect(i*(bw+1),h-bh,bw,bh);}
    phase+=0.06;visAnim=requestAnimationFrame(draw);
  }
  draw();
}

// ════════ MOBILE NOW ════════
function mOpenNow(){document.getElementById('m-now').classList.add('open');}
function mCloseNow(){document.getElementById('m-now').classList.remove('open');}
let _ty=0;
document.getElementById('m-now').addEventListener('touchstart',e=>{_ty=e.touches[0].clientY},{passive:true});
document.getElementById('m-now').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-_ty>80)mCloseNow();},{passive:true});
document.getElementById('dp-media')?.addEventListener('click',togglePauseFromArtwork);
document.getElementById('dp-vis')?.addEventListener('click',togglePauseFromArtwork);
document.getElementById('m-now-media')?.addEventListener('click',togglePauseFromArtwork);

// ════════ MOBILE SEARCH ════════
function mOpenSearch(){document.getElementById('m-search').classList.add('open');setTimeout(()=>document.getElementById('m-srch-box').focus(),100);}
function mCloseSearch(){document.getElementById('m-search').classList.remove('open');document.getElementById('m-srch-box').value='';document.getElementById('m-srch-res').innerHTML='';}
function mDoSearch(){
  const q=document.getElementById('m-srch-box').value.toLowerCase().trim();
  const res=document.getElementById('m-srch-res');
  if(!q){res.innerHTML='';return;}
  const matches=allTracks.filter(t=>[t.title,t.artist,t.genre,t.notes].some(f=>(f||'').toLowerCase().includes(q))).slice(0,40);
  if(!matches.length){res.innerHTML='<div class="m-srch-empty">No results found.</div>';return;}
  const groups=grpBySec(matches);
  res.innerHTML=SECTIONS.map(sec=>{
    const tracks=groups[sec.key];if(!tracks.length)return'';
    return `<div class="m-srch-slabel">${sec.emoji} ${sec.key}</div>`+
      tracks.map((t,i)=>mRow(t,i,sec).replace(`onclick="playFrom(${t.idx},'${sec.key}','m')"`,`onclick="mCloseSearch();playFrom(${t.idx},'${sec.key}','m')"`)).join('');
  }).join('');
}

// ════════ SCRUBBER BINDING ════════
if(dpScrubber){
  const seekFromInput=()=>{if(!audio.duration)return;audio.currentTime=(Number(dpScrubber.value||0)/100)*audio.duration;updateDesktopTimes();};
  dpScrubber.addEventListener('input',()=>{isScrubbingDesktop=true;seekFromInput();});
  dpScrubber.addEventListener('change',()=>{isScrubbingDesktop=false;seekFromInput();});
}

window.addEventListener('beforeunload',()=>sendListenTime('page_exit'));

// ════════ START ════════
init();
switchToAudioMode();
if(watchVideoBtn)watchVideoBtn.classList.remove('is-visible');
</script>
