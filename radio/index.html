<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stashbox Radio — Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Karla:ital,opsz,wght@0,8..40,300;0,8..40,400;0,8..40,500;0,8..40,600;1,8..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;
  --surface:#131316;
  --surface2:#1a1a1f;
  --surface3:#222228;
  --border:rgba(255,255,255,0.06);
  --border-h:rgba(255,255,255,0.14);
  --text:#eeeae3;
  --muted:#666;
  --muted2:#3a3a3a;
  --accent:#f0a500;
  --accent-d:rgba(240,165,0,0.1);
  --accent2:#e05c2a;
  --green:#3ecf6e;
  --red:#e05c5c;
  --fh:'Bebas Neue',sans-serif;
  --fb:'Karla',sans-serif;
}
html{scroll-behavior:smooth;width:100%;max-width:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;min-height:100vh;overflow-x:hidden;width:100%;max-width:100%}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px)}

/* ── LOADING ── */
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem}
.loading-logo{font-family:var(--fh);font-size:64px;color:var(--accent);letter-spacing:0.06em;animation:pulse 1.4s ease-in-out infinite}
.loading-sub{font-size:13px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:rgba(12,12,14,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1400px;margin:0 auto;padding:0.5rem 1.5rem;display:flex;align-items:center;gap:1rem;min-height:58px;flex-wrap:wrap}
.nav-logo{font-family:var(--fh);font-size:30px;letter-spacing:0.06em;color:var(--accent);white-space:nowrap}
.nav-logo span{color:var(--text)}
.nav-divider{width:1px;height:24px;background:var(--border);flex-shrink:0}
.nav-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1 1 520px;min-width:0}
.radio-filter-strip{background:var(--accent);padding:10px;border-radius:10px}
#genre-chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filter-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.chip{min-height:44px;padding:0 14px;border-radius:100px;font-size:12px;font-weight:600;font-family:var(--fb);border:1px solid var(--border);background:rgba(0,0,0,0.08);color:#2b210d;cursor:pointer;transition:all 0.15s;white-space:nowrap;letter-spacing:0.04em}
.chip:hover{border-color:var(--border-h);color:var(--text)}
.chip.active{background:#0c0c0e;border-color:#0c0c0e;color:var(--accent)}
.chip.video-chip.active{background:rgba(62,207,110,0.1);border-color:var(--green);color:var(--green)}
.chip-reset{background:#0c0c0e;color:var(--text);border-color:#0c0c0e}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.track-total{font-size:12px;color:var(--muted);white-space:nowrap}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-inp{width:180px;height:32px;padding:0 12px 0 30px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none;transition:border-color 0.2s}
.search-inp::placeholder{color:var(--muted)}
.search-inp:focus{border-color:var(--border-h);width:220px}


.filter-drawer-tab{display:none}
#now-banner{scroll-margin-top:160px}

@media(min-width:701px){
  .nav-inner{flex-wrap:nowrap}
  .radio-filter-strip{padding:8px 10px}
  .page{padding-top:1.5rem}
  #now-banner{margin-top:0.75rem}
}

/* ── PAGE ── */
.page{max-width:1400px;margin:0 auto;padding:1.5rem}
#app{display:none}

/* ── NOW PLAYING BANNER ── */
#now-banner{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  margin-bottom:1.5rem;overflow:hidden;
}
.b-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:14px}
.b-btn:hover{border-color:var(--border-h);color:var(--text)}
.b-btn.play-pause{width:44px;height:44px;background:var(--accent);border-color:var(--accent);color:#0c0c0e;font-size:18px}
.b-btn.play-pause:hover{opacity:0.88}
.b-btn.radio-on{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
audio::-webkit-media-controls-panel{background:var(--surface2)}

/* ── VIDEO MODAL ── */
#video-modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;padding:2rem}
.modal-inner{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;max-width:860px;width:100%}
.modal-header{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--fh);font-size:22px;letter-spacing:0.04em;color:var(--text)}
.modal-close{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;width:32px;height:32px;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.modal-close:hover{border-color:var(--border-h);color:var(--text)}
#modal-iframe{width:100%;aspect-ratio:16/9;border:none}

/* ── SECTIONS ── */
.section{margin-bottom:2rem}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)}
.section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.section-name{font-family:var(--fh);font-size:26px;letter-spacing:0.05em;color:var(--text)}
.section-count{font-size:12px;color:var(--muted);letter-spacing:0.06em}
.section-shuffle{margin-left:auto;height:30px;padding:0 14px;font-size:11px;font-weight:600;font-family:var(--fb);letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s}
.section-shuffle:hover{border-color:var(--border-h);color:var(--text)}
.section-empty{padding:1.5rem;text-align:center;color:var(--muted);font-size:13px;background:var(--surface);border-radius:10px;border:1px dashed var(--border)}

/* ── SHUFFLE ALL HERO ── */
.shuffle-hero{
  background:linear-gradient(135deg,rgba(240,165,0,0.12) 0%,rgba(224,92,42,0.08) 100%);
  border:1px solid rgba(240,165,0,0.25);border-radius:14px;
  padding:1.75rem 2rem;margin-bottom:1.75rem;
  display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;
}
.shuffle-hero-text{}
.shuffle-hero-title{font-family:var(--fh);font-size:clamp(28px,5vw,44px);letter-spacing:0.05em;color:var(--text);line-height:1}
.shuffle-hero-sub{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:0.04em}
.shuffle-hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-shuffle-all{
  font-family:var(--fh);font-size:22px;letter-spacing:0.08em;
  padding:12px 36px;background:var(--accent);color:#0c0c0e;
  border:none;border-radius:10px;cursor:pointer;
  transition:opacity 0.2s,transform 0.15s;white-space:nowrap;
}
.btn-shuffle-all:hover{opacity:0.88;transform:translateY(-1px)}
.btn-shuffle-all:active{transform:translateY(0)}
.btn-shuffle-filtered{
  font-family:var(--fh);font-size:18px;letter-spacing:0.06em;
  padding:12px 24px;background:transparent;color:var(--accent);
  border:1px solid var(--accent);border-radius:10px;cursor:pointer;
  transition:all 0.2s;white-space:nowrap;display:none;
}
.btn-shuffle-filtered:hover{background:var(--accent-d)}

/* ── EXPANDED NOW-PLAYING PLAYER ── */
#now-banner{
  flex-direction:column;align-items:stretch;padding:0;overflow:hidden;
  border-radius:14px;
}
.player-media{
  width:100%;position:relative;background:#000;
  display:none;
  border-radius:14px 14px 0 0;
}
.player-media img{width:100%;max-height:420px;object-fit:contain;display:block;background:#000}
.player-media iframe,.player-media video{width:100%;aspect-ratio:16/9;border:none;display:block;min-height:200px}
.player-vis-wrap{
  display:none;width:100%;height:120px;
  border-radius:14px 14px 0 0;background:var(--surface2);
  align-items:flex-end;justify-content:center;padding:0 0 8px;overflow:hidden;
  position:relative;
}
.player-vis-title{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--fh);font-size:clamp(18px,4vw,32px);letter-spacing:0.04em;
  color:rgba(255,255,255,0.18);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:90%;text-align:center;
}
#vis-canvas-full{width:100%;height:80px;display:block}
.player-bottom{display:flex;align-items:center;gap:10px;padding:12px 16px;flex-wrap:wrap}
.player-info{flex:1;min-width:0}
.player-title{font-family:var(--fh);font-size:18px;letter-spacing:0.04em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-meta{font-size:12px;color:var(--muted);margin-top:2px}
.player-genre-tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-left:6px}
.player-notes{font-size:11px;color:var(--muted);font-style:italic;margin-top:3px}
.player-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.player-audio-wrap{width:100%;padding:0 16px 12px;display:none}
.player-audio-wrap audio{width:100%;height:32px;accent-color:var(--accent)}

/* ── TRACK CARDS ── */
.tracks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.track-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;
}
.track-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background 0.2s}
.track-card:hover{border-color:var(--border-h);background:var(--surface2)}
.track-card.playing{border-color:var(--accent);background:var(--accent-d)}
.track-card.playing::before{background:var(--accent)}
.card-num{font-size:11px;color:var(--muted2);width:20px;text-align:center;flex-shrink:0;font-weight:500}
.track-card.playing .card-num{color:var(--accent)}
.card-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0;display:none;background:var(--surface3)}
.card-thumb-placeholder{width:40px;height:40px;border-radius:6px;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.card-info{flex:1;min-width:0;padding-right:4px}
.card-title{font-size:13px;font-weight:600;color:var(--text);white-space:normal;overflow:visible;word-break:break-word;line-height:1.25}
.media-type-badge{display:inline-flex;align-items:center;justify-content:center;font-size:11px;line-height:1;margin-left:6px;vertical-align:middle;opacity:0.9}
.card-artist{font-size:11px;color:var(--muted);margin-top:1px}
.card-date{font-size:10px;color:var(--muted2);margin-top:1px}
.card-video-btn{
  border:1px solid var(--accent);
  background:rgba(62,207,110,0.08);
  color:var(--accent);
  border-radius:999px;
  font-size:10px;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:4px 8px;
  margin-top:6px;
  cursor:pointer;
}
.card-video-btn:hover{background:rgba(62,207,110,0.18)}
.play-icon{font-size:16px;color:var(--muted);flex-shrink:0;transition:color 0.15s}
.track-card:hover .play-icon{color:var(--accent)}
.track-card.playing .play-icon{color:var(--accent)}

/* ── NO RESULTS ── */
.no-results{text-align:center;padding:4rem 2rem;color:var(--muted)}
.no-results .big{font-family:var(--fh);font-size:48px;color:var(--muted2);display:block;margin-bottom:0.5rem}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .nav-inner{padding:10px;position:relative;overflow:visible;height:auto;min-height:58px;padding-bottom:66px}
  .nav-logo{font-size:clamp(24px,7vw,30px);line-height:1}
  .nav-filters{width:min(86vw,340px);order:2;position:absolute;right:0;top:56px;z-index:120;border-radius:10px 0 0 10px;padding-left:42px;transform:translateX(0);transition:transform 0.25s ease,opacity 0.2s ease;max-height:calc(100vh - 84px);overflow-y:auto}
  .nav-filters.drawer-hidden{transform:translateX(100%);opacity:0.96;pointer-events:none}
  .filter-drawer-tab{display:flex;order:2;position:absolute;right:0;top:56px;width:34px;height:46px;align-items:center;justify-content:center;border:none;border-radius:8px 0 0 8px;background:var(--accent);color:#0c0c0e;font-size:20px;font-weight:700;z-index:121;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.35)}
  .filter-drawer-tab.open{right:calc(min(86vw,340px) - 34px)}
  .filter-label{width:100%}
  .nav-right{position:absolute;left:10px;right:48px;top:64px;width:auto;order:3;margin-left:0;justify-content:space-between;gap:8px;align-items:center}
  .track-total{font-size:11px;max-width:42vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tracks-grid{grid-template-columns:1fr}
  .search-inp{width:138px}
  .search-inp:focus{width:154px}
  audio{min-width:120px}
  #now-banner{top:auto;position:relative}
  .player-bottom{flex-direction:column;align-items:center;text-align:center}
  .player-controls{justify-content:center}
  .card-video-btn{display:none}
}

@media(max-width:700px) and (orientation:landscape){
  .nav-inner{padding-bottom:56px}
  .nav-right{top:60px}
  .nav-filters{width:min(72vw,420px)}
  .filter-drawer-tab.open{right:calc(min(72vw,420px) - 34px)}
  .search-inp{width:180px}
  .search-inp:focus{width:220px}
}
@media(max-width:900px){
  .page{padding:1rem}
}
@media(max-width:640px){
  .shuffle-hero{padding:1rem}
  .section-header{flex-wrap:wrap}
  .section-shuffle{margin-left:0}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loading-logo">STASHBOX</div>
  <div class="loading-sub">Loading your songs…</div>
</div>

<!-- Nav -->
<nav id="nav" style="display:none">
  <div class="nav-inner">
    <div class="nav-logo">STASH<span>BOX</span></div>
    <div class="nav-divider"></div>
    <div class="nav-filters radio-filter-strip">
      <span class="filter-label">Genre</span>
      <div id="genre-chips"></div>
      <button class="chip video-chip" id="video-chip" onclick="toggleVideoFilter()">▶ Has Video</button>
      <button class="chip chip-reset" id="reset-filters-btn" onclick="resetFilters()">Reset Filters</button>
    </div>
    <button class="filter-drawer-tab" id="filter-drawer-tab" type="button" aria-label="Toggle genre filters" onclick="toggleFilterDrawer()">❯</button>
    <div class="nav-right">
      <span class="track-total" id="track-total"></span>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-inp" id="search-inp" type="text" placeholder="Search…" oninput="onSearch()"/>
      </div>
    </div>
  </div>
</nav>

<!-- App -->
<div id="app">
  <div class="page">

    <!-- Shuffle All Hero CTA -->
    <div class="shuffle-hero" id="shuffle-hero">
      <div class="shuffle-hero-text">
        <div class="shuffle-hero-title">STASHBOX RADIO</div>
        <div class="shuffle-hero-sub" id="shuffle-sub">Loading your catalog…</div>
      </div>
      <div class="shuffle-hero-btns">
        <button class="btn-shuffle-all" onclick="shuffleAll()">⇄ SHUFFLE ALL</button>
        <button class="btn-shuffle-filtered" id="btn-shuffle-filtered" onclick="shuffleFiltered()">⇄ SHUFFLE FILTERED</button>
      </div>
    </div>

    <!-- Now Playing Player -->
    <div id="now-banner" style="display:none">
      <!-- Media: image or video -->
      <div class="player-media" id="player-media">
        <img id="player-img" src="" alt="" style="display:none"/>
        <iframe id="player-vid" src="" allow="autoplay; encrypted-media" allowfullscreen style="display:none"></iframe>
        <video id="player-native-vid" controls playsinline preload="metadata" style="display:none"></video>
      </div>
      <!-- Visualizer fallback -->
      <div class="player-vis-wrap" id="player-vis-wrap">
        <div class="player-vis-title" id="player-vis-title"></div>
        <canvas id="vis-canvas-full"></canvas>
      </div>
      <!-- Bottom strip: info + controls -->
      <div class="player-bottom">
        <div class="player-info">
          <div class="player-title" id="banner-title">—</div>
          <div class="player-meta">
            <span id="banner-artist"></span>
            <span class="player-genre-tag" id="banner-genre"></span>
          </div>
          <div class="player-notes" id="banner-notes" style="display:none"></div>
        </div>
        <div class="player-controls">
          <button class="b-btn" onclick="playPrev()" title="Previous">&#9664;</button>
          <button class="b-btn play-pause" id="play-pause-btn" onclick="togglePause()">&#9654;</button>
          <button class="b-btn" onclick="playNext()" title="Next">&#9654;&#9654;</button>
          <button class="b-btn" id="radio-btn" onclick="toggleRadio()" title="Radio mode">&#9678;</button>
        </div>
      </div>
      <!-- Audio scrubber (only shown when no video) -->
      <div class="player-audio-wrap" id="player-audio-wrap">
        <audio id="audio" controls preload="metadata"></audio>
      </div>
    </div>

    <!-- Sections directory -->
    <div id="sections-wrap"></div>

    <div id="no-results" class="no-results" style="display:none">
      <span class="big">—</span>No tracks match your filters.
    </div>

  </div>
</div>

<!-- Video Modal -->
<div id="video-modal" onclick="closeModal(event)">
  <div class="modal-inner">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeVideoModal()">✕</button>
    </div>
    <iframe id="modal-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  SHEET CONFIG
// ══════════════════════════════════════════════
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyXI6d_QbtM2UalaiSYcDKpvgnLi-QsqYfx9hCbqM8vpbK_gUITEQffoyKiYQoeXuKeW_qBkrexMqN/pub?gid=0&single=true&output=csv';

// ── 10 SECTIONS (genre → display config) ──
// Edit these to match your actual genres exactly as written in the sheet.
// Sections with no matching tracks are automatically hidden.
const SECTIONS = [
  { key:'Reggae',     label:'Reggae',       emoji:'🌴', color:'#3ecf6e' },
  { key:'Rock',       label:'Rock',         emoji:'🎸', color:'#f0a500' },
  { key:'Blues',      label:'Blues',        emoji:'🎷', color:'#50a0ff' },
  { key:'Funk',       label:'Funk',         emoji:'🕺', color:'#e05c2a' },
  { key:'Electronic', label:'Electronic',   emoji:'⚡', color:'#50dcdc' },
  { key:'Spanish',    label:'Spanish',      emoji:'💃', color:'#ff6496' },
  { key:'Calypso',    label:'Calypso',      emoji:'🥁', color:'#ffc050' },
  { key:'Soul',       label:'Soul',         emoji:'🎤', color:'#c88cff' },
  { key:'Pop',        label:'Pop',          emoji:'🎵', color:'#ff9080' },
  { key:'Other',      label:'Other / Misc', emoji:'🎶', color:'#999'    },
];

// Genres that map to "Other" catch-all
const KNOWN_GENRES = new Set(SECTIONS.slice(0,-1).map(s=>s.key.toLowerCase()));

// ══════════════════════════════════════════════
//  GENRE COLORS (for pills / badges)
// ══════════════════════════════════════════════
const GC = {};
SECTIONS.forEach(s => GC[s.key] = s.color);

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let allTracks     = [];
let activeGenre   = 'ALL';   // 'ALL' or a genre key
let videoOnly     = false;
let searchQ       = '';
let queue         = [];
let queueSection  = null;
let qIdx          = -1;
let radioMode     = false;
let visAnim       = null;
let youtubeStatePoll = null;
let youtubeMessageBound = false;

const audio = document.getElementById('audio');

// ══════════════════════════════════════════════
//  FETCH & PARSE
// ══════════════════════════════════════════════
async function init() {
  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    allTracks = parseCSV(csv);
    bootApp();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--red);font-family:var(--fh);font-size:32px">LOAD ERROR</div>
       <div style="color:var(--muted);font-size:13px;margin-top:8px">Check the sheet is published to the web.<br/>${e.message}</div>`;
  }
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const c = splitCSV(lines[i]);
    if (!clean(c[0])) continue;
    const genre = clean(c[2]);
    out.push({
      title:      clean(c[0]),
      artist:     clean(c[1]),
      genre:      genre,
      sectionKey: resolveSection(genre),
      date:       clean(c[3]),
      wavFile:    clean(c[4]),
      audioUrl:   fixDropbox(clean(c[5])),
      artFile:    clean(c[6]),
      imageUrl:   pickImageUrl(clean(c[7]), clean(c[6])),
      videoUrl:   clean(c[8]),
      notes:      clean(c[9]),
      idx:        i - 1,
    });
  }
  return out;
}


function pickImageUrl(imageUrl, artFile) {
  const primary = fixDropbox(imageUrl);
  if (primary) return primary;

  const fallback = fixDropbox(artFile);
  if (/^https?:\/\//i.test(fallback)) return fallback;
  return '';
}

function resolveSection(genre) {
  if (!genre) return 'Other';
  const match = SECTIONS.find(s => s.key.toLowerCase() === genre.toLowerCase());
  return match ? match.key : 'Other';
}

function splitCSV(line) {
  const r=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;continue}
    if(c===','&&!inQ){r.push(cur);cur='';continue}
    cur+=c;
  }
  r.push(cur);
  return r;
}
function clean(s){return (s||'').trim().replace(/^"|"$/g,'')}
function fixDropbox(u){
  if(!u)return '';
  const raw = (u || '').trim();
  if (!raw) return '';
  let normalized = raw;

  try {
    const parsed = new URL(raw);

    if (parsed.hostname === 'www.dropbox.com' || parsed.hostname === 'dropbox.com') {
      parsed.hostname = 'dl.dropboxusercontent.com';
    }

    parsed.searchParams.delete('dl');
    parsed.searchParams.delete('raw');

    normalized = parsed.toString();
  } catch (e) {
    normalized = raw;
  }

  return encodeURI(normalized);
}

function getYouTubeVideoId(url) {
  if (!url) return '';
  const raw = url.trim();
  if (!raw) return '';
  try {
    if (raw.includes('youtube.com/embed/')) {
      return raw.split('youtube.com/embed/')[1].split(/[?&#/]/)[0] || '';
    }
    if (raw.includes('youtube.com/watch')) {
      return new URL(raw).searchParams.get('v') || '';
    }
    if (raw.includes('youtu.be/')) {
      return raw.split('youtu.be/')[1].split(/[?&#/]/)[0] || '';
    }
  } catch (e) {}
  return '';
}


function isYouTubeUrl(url) {
  return !!getYouTubeVideoId(url);
}

function toYouTubeEmbed(url) {
  if (!url) return '';
  let embed = url.trim();
  const applyParams = (base) => `${base}${base.includes('?') ? '&' : '?'}autoplay=1&playsinline=1&rel=0&enablejsapi=1`;
  const videoId = getYouTubeVideoId(embed);
  if (videoId) return applyParams(`https://www.youtube.com/embed/${videoId}`);
  return applyParams(embed);
}

function getVideoThumbnailUrl(videoUrl) {
  const videoId = getYouTubeVideoId(videoUrl);
  if (videoId) return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
  return '';
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
function bootApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('nav').style.display = 'block';
  document.getElementById('app').style.display = 'block';
  buildGenreChips();
  render();
  updateShuffleSub();
}

function updateShuffleSub() {
  const filtered = getFiltered();
  const isFiltered = activeGenre !== 'ALL' || videoOnly || searchQ;
  document.getElementById('shuffle-sub').textContent =
    isFiltered
      ? `${filtered.length} of ${allTracks.length} tracks match your filters`
      : `${allTracks.length} tracks · Reggae, Rock, Blues & more`;
  document.getElementById('btn-shuffle-filtered').style.display = isFiltered ? 'inline-block' : 'none';
}

// ══════════════════════════════════════════════
//  GENRE CHIPS
// ══════════════════════════════════════════════
function buildGenreChips() {
  // Only show chips for genres that exist in the data
  const present = new Set(allTracks.map(t => t.sectionKey));
  const chips = [{ key:'ALL', label:'All' }, ...SECTIONS.filter(s => present.has(s.key))];
  document.getElementById('genre-chips').innerHTML = chips.map(s =>
    `<button class="chip ${s.key==='ALL'?'active':''}" data-genre="${s.key}" onclick="setGenre('${s.key}',this)">${s.label || s.key}</button>`
  ).join('');
}

function setGenre(g, btn) {
  activeGenre = g;
  updateFilterUI(btn);
  render();
}

function toggleVideoFilter() {
  videoOnly = !videoOnly;
  updateFilterUI();
  render();
}

function onSearch() {
  searchQ = document.getElementById('search-inp').value.toLowerCase();
  render();
}
function updateFilterUI(activeBtn=null){
  document.querySelectorAll('#genre-chips .chip').forEach(b => {
    b.classList.toggle('active', b.dataset.genre === activeGenre);
  });
  if (activeBtn && activeBtn.dataset && activeBtn.dataset.genre) activeBtn.classList.add('active');
  document.getElementById('video-chip').classList.toggle('active', videoOnly);
}
function resetFilters() {
  activeGenre = 'ALL';
  videoOnly = false;
  searchQ = '';
  document.getElementById('search-inp').value = '';
  updateFilterUI();
  render();
  const nextSong = getRandomSongFromCurrentPool();
  if (nextSong) playSong(nextSong);
}

// ══════════════════════════════════════════════
//  FILTER
// ══════════════════════════════════════════════
function getFiltered() {
  return allTracks.filter(t => {
    const gMatch = activeGenre === 'ALL' || t.sectionKey === activeGenre;
    const vMatch = !videoOnly || !!t.videoUrl;
    const sMatch = !searchQ || t.title.toLowerCase().includes(searchQ)
      || (t.artist||'').toLowerCase().includes(searchQ)
      || (t.genre||'').toLowerCase().includes(searchQ)
      || (t.notes||'').toLowerCase().includes(searchQ);
    return gMatch && vMatch && sMatch;
  });
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function render() {
  const filtered = getFiltered();
  document.getElementById('track-total').textContent = filtered.length + ' tracks';

  const wrap = document.getElementById('sections-wrap');
  const noRes = document.getElementById('no-results');

  if (filtered.length === 0) {
    wrap.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  // Group by section
  const groups = {};
  SECTIONS.forEach(s => groups[s.key] = []);
  filtered.forEach(t => {
    if (groups[t.sectionKey] !== undefined) groups[t.sectionKey].push(t);
    else groups['Other'].push(t);
  });

  updateShuffleSub();
  wrap.innerHTML = SECTIONS.map((sec, si) => {
    const tracks = groups[sec.key];
    if (tracks.length === 0) return '';
    return `
    <div class="section" id="sec-${sec.key}">
      <div class="section-header">
        <div class="section-dot" style="background:${sec.color}"></div>
        <div class="section-name">${sec.emoji} ${sec.label}</div>
        <div class="section-count">${tracks.length} track${tracks.length!==1?'s':''}</div>
        <button class="section-shuffle" onclick="shuffleSection('${sec.key}')">⇄ Shuffle ${sec.label}</button>
      </div>
      <div class="tracks-grid">
        ${tracks.map((t, i) => renderCard(t, i, sec)).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderCard(t, i, sec) {
  const isPlaying = queue[qIdx] && queue[qIdx].idx === t.idx;
  const hasVid    = !!t.videoUrl;
  const isMobile  = window.matchMedia('(max-width: 700px)').matches;
  const videoThumbUrl = hasVid ? getVideoThumbnailUrl(t.videoUrl) : '';
  // Mobile requirement: always prefer song artwork for video tracks when Artwork Link exists
  const thumbSrc  = (isMobile && hasVid && t.imageUrl) ? t.imageUrl : (t.imageUrl || videoThumbUrl);
  const hasThumb  = !!thumbSrc;
  const thumb     = hasThumb
    ? `<img class="card-thumb" src="${thumbSrc}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="display:flex"/><div class="card-thumb-placeholder" style="display:none">${sec.emoji}</div>`
    : `<div class="card-thumb-placeholder">${sec.emoji}</div>`;
  const mediaBadge = hasVid ? '<span class="media-type-badge" aria-label="Video track" title="Video track">🎬</span>' : '';

  const videoBtn = hasVid
    ? `<button class="card-video-btn" type="button" onclick="event.stopPropagation();openVideo(${t.idx})">Vid</button>`
    : '';

  return `<div class="track-card ${isPlaying?'playing':''}" data-idx="${t.idx}" onclick="playCard(${t.idx},'${sec.key}')">
    <div class="card-num">${isPlaying ? '♪' : i+1}</div>
    ${thumb}
    <div class="card-info">
      <div class="card-title">${t.title} ${mediaBadge}</div>
      <div class="card-artist">${t.artist||''}</div>
      <div class="card-date">${t.date||''}</div>
      ${videoBtn}
    </div>
    <div class="play-icon">${isPlaying ? '♪' : '▶'}</div>
  </div>`;
}

// ══════════════════════════════════════════════
//  PLAYBACK
// ══════════════════════════════════════════════
function playCard(trackIdx, sectionKey) {
  // Build queue from same section (filtered)
  const filtered = getFiltered();
  const sectionTracks = filtered.filter(t => t.sectionKey === sectionKey);
  const clickedPos = sectionTracks.findIndex(t => t.idx === trackIdx);
  queue = sectionTracks;
  queueSection = sectionKey;
  qIdx = clickedPos >= 0 ? clickedPos : 0;
  loadTrack(queue[qIdx]);
}

function shuffleAll() {
  queue = shuffle([...allTracks]);
  queueSection = null;
  qIdx = 0;
  loadTrack(queue[0]);
}

function shuffleFiltered() {
  const filtered = getFiltered();
  if (!filtered.length) {
    updateShuffleSub();
    return;
  }
  queue = shuffle([...filtered]);
  queueSection = null;
  qIdx = 0;
  playSong(queue[0]);
}
function getCurrentPool() {
  return getFiltered();
}
function getRandomSongFromCurrentPool(excludeIdx = null) {
  const pool = getCurrentPool();
  if (!pool.length) return null;
  const candidates = (excludeIdx !== null && pool.length > 1) ? pool.filter(t => t.idx !== excludeIdx) : pool;
  return candidates[Math.floor(Math.random() * candidates.length)];
}
function playSong(track) {
  if (!track) return;
  queue = getCurrentPool();
  qIdx = queue.findIndex(t => t.idx === track.idx);
  if (qIdx < 0) { queue = [track]; qIdx = 0; }
  loadTrack(track);
}
function playNextRandomSong() {
  const next = getRandomSongFromCurrentPool(queue[qIdx]?.idx ?? null);
  if (!next) {
    document.getElementById('shuffle-sub').textContent = 'No tracks available for current filters.';
    return;
  }
  playSong(next);
}

function shuffleSection(sectionKey) {
  const filtered = getFiltered();
  const sectionTracks = shuffle([...filtered.filter(t => t.sectionKey === sectionKey)]);
  queue = sectionTracks;
  queueSection = sectionKey;
  qIdx = 0;
  loadTrack(queue[0]);
}

function playNext() {
  if (!queue.length) return;
  qIdx = radioMode ? Math.floor(Math.random() * queue.length) : (qIdx + 1) % queue.length;
  loadTrack(queue[qIdx]);
}

function playPrev() {
  if (!queue.length) return;
  qIdx = (qIdx - 1 + queue.length) % queue.length;
  loadTrack(queue[qIdx]);
}

function togglePause() {
  if (audio.paused) audio.play();
  else audio.pause();
}

function toggleRadio() {
  radioMode = !radioMode;
  document.getElementById('radio-btn').classList.toggle('radio-on', radioMode);
}

function handleTrackEnded() { playNextRandomSong(); }
audio.addEventListener('ended', handleTrackEnded);
audio.addEventListener('play',  () => updatePlayBtn(false));
audio.addEventListener('pause', () => updatePlayBtn(true));
function updatePlayBtn(paused) {
  document.getElementById('play-pause-btn').innerHTML = paused ? '&#9654;' : '&#9646;&#9646;';
}

function loadTrack(t) {
  if (!t) return;

  // ── Info strip ──
  document.getElementById('banner-title').textContent  = t.title;
  document.getElementById('banner-artist').textContent = t.artist || '';
  const sec = SECTIONS.find(s => s.key === t.sectionKey) || SECTIONS[SECTIONS.length-1];
  const genreEl = document.getElementById('banner-genre');
  genreEl.textContent = t.genre || '';
  genreEl.style.background = sec.color + '22';
  genreEl.style.color = sec.color;
  const notesEl = document.getElementById('banner-notes');
  notesEl.textContent = t.notes || '';
  notesEl.style.display = t.notes ? 'block' : 'none';

  // ── Media display: VIDEO > IMAGE > VISUALIZER ──
  const mediaWrap  = document.getElementById('player-media');
  const imgEl      = document.getElementById('player-img');
  const vidEl      = document.getElementById('player-vid');
  const nativeVidEl = document.getElementById('player-native-vid');
  const visWrap    = document.getElementById('player-vis-wrap');
  const audioWrap  = document.getElementById('player-audio-wrap');

  // reset all
  imgEl.style.display = 'none';
  vidEl.style.display = 'none'; vidEl.src = '';
  nativeVidEl.style.display = 'none'; nativeVidEl.pause(); nativeVidEl.src = ''; nativeVidEl.load();
  mediaWrap.style.display = 'none';
  visWrap.style.display   = 'none';
  audioWrap.style.display = 'none';
  if (visAnim) { cancelAnimationFrame(visAnim); visAnim = null; }

  if (t.videoUrl) {
    // Pause audio whenever a track is using video playback
    audio.pause();
    audio.src = '';

    if (isYouTubeUrl(t.videoUrl)) {
      // YouTube embed playback
      vidEl.src = toYouTubeEmbed(t.videoUrl);
      vidEl.style.display = 'block';
      mediaWrap.style.display = 'block';
      attachVideoEndedHandling(vidEl);
    } else {
      // Native video playback for non-YouTube URLs (mobile-safe)
      nativeVidEl.src = fixDropbox(t.videoUrl);
      nativeVidEl.style.display = 'block';
      mediaWrap.style.display = 'block';
      nativeVidEl.play().catch(()=>{});
    }
    // No audio scrubber when video plays

  } else if (t.imageUrl) {
    // Show artwork + audio player
    imgEl.onerror = () => {
      imgEl.onerror = null;
      imgEl.style.display = 'none';
      mediaWrap.style.display = 'none';
      document.getElementById('player-vis-title').textContent = t.title;
      visWrap.style.display = 'flex';
      startVis();
    };
    imgEl.src = t.imageUrl;
    imgEl.style.display = 'block';
    mediaWrap.style.display = 'block';
    audioWrap.style.display = 'block';
    if (t.audioUrl) { audio.src = t.audioUrl; audio.play().catch(()=>{}); }

  } else {
    // Visualizer fallback + audio player
    document.getElementById('player-vis-title').textContent = t.title;
    visWrap.style.display = 'flex';
    audioWrap.style.display = 'block';
    startVis();
    if (t.audioUrl) { audio.src = t.audioUrl; audio.play().catch(()=>{}); }
  }

  // Show the player banner
  document.getElementById('now-banner').style.display = 'block';

  // Re-render cards to update playing highlight
  render();
}

// ══════════════════════════════════════════════
//  VISUALIZER
// ══════════════════════════════════════════════
function startVis() {
  const canvas = document.getElementById('vis-canvas-full');
  canvas.width  = canvas.offsetWidth  || 800;
  canvas.height = canvas.offsetHeight || 80;
  const ctx = canvas.getContext('2d');
  if (visAnim) cancelAnimationFrame(visAnim);
  let phase = 0;
  function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    const bars = 48;
    const bw = (w / bars) - 1;
    for (let i=0;i<bars;i++) {
      const amp = 0.3 + 0.7 * Math.abs(Math.sin(i * 0.22 + phase));
      const bh  = amp * h * 0.9;
      ctx.fillStyle = `rgba(240,165,0,${0.35 + amp * 0.55})`;
      ctx.fillRect(i*(bw+1), h-bh, bw, bh);
    }
    phase += 0.07;
    visAnim = requestAnimationFrame(draw);
  }
  draw();
}

// ══════════════════════════════════════════════
//  VIDEO MODAL
// ══════════════════════════════════════════════
function openVideo(trackIdx) {
  const t = allTracks.find(tr => tr.idx === trackIdx);
  if (!t || !t.videoUrl) return;
  document.getElementById('modal-title').textContent = t.title;
  document.getElementById('modal-iframe').src = toYouTubeEmbed(t.videoUrl);
  document.getElementById('video-modal').style.display = 'flex';
  // Pause audio while watching video
  audio.pause();
}

function closeVideoModal() {
  document.getElementById('video-modal').style.display = 'none';
  document.getElementById('modal-iframe').src = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('video-modal')) closeModal2();
}
function closeModal2() { closeVideoModal(); }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideoModal(); });

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function shuffle(a) {
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}

let drawerHidden = false;
let touchStartX = null;

function setFilterDrawerState(hidden) {
  const strip = document.querySelector('.nav-filters');
  const tab = document.getElementById('filter-drawer-tab');
  if (!strip || !tab) return;
  drawerHidden = !!hidden;
  strip.classList.toggle('drawer-hidden', drawerHidden);
  tab.classList.toggle('open', !drawerHidden);
  tab.textContent = drawerHidden ? '❮' : '❯';
}

function toggleFilterDrawer() {
  if (window.innerWidth > 700) return;
  setFilterDrawerState(!drawerHidden);
}

function bindDrawerSwipe() {
  const strip = document.querySelector('.nav-filters');
  if (!strip) return;
  const onStart = e => {
    touchStartX = e.changedTouches[0].clientX;
  };
  const onEnd = e => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx > 40) setFilterDrawerState(true);
    if (dx < -40) setFilterDrawerState(false);
    touchStartX = null;
  };
  strip.addEventListener('touchstart', onStart, { passive:true });
  strip.addEventListener('touchend', onEnd, { passive:true });

  const onResize = () => {
    if (window.innerWidth > 700) {
      setFilterDrawerState(false);
      const tab = document.getElementById('filter-drawer-tab');
      if (tab) tab.textContent = '❯';
    } else {
      setFilterDrawerState(drawerHidden);
    }
  };
  window.addEventListener('resize', onResize);
  if (window.innerWidth <= 700) setFilterDrawerState(true);
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
init();
bindDrawerSwipe();
function attachVideoEndedHandling(iframeEl) {
  if (youtubeStatePoll) { clearInterval(youtubeStatePoll); youtubeStatePoll = null; }
  if (!iframeEl || !iframeEl.src) return;
  let endedSeen = false;
  youtubeStatePoll = setInterval(() => {
    try {
      iframeEl.contentWindow.postMessage(JSON.stringify({event:'command',func:'getPlayerState',args:[]}), '*');
    } catch(e) {}
  }, 1500);
  if (!youtubeMessageBound) {
    window.addEventListener('message', function(ev) {
      if (typeof ev.data !== 'string') return;
      if (ev.data.includes('"info":0') && !endedSeen) {
        endedSeen = true;
        handleTrackEnded();
      } else if (ev.data.includes('"info":1')) {
        endedSeen = false;
      }
    });
    youtubeMessageBound = true;
  }
}
