<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050607">
  <meta name="robots" content="noindex,nofollow">
  <title>Stashbox Radio DEV V2</title>
  <meta name="description" content="The mobile-first Stashbox Radio V2 public discovery feed and full-screen player.">
  <link rel="canonical" href="https://stashbox.com/radio/dev/v2/">

  <base href="/radio/dev/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Karla:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/radio/dev/notifications-compact.css?v=20260722-v2">
  <link rel="stylesheet" href="/radio/dev/v2/v2.css?v=20260722-home2">
</head>
<body class="radio-dev-v2">
  <div id="v2App" class="v2-app" aria-live="polite">
    <section class="v2-loading" aria-label="Loading Stashbox Radio">
      <span class="v2-loading-mark">STASH<span>BOX</span></span>
      <span class="v2-loading-line"></span>
      <p>Loading live DEV content</p>
    </section>
  </div>

  <noscript>This version of Stashbox Radio requires JavaScript.</noscript>

  <script>
    (() => {
      const showBootFailure = (message) => {
        const app = document.getElementById('v2App');
        if (!app || !app.querySelector('.v2-loading')) return;
        app.innerHTML = `<section class="v2-load-error"><span>STASH<span>BOX</span></span><h1>Radio V2 could not load</h1><p>${message}</p><button type="button" onclick="location.reload()">Retry</button></section>`;
      };
      window.__stashboxV2BootFailure = showBootFailure;
      window.setTimeout(() => showBootFailure('The app script did not finish loading. Tap Retry for a fresh copy.'), 15000);
    })();
  </script>
  <script src="/radio/dev/v2/v2.js?v=20260722-home2" defer onerror="window.__stashboxV2BootFailure?.('The V2 app script could not be downloaded.')"></script>
  <script src="/radio/dev/account.js?v=20260722-v2" defer></script>
  <script src="/radio/dev/notifications-core.js?v=20260722-v2" defer></script>
</body>
</html>
