name: PR Video Factory Live Status

on:
  pull_request:
    paths:
      - '.github/workflows/pr-video-factory-live-status.yml'
      - '.github/scripts/video-factory-live-status.sh'

permissions:
  contents: read

jobs:
  live-status:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      LAMBDA_NAME: stashbox-radio-api-dev-v2
      API_BASE: https://d21fbe6u80.execute-api.us-east-1.amazonaws.com/dev
      ADMIN_TOKEN: ${{ secrets.STASHBOX_DEV_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Run compact diagnostic
        run: bash .github/scripts/video-factory-live-status.sh
