name: PR Video Factory Live Status

on:
  pull_request:
    paths:
      - '.github/workflows/pr-video-factory-live-status.yml'

permissions:
  contents: read

jobs:
  live-status:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      LAMBDA_NAME: stashbox-radio-api-dev-v2
      API_BASE: https://d21fbe6u80.execute-api.us-east-1.amazonaws.com/dev
      ADMIN_TOKEN: ${{ secrets.STASHBOX_DEV_ADMIN_TOKEN }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inspect Lambda Video Factory configuration and VPC routes
        run: |
          set -euo pipefail
          aws lambda get-function-configuration \
            --function-name "${LAMBDA_NAME}" \
            --query '{FunctionName:FunctionName,Timeout:Timeout,VpcConfig:VpcConfig,VideoFactoryEnv:Environment.Variables.{Cluster:VIDEO_FACTORY_ECS_CLUSTER,Task:VIDEO_FACTORY_ECS_TASK_DEFINITION,Subnets:VIDEO_FACTORY_ECS_SUBNETS,SecurityGroups:VIDEO_FACTORY_ECS_SECURITY_GROUPS,Bucket:VIDEO_FACTORY_RENDER_BUCKET,ApiBase:VIDEO_FACTORY_API_BASE}}' \
            --output json

          VPC_ID=$(aws lambda get-function-configuration --function-name "${LAMBDA_NAME}" --query 'VpcConfig.VpcId' --output text)
          SUBNETS=$(aws lambda get-function-configuration --function-name "${LAMBDA_NAME}" --query 'VpcConfig.SubnetIds' --output text)
          echo "LAMBDA_VPC_ID=${VPC_ID}"
          echo "LAMBDA_SUBNETS=${SUBNETS}"

          if [ -n "${VPC_ID}" ] && [ "${VPC_ID}" != "None" ]; then
            aws ec2 describe-route-tables \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'RouteTables[].{RouteTableId:RouteTableId,Associations:Associations[].SubnetId,Routes:Routes[].{Destination:DestinationCidrBlock,GatewayId:GatewayId,NatGatewayId:NatGatewayId,State:State}}' \
              --output json
          fi

      - name: Read recent Lambda logs when permitted
        continue-on-error: true
        run: aws logs tail "/aws/lambda/${LAMBDA_NAME}" --since 15m --format short

      - name: Read Video Factory infrastructure and jobs
        run: |
          node <<'NODE'
          const api = String(process.env.API_BASE).replace(/\/+$/, '');
          const token = String(process.env.ADMIN_TOKEN || '').trim();
          if (!token) throw new Error('STASHBOX_DEV_ADMIN_TOKEN is missing.');

          async function request(pathname) {
            try {
              const response = await fetch(`${api}${pathname}`, {
                headers: { accept: 'application/json', 'x-admin-token': token }
              });
              const text = await response.text();
              let body = null;
              try { body = text ? JSON.parse(text) : null; } catch { body = { raw: text }; }
              return { pathname, ok: response.ok, status: response.status, body };
            } catch (error) {
              return { pathname, ok: false, status: null, body: null, network_error: error.message };
            }
          }

          const infraResult = await request('/admin/video-factory/infrastructure');
          const jobsResult = await request('/admin/video-factory/jobs?limit=250');
          console.log('INFRA_RESPONSE=' + JSON.stringify(infraResult));
          console.log('JOBS_RESPONSE_META=' + JSON.stringify({
            pathname: jobsResult.pathname,
            ok: jobsResult.ok,
            status: jobsResult.status,
            error: jobsResult.body?.error || jobsResult.body?.message || jobsResult.network_error || '',
            count: Array.isArray(jobsResult.body?.jobs) ? jobsResult.body.jobs.length : null
          }));

          const jobs = Array.isArray(jobsResult.body?.jobs) ? jobsResult.body.jobs : [];
          const job = jobs.find(item => String(item.batch_name || '').includes('Space Jam First Full-Song Render'))
            || jobs.find(item => /space jam/i.test(`${item.song_title || ''} ${item.song_key || ''}`));

          if (!job) {
            console.log('SPACE_JAM_JOB=NOT_FOUND');
          } else {
            const runtime = job.render_recipe?.runtime || {};
            console.log('SPACE_JAM_JOB=' + JSON.stringify({
              id: job.id,
              batch_id: job.batch_id,
              status: job.status,
              progress_percent: runtime.progress_percent ?? 0,
              status_message: runtime.status_message || '',
              error_message: job.error_message || '',
              output_filename: job.output_filename || '',
              created_at: job.created_at,
              updated_at: job.updated_at
            }));
          }

          if (!infraResult.ok || !jobsResult.ok) process.exitCode = 1;
          NODE
