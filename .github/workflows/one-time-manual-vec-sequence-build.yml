name: One-time Manual VEC Sequence Build

on:
  push:
    branches:
      - agent/manual-vec-sequence-panel

permissions:
  contents: write

jobs:
  build-and-test:
    if: ${{ !contains(github.event.head_commit.message, '[manual-sequence-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/manual-vec-sequence-panel
          fetch-depth: 0

      - name: Assemble readable patch
        run: cat scripts/one-time-manual-sequence/part-*.txt > /tmp/apply-manual-sequence.py

      - name: Validate and apply patch
        run: |
          python -m py_compile /tmp/apply-manual-sequence.py
          python /tmp/apply-manual-sequence.py

      - name: Validate JavaScript syntax
        run: |
          node --check radio-admin/dev/vec/vec-controller.js
          node --check radio/dev/app.js
          node --check video-render-worker/src/vec-recipe.mjs
          node --check video-render-worker/src/entry.mjs
          node --check video-render-worker/src/index.mjs
          node --check video-render-worker/src/timeline.mjs

      - name: Run Video Factory tests
        run: node --test video-render-worker/tests/vec-recipe.test.mjs video-render-worker/tests/timeline.test.mjs

      - name: Commit completed implementation
        run: |
          rm -rf scripts/one-time-manual-sequence
          rm -f .github/workflows/one-time-manual-vec-sequence-build.yml
          git config user.name "Stashbox Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Build manual VEC drag-and-drop sequence [manual-sequence-applied]"
          git push origin HEAD:agent/manual-vec-sequence-panel
