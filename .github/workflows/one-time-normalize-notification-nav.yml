name: One-Time Normalize Notification Nav

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/one-time-normalize-notification-nav.yml'

permissions:
  contents: write

jobs:
  normalize-notification-nav:
    runs-on: ubuntu-latest
    env:
      OUTPUT_BRANCH: automation/normalize-notification-nav

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add Notifications to remaining CMS navigation
        run: |
          python - <<'PY'
          from pathlib import Path

          visual_path = Path('radio/visual-experience/dev/index.html')
          visual = visual_path.read_text()
          visual_link = '<a href="/radio-admin/notifications/dev/">Notifications</a>'
          if visual_link not in visual:
              anchor = '<a href="/radio-admin/ads/dev/">Ads</a><a href="/radio/dashboard/dev/">Dashboard</a>'
              replacement = '<a href="/radio-admin/ads/dev/">Ads</a>' + visual_link + '<a href="/radio/dashboard/dev/">Dashboard</a>'
              if anchor not in visual:
                  raise SystemExit('Video Library navigation anchor not found.')
              visual_path.write_text(visual.replace(anchor, replacement, 1))

          ads_path = Path('radio-admin/ads/dev/index.html')
          ads = ads_path.read_text()
          ads_link = '          <a href="/radio-admin/notifications/dev/">Notifications</a>\n'
          if '/radio-admin/notifications/dev/' not in ads:
              anchor = '          <a href="/radio-admin/ads/dev/" aria-current="page">Ads</a>\n          <a href="/radio/dashboard/dev/">Dashboard</a>'
              replacement = '          <a href="/radio-admin/ads/dev/" aria-current="page">Ads</a>\n' + ads_link + '          <a href="/radio/dashboard/dev/">Dashboard</a>'
              if anchor not in ads:
                  raise SystemExit('Ads CMS navigation anchor not found.')
              ads_path.write_text(ads.replace(anchor, replacement, 1))

          admin_path = Path('radio-admin/dev/index.html')
          admin = admin_path.read_text()
          admin = admin.replace('        <a href="/radio-admin/ads/dev/">Ads</a>\n          <a href="/radio-admin/notifications/dev/">Notifications</a>', '        <a href="/radio-admin/ads/dev/">Ads</a>\n        <a href="/radio-admin/notifications/dev/">Notifications</a>')
          admin_path.write_text(admin)
          PY

      - name: Validate global CMS navigation
        run: |
          set -euo pipefail
          grep -q '/radio-admin/notifications/dev/' radio/visual-experience/dev/index.html
          grep -q '/radio-admin/notifications/dev/' radio-admin/ads/dev/index.html
          grep -q '/radio-admin/notifications/dev/' radio-admin/dev/index.html
          grep -q '/radio-admin/notifications/dev/' radio-admin/songs/dev/index.html
          grep -q '/radio-admin/notifications/dev/' radio-admin/dev/vec/index.html
          grep -q '/radio-admin/notifications/dev/' radio-admin/dev/video-factory/index.html
          grep -q '/radio-admin/notifications/dev/' radio/dashboard/dev/index.html

      - name: Push mergeable navigation branch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B "${OUTPUT_BRANCH}"
          git add radio/visual-experience/dev/index.html radio-admin/ads/dev/index.html radio-admin/dev/index.html
          git commit -m 'Add Notifications across global CMS navigation'
          git push --force origin "${OUTPUT_BRANCH}"
