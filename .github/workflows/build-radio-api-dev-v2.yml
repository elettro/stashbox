name: Build Radio API DEV v2

on:
  workflow_dispatch:

jobs:
  build:
    name: Build DEV Lambda artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check Lambda syntax
        working-directory: radio-api
        run: node --check index.mjs

      - name: Install production dependencies
        working-directory: radio-api
        run: npm install --omit=dev

      - name: Verify pg dependency is installed
        working-directory: radio-api
        run: test -d node_modules/pg

      - name: Create DEV v2 Lambda zip
        working-directory: radio-api
        run: |
          mkdir -p dist
          files=(index.mjs package.json node_modules)
          if [ -f package-lock.json ]; then
            files+=(package-lock.json)
          fi
          zip -r dist/stashbox-radio-api-dev-v2.zip "${files[@]}"

      - name: Upload DEV v2 Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: stashbox-radio-api-dev-v2
          path: radio-api/dist/stashbox-radio-api-dev-v2.zip
          if-no-files-found: error
