name: Apply DEV Artist Banner 16x9

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-artist-banner-16x9.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply 16x9 artist banner refinement
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
            'radio/artists/dev/styles.css': [
              ('.banner{height:300px;', '.banner{width:100%;height:auto;aspect-ratio:16/9;'),
              ('.banner{height:210px}', '.banner{height:auto;aspect-ratio:16/9}')
            ],
            'radio-admin/artists/dev/index.html': [
              ('Recommended: 2400 × 800 px · 3:1 landscape JPG, PNG, or WEBP', 'Recommended: 1920 × 1080 px · 16:9 landscape JPG, PNG, or WEBP'),
              ('./styles.css?v=20260721-media-stats1', './styles.css?v=20260721-banner169'),
              ('./app.js?v=20260721-media-stats1', './app.js?v=20260721-banner169')
            ],
            'radio-admin/artists/dev/app.js': [
              ("{ width: 2400, height: 800 }", "{ width: 1920, height: 1080 }")
            ],
            'radio-admin/artists/dev/styles.css': [
              ('.banner-preview{width:100%;height:150px;min-height:150px}', '.banner-preview{width:100%;height:auto;min-height:0;aspect-ratio:16/9}')
            ],
            'radio-api/tests/artist-foundation.test.mjs': [
              ('Recommended: 2400 × 800 px', 'Recommended: 1920 × 1080 px'),
            ],
            'radio/artists/dev/index.html': [
              ('./styles.css', './styles.css?v=20260721-banner169')
            ]
          }

          for filename, pairs in replacements.items():
            path = Path(filename)
            text = path.read_text()
            for old, new in pairs:
              if old not in text:
                raise SystemExit(f'Missing expected text in {filename}: {old}')
              text = text.replace(old, new, 1)
            path.write_text(text)
          PY
          node --check radio-admin/artists/dev/app.js
          node --test radio-api/tests/artist-foundation.test.mjs
          git diff --check
      - name: Commit DEV artist banner refinement
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add radio/artists/dev/styles.css radio/artists/dev/index.html radio-admin/artists/dev/index.html radio-admin/artists/dev/app.js radio-admin/artists/dev/styles.css radio-api/tests/artist-foundation.test.mjs
          git commit -m 'Change DEV artist banner to 16x9'
          git push origin main
