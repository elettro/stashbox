name: Apply DEV Playlist Playback

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/apply-dev-playlist-playback.mjs'
      - 'scripts/fix-dev-playlist-patch-source.mjs'
      - 'scripts/apply-dev-account-song-lists-v2.mjs'
      - 'scripts/trigger-dev-account-song-lists.txt'
      - '.github/workflows/apply-dev-playlist-playback.yml'

permissions:
  contents: write

jobs:
  apply-dev-playlist-playback:
    name: Apply DEV playlist playback safely
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Protect DEV-only scope
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "main"
          test -f radio/dev/app.js
          test -f radio/dev/account.js
          test -f radio/dev/notifications.js
          test -f radio/dev/account-song-lists.js
          test ! -e radio/app-playlist-patch.js

      - name: Correct and validate patch generators
        run: |
          set -euo pipefail
          node --check scripts/fix-dev-playlist-patch-source.mjs
          node scripts/fix-dev-playlist-patch-source.mjs
          node --check scripts/apply-dev-playlist-playback.mjs
          node --check scripts/apply-dev-account-song-lists-v2.mjs

      - name: Apply DEV playlist playback patch
        run: |
          set -euo pipefail
          node scripts/apply-dev-playlist-playback.mjs

      - name: Apply DEV favorites and history song lists
        run: |
          set -euo pipefail
          node scripts/apply-dev-account-song-lists-v2.mjs

      - name: Validate generated DEV JavaScript
        run: |
          set -euo pipefail
          node --check radio/dev/app.js
          node --check radio/dev/account.js
          node --check radio/dev/notifications.js
          node --check radio/dev/account-playlist-ui.js
          node --check radio/dev/account-song-lists.js
          grep -F "const STASHBOX_PLAYLIST_PLAY_EVENT = 'stashbox:playlist-play';" radio/dev/app.js
          grep -F "const STASHBOX_ACCOUNT_SONG_PLAY_EVENT = 'stashbox:account-song-play';" radio/dev/app.js
          grep -F "function renderPlaylistDetail(playlist, target)" radio/dev/account.js
          grep -F "startPlaylistPlayback(playPlaylistId, 'ordered')" radio/dev/account.js
          grep -F "startPlaylistPlayback(shufflePlaylistId, 'shuffle')" radio/dev/account.js
          grep -F "activeShuffleSourceKey.startsWith('playlist:')" radio/dev/app.js
          grep -F "[account song playback] started" radio/dev/app.js
          grep -F "account-song-lists.js?v=20260720-songlists2" radio/dev/notifications.js
          grep -F "radio-account-song-thumb" radio/dev/account-song-lists.js

      - name: Reject unexpected file changes
        run: |
          set -euo pipefail
          git diff --check
          unexpected="$(git status --short | awk '{print $2}' | grep -Ev '^(scripts/apply-dev-playlist-playback\.mjs|scripts/apply-dev-account-song-lists-v2\.mjs|radio/dev/app\.js|radio/dev/account\.js|radio/dev/notifications\.js|radio/dev/account-playlist-ui\.js|radio/dev/account-song-lists\.js|radio/dev/PLAYLIST_PLAYBACK_STATUS\.md)$' || true)"
          if [ -n "${unexpected}" ]; then
            echo "Refusing to commit unexpected files:" >&2
            echo "${unexpected}" >&2
            exit 1
          fi
          if git diff --name-only | grep -E '^radio/(app\.js|style\.css)$'; then
            echo 'Refusing to modify the production radio player.' >&2
            exit 1
          fi

      - name: Commit validated DEV account song playback
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            scripts/apply-dev-playlist-playback.mjs \
            scripts/apply-dev-account-song-lists-v2.mjs \
            radio/dev/app.js \
            radio/dev/account.js \
            radio/dev/notifications.js \
            radio/dev/account-playlist-ui.js \
            radio/dev/account-song-lists.js \
            radio/dev/PLAYLIST_PLAYBACK_STATUS.md
          if git diff --cached --quiet; then
            echo 'DEV account song playback is already applied.'
            exit 0
          fi
          git commit -m 'Add DEV favorite and history song playback'
          git push origin HEAD:main
