name: PR Launch Space Jam Video Factory Render

on:
  pull_request:
    paths:
      - '.github/workflows/pr-launch-space-jam-render.yml'

permissions:
  contents: read

jobs:
  launch:
    runs-on: ubuntu-latest
    env:
      API_BASE: https://d21fbe6u80.execute-api.us-east-1.amazonaws.com/dev
      ADMIN_TOKEN: ${{ secrets.STASHBOX_DEV_ADMIN_TOKEN }}
      JOB_ID: 12c9dbea-ce5a-47a7-9f7b-22926c320c07
    steps:
      - name: Launch existing Space Jam render draft
        shell: bash
        run: |
          set -euo pipefail
          BODY=$(mktemp)
          STATUS=$(curl --max-time 30 --silent --show-error \
            -X POST \
            -H 'accept: application/json' \
            -H 'content-type: application/json' \
            -H "x-admin-token: ${ADMIN_TOKEN}" \
            -d '{}' \
            -o "${BODY}" -w '%{http_code}' \
            "${API_BASE}/admin/video-factory/jobs/${JOB_ID}/render")
          cat "${BODY}"
          test "${STATUS}" = '202' || { echo "Render launch returned HTTP ${STATUS}." >&2; exit 1; }
          jq -e '.success == true and (.task_arn | length > 0)' "${BODY}" >/dev/null
