name: One-Time Dispatch Video Factory Renderer DEV

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/one-time-dispatch-video-factory-renderer-dev.yml'

permissions:
  actions: write
  contents: write

jobs:
  dispatch-and-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          show-progress: false

      - name: Dispatch renderer deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run deploy-video-factory-renderer-dev.yml --ref main

      - name: Resolve dispatched run
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            RUN_ID=$(gh run list \
              --workflow deploy-video-factory-renderer-dev.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "${RUN_ID}" ]; then
              echo "run_id=${RUN_ID}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            sleep 2
          done
          echo 'Could not locate the dispatched renderer deployment run.' >&2
          exit 1

      - name: Watch renderer deployment
        id: watch
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        run: gh run watch "${RUN_ID}" --exit-status --interval 10

      - name: Record renderer deployment result
        if: always() && steps.resolve.outputs.run_id != ''
        env:
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
          WATCH_OUTCOME: ${{ steps.watch.outcome }}
        run: |
          set -euo pipefail
          mkdir -p radio-api/docs
          if [ "${WATCH_OUTCOME}" = 'success' ]; then
            STATUS='success'
          else
            STATUS='failure'
          fi
          printf '# Video Factory Renderer TRUE DEV Deployment\n\nStatus: %s\nRun ID: %s\nCommit: %s\nRecorded: %s UTC\nTarget: stashbox-radio-api-dev-v2\n' \
            "${STATUS}" \
            "${RUN_ID}" \
            "${GITHUB_SHA}" \
            "$(date -u +'%Y-%m-%d %H:%M:%S')" \
            > radio-api/docs/VIDEO_FACTORY_RENDERER_TRUE_DEV_DEPLOYED.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add radio-api/docs/VIDEO_FACTORY_RENDERER_TRUE_DEV_DEPLOYED.md
          git commit -m "Record Video Factory renderer DEV deployment ${STATUS}"
          git push origin HEAD:main

      - name: Fail dispatcher when deployment failed
        if: steps.watch.outcome != 'success'
        run: exit 1
