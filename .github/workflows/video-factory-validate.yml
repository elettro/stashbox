name: Temporary Location Folder Type Rollout

on:
  pull_request:
    branches:
      - main
    paths:
      - 'radio-admin/dev/ads/migrations/create_visuals_folders.sql'
  push:
    branches:
      - main
    paths:
      - 'radio/visual-experience/dev/index.html'
      - 'radio-api/index.mjs'
      - 'radio-admin/dev/ads/migrations/create_visuals_folders.sql'
      - 'radio-admin/ads/migrations/create_visuals_folders.sql'

permissions:
  actions: write
  contents: write

jobs:
  apply-location-folder-type:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/video-factory-location-folder-type'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply and validate Location folder type patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/scripts/apply-location-folder-type.py > /tmp/apply-location-folder-type.py
          python /tmp/apply-location-folder-type.py

      - name: Commit feature files
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/video-factory-validate.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add radio/visual-experience/dev/index.html radio-api/index.mjs radio-admin/dev/ads/migrations/create_visuals_folders.sql radio-admin/ads/migrations/create_visuals_folders.sql .github/workflows/video-factory-validate.yml
          git commit -m 'Add Location visual folder type'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  deploy-location-folder-type-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      API_BASE: https://d21fbe6u80.execute-api.us-east-1.amazonaws.com/dev
      ADMIN_TOKEN: ${{ secrets.STASHBOX_DEV_ADMIN_TOKEN }}
    steps:
      - name: Dispatch TRUE DEV Lambda deployment
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run deploy-true-dev-lambda.yml --repo "${GITHUB_REPOSITORY}" --ref main

          RUN_ID=""
          for attempt in $(seq 1 30); do
            RUN_ID=$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow deploy-true-dev-lambda.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 10 \
              --json databaseId,createdAt \
              --jq "map(select(.createdAt >= \"${STARTED_AT}\")) | sort_by(.createdAt) | last | .databaseId // empty")
            [ -n "${RUN_ID}" ] && break
            sleep 5
          done

          test -n "${RUN_ID}" || { echo 'TRUE DEV deployment run could not be located.' >&2; exit 1; }
          echo "TRUE_DEV_DEPLOYMENT_RUN_ID=${RUN_ID}"
          gh run watch "${RUN_ID}" --repo "${GITHUB_REPOSITORY}" --exit-status

      - name: Verify Location folder type end to end
        shell: bash
        run: |
          set -euo pipefail
          NAME="Location Type Verification $(date -u +%Y%m%dT%H%M%SZ)"
          CREATE_RESPONSE=$(curl --fail-with-body --silent --show-error \
            -X POST "${API_BASE}/admin/visuals/folders" \
            -H "x-admin-token: ${ADMIN_TOKEN}" \
            -H 'content-type: application/json' \
            --data "{\"folder_name\":\"${NAME}\",\"folder_type\":\"location\",\"description\":\"Temporary automated verification\",\"status\":\"hidden\",\"priority\":\"low\",\"notes\":\"Delete after verification\",\"relevant_artists\":[],\"relevant_genres\":[],\"relevant_moods\":[],\"relevant_songs\":[]}")

          export CREATE_RESPONSE
          FOLDER_ID=$(node -e "const b=JSON.parse(process.env.CREATE_RESPONSE); if(!b.success||b.folder?.folder_type!=='location'||!b.folder?.id) process.exit(1); process.stdout.write(b.folder.id)")
          echo "LOCATION_FOLDER_CREATED=${FOLDER_ID}"

          curl --fail-with-body --silent --show-error \
            -X DELETE "${API_BASE}/admin/visuals/folders/${FOLDER_ID}" \
            -H "x-admin-token: ${ADMIN_TOKEN}" >/dev/null
          echo 'LOCATION_FOLDER_CREATE_DELETE_VERIFIED=true'
