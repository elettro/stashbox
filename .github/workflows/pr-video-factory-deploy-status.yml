name: PR Video Factory Deployment Status

on:
  pull_request:
    paths:
      - '.github/workflows/pr-video-factory-deploy-status.yml'

permissions:
  actions: read
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: List recent Video Factory deployment runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh run list \
            --repo "${REPOSITORY}" \
            --workflow deploy-video-factory-renderer-dev.yml \
            --limit 5 \
            --json databaseId,status,conclusion,event,createdAt,updatedAt,headSha,url \
            --jq '.'
