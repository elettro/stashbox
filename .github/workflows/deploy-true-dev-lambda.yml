name: Deploy TRUE DEV Lambda

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'radio-api/notifications.mjs'
      - 'radio-api/notification-activity-feed.mjs'
      - 'radio-api/tests/notifications.test.mjs'
      - 'radio-api/tests/notification-activity-feed.test.mjs'

jobs:
  deploy-true-dev-lambda:
    name: Deploy TRUE DEV Lambda code
    runs-on: ubuntu-latest
    env:
      TRUE_DEV_EXPECTED_LAMBDA_FUNCTION_NAME: stashbox-radio-api-dev-v2
      TRUE_DEV_API_BASE: https://d21fbe6u80.execute-api.us-east-1.amazonaws.com/dev
      ADMIN_TOKEN: ${{ secrets.STASHBOX_DEV_ADMIN_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate TRUE DEV deployment target
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TRUE_DEV_LAMBDA_FUNCTION_NAME: ${{ secrets.TRUE_DEV_LAMBDA_FUNCTION_NAME }}
        run: |
          if [ "${TRUE_DEV_LAMBDA_FUNCTION_NAME}" != "${TRUE_DEV_EXPECTED_LAMBDA_FUNCTION_NAME}" ]; then
            echo "Refusing to deploy: TRUE_DEV_LAMBDA_FUNCTION_NAME must exactly equal ${TRUE_DEV_EXPECTED_LAMBDA_FUNCTION_NAME}." >&2
            exit 1
          fi
          if [ "${AWS_REGION}" != "us-east-1" ]; then
            echo "Refusing to deploy: AWS_REGION must exactly equal us-east-1." >&2
            exit 1
          fi

      - name: Check Lambda and notification syntax
        run: |
          node --check radio-api/index.mjs
          node --check radio-api/notifications.mjs
          node --check radio-api/notification-activity-feed.mjs
          node --check radio-api/video-factory/entry.mjs
          node --check radio-api/video-factory/routes.mjs
          node --check radio-api/video-factory/recipe.mjs

      - name: Run notification tests
        run: |
          node --test radio-api/tests/notifications.test.mjs
          node --test radio-api/tests/notification-activity-feed.test.mjs

      - name: Run Video Factory foundation tests
        run: node --test radio-api/tests/video-factory-foundation.test.mjs

      - name: Install production dependencies
        working-directory: radio-api
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci --omit=dev
            else
              npm install --omit=dev
            fi
          else
            echo "radio-api/package.json not found; skipping dependency install."
          fi

      - name: Build TRUE DEV Lambda ZIP
        working-directory: radio-api
        run: |
          rm -rf dist
          mkdir -p dist

          # Keep the existing radio API intact and wrap only private Video Factory routes.
          cp index.mjs radio-main.mjs
          cp video-factory/entry.mjs index.mjs

          node --check index.mjs
          node --check radio-main.mjs

          zip -r dist/true-dev-lambda.zip . \
            -x "dist/*" \
            -x ".git/*" \
            -x "*.zip"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Print target
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TRUE_DEV_LAMBDA_FUNCTION_NAME: ${{ secrets.TRUE_DEV_LAMBDA_FUNCTION_NAME }}
        run: |
          echo "Target AWS region: ${AWS_REGION}"
          echo "Target Lambda function: ${TRUE_DEV_LAMBDA_FUNCTION_NAME}"

      - name: Deploy TRUE DEV Lambda code
        env:
          TRUE_DEV_LAMBDA_FUNCTION_NAME: ${{ secrets.TRUE_DEV_LAMBDA_FUNCTION_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name "${TRUE_DEV_LAMBDA_FUNCTION_NAME}" \
            --zip-file fileb://radio-api/dist/true-dev-lambda.zip

      - name: Wait for Lambda update
        env:
          TRUE_DEV_LAMBDA_FUNCTION_NAME: ${{ secrets.TRUE_DEV_LAMBDA_FUNCTION_NAME }}
        run: |
          aws lambda wait function-updated \
            --function-name "${TRUE_DEV_LAMBDA_FUNCTION_NAME}"

      - name: Check TRUE DEV smoke test syntax
        run: node --check radio-api/scripts/smoke-test-true-dev.mjs

      - name: Run TRUE DEV smoke test
        run: node radio-api/scripts/smoke-test-true-dev.mjs

      - name: Run notification activity smoke test
        run: |
          PUBLIC_STATUS=$(curl --silent --show-error --max-time 45 \
            -o /tmp/notifications-public.json \
            -w '%{http_code}' \
            "${TRUE_DEV_API_BASE}/radio/notifications?limit=100")
          test "${PUBLIC_STATUS}" = '200'
          jq -e '.success == true and (.notifications | type == "array") and (.activity_sync | type == "object")' /tmp/notifications-public.json

          ADMIN_STATUS=$(curl --silent --show-error --max-time 45 \
            -H "x-admin-token: ${ADMIN_TOKEN}" \
            -o /tmp/notifications-admin.json \
            -w '%{http_code}' \
            "${TRUE_DEV_API_BASE}/admin/notifications")
          test "${ADMIN_STATUS}" = '200'
          jq -e '.success == true and (.notifications | type == "array") and (.activity_sync | type == "object")' /tmp/notifications-admin.json
