name: Deploy TRUE DEV Lambda

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-true-dev-lambda.yml'
      - 'radio-api/index.mjs'
      - 'radio-api/package.json'
      - 'radio-api/auth.mjs'
      - 'radio-api/rate-limit.mjs'
      - 'radio-api/account-routes.mjs'
      - 'radio-api/video-factory/entry.mjs'
      - 'radio-api/migrations/20260720_user_accounts_sprint_1a_dev.sql'
      - 'radio-api/notifications.mjs'
      - 'radio-api/notification-activity-feed.mjs'
      - 'radio-api/tests/user-accounts-foundation.test.mjs'
      - 'radio-api/tests/notifications.test.mjs'
      - 'radio-api/tests/notification-activity-feed.test.mjs'

permissions:
  contents: write

jobs:
  deploy-true-dev-lambda:
    name: Deploy TRUE DEV Lambda code
    runs-on: ubuntu-latest
    env:
      TRUE_DEV_EXPECTED_LAMBDA_FUNCTION_NAME: stashbox-radio-api-dev-v2
      TRUE_DEV_API_BASE: https://d21fbe6u80.execute-api.us-east-1.amazonaws.com/dev
      TRUE_DEV_COGNITO_REGION: us-east-1
      TRUE_DEV_COGNITO_USER_POOL_ID: us-east-1_okL8XCVT6
      ADMIN_TOKEN: ${{ secrets.STASHBOX_DEV_ADMIN_TOKEN }}
      DEPLOY_REPORT_BRANCH: automation/true-dev-notification-status

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate TRUE DEV deployment target
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TRUE_DEV_LAMBDA_FUNCTION_NAME: ${{ secrets.TRUE_DEV_LAMBDA_FUNCTION_NAME }}
        run: |
          if [ "${TRUE_DEV_LAMBDA_FUNCTION_NAME}" != "${TRUE_DEV_EXPECTED_LAMBDA_FUNCTION_NAME}" ]; then
            echo "Refusing to deploy: TRUE_DEV_LAMBDA_FUNCTION_NAME must exactly equal ${TRUE_DEV_EXPECTED_LAMBDA_FUNCTION_NAME}." >&2
            exit 1
          fi
          if [ "${AWS_REGION}" != "us-east-1" ]; then
            echo "Refusing to deploy: AWS_REGION must exactly equal us-east-1." >&2
            exit 1
          fi
          if [ "${TRUE_DEV_COGNITO_REGION}" != "us-east-1" ]; then
            echo "Refusing to deploy: TRUE_DEV_COGNITO_REGION must exactly equal us-east-1." >&2
            exit 1
          fi
          if [ "${TRUE_DEV_COGNITO_USER_POOL_ID}" != "us-east-1_okL8XCVT6" ]; then
            echo "Refusing to deploy: unexpected DEV Cognito user pool." >&2
            exit 1
          fi

      - name: Check Lambda, account, notification, and player syntax
        run: |
          node --check radio-api/index.mjs
          node --check radio-api/auth.mjs
          node --check radio-api/rate-limit.mjs
          node --check radio-api/account-routes.mjs
          node --check radio-api/notifications.mjs
          node --check radio-api/notification-activity-feed.mjs
          node --check radio-api/video-factory/entry.mjs
          node --check radio-api/video-factory/routes.mjs
          node --check radio-api/video-factory/recipe.mjs
          node --check radio/dev/account.js
          node --check radio/dev/notifications.js
          node --check radio/dev/notifications-core.js

      - name: Run account foundation tests
        run: node --test radio-api/tests/user-accounts-foundation.test.mjs

      - name: Run notification tests
        run: |
          node --test radio-api/tests/notifications.test.mjs
          node --test radio-api/tests/notification-activity-feed.test.mjs

      - name: Run Video Factory foundation tests
        run: node --test radio-api/tests/video-factory-foundation.test.mjs

      - name: Install production dependencies
        working-directory: radio-api
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci --omit=dev
            else
              npm install --omit=dev
            fi
          else
            echo "radio-api/package.json not found; skipping dependency install."
          fi

      - name: Download DEV Cognito public signing keys
        run: |
          set -euo pipefail
          JWKS_URL="https://cognito-idp.${TRUE_DEV_COGNITO_REGION}.amazonaws.com/${TRUE_DEV_COGNITO_USER_POOL_ID}/.well-known/jwks.json"
          curl --fail --silent --show-error --retry 3 --max-time 45 \
            "${JWKS_URL}" \
            --output radio-api/cognito-jwks-dev.json
          jq -e '
            (.keys | type == "array") and
            (.keys | length >= 2) and
            all(.keys[];
              .kty == "RSA" and
              (.kid | type == "string" and length > 0) and
              (.n | type == "string" and length > 0) and
              (.e | type == "string" and length > 0)
            )
          ' radio-api/cognito-jwks-dev.json >/dev/null
          echo "Validated $(jq '.keys | length' radio-api/cognito-jwks-dev.json) Cognito public signing keys."

      - name: Build TRUE DEV Lambda ZIP
        working-directory: radio-api
        run: |
          rm -rf dist
          mkdir -p dist

          # Keep the existing radio API intact and wrap only private Video Factory and listener account routes.
          cp index.mjs radio-main.mjs
          cp video-factory/entry.mjs index.mjs

          node --check index.mjs
          node --check radio-main.mjs
          test -s cognito-jwks-dev.json

          zip -r dist/true-dev-lambda.zip . \
            -x "dist/*" \
            -x ".git/*" \
            -x "*.zip"

          unzip -l dist/true-dev-lambda.zip | grep -q 'cognito-jwks-dev.json'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Print target
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TRUE_DEV_LAMBDA_FUNCTION_NAME: ${{ secrets.TRUE_DEV_LAMBDA_FUNCTION_NAME }}
        run: |
          echo "Target AWS region: ${AWS_REGION}"
          echo "Target Lambda function: ${TRUE_DEV_LAMBDA_FUNCTION_NAME}"

      - name: Deploy TRUE DEV Lambda code
        env:
          TRUE_DEV_LAMBDA_FUNCTION_NAME: ${{ secrets.TRUE_DEV_LAMBDA_FUNCTION_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name "${TRUE_DEV_LAMBDA_FUNCTION_NAME}" \
            --zip-file fileb://radio-api/dist/true-dev-lambda.zip

      - name: Wait for Lambda update
        env:
          TRUE_DEV_LAMBDA_FUNCTION_NAME: ${{ secrets.TRUE_DEV_LAMBDA_FUNCTION_NAME }}
        run: |
          aws lambda wait function-updated \
            --function-name "${TRUE_DEV_LAMBDA_FUNCTION_NAME}"

      - name: Check TRUE DEV smoke test syntax
        run: node --check radio-api/scripts/smoke-test-true-dev.mjs

      - name: Run TRUE DEV smoke test
        run: node radio-api/scripts/smoke-test-true-dev.mjs

      - name: Run account route smoke test
        run: |
          AUTH_CONFIG_STATUS=$(curl --silent --show-error --max-time 45 \
            -o /tmp/auth-config.json \
            -w '%{http_code}' \
            "${TRUE_DEV_API_BASE}/radio/auth/config")
          test "${AUTH_CONFIG_STATUS}" = '200'
          jq -e '.success == true and (.auth | type == "object")' /tmp/auth-config.json

          ME_STATUS=$(curl --silent --show-error --max-time 45 \
            -o /tmp/account-me-unauthorized.json \
            -w '%{http_code}' \
            "${TRUE_DEV_API_BASE}/radio/me")
          test "${ME_STATUS}" = '401'
          jq -e '.success == false and .code == "AUTH_REQUIRED"' /tmp/account-me-unauthorized.json

      - name: Run notification activity smoke test
        id: notification_smoke
        run: |
          PUBLIC_STATUS=$(curl --silent --show-error --max-time 45 \
            -o /tmp/notifications-public.json \
            -w '%{http_code}' \
            "${TRUE_DEV_API_BASE}/radio/notifications?limit=100")
          test "${PUBLIC_STATUS}" = '200'
          jq -e '.success == true and (.notifications | type == "array") and (.activity_sync | type == "object")' /tmp/notifications-public.json

          ADMIN_STATUS=$(curl --silent --show-error --max-time 45 \
            -H "x-admin-token: ${ADMIN_TOKEN}" \
            -o /tmp/notifications-admin.json \
            -w '%{http_code}' \
            "${TRUE_DEV_API_BASE}/admin/notifications")
          test "${ADMIN_STATUS}" = '200'
          jq -e '.success == true and (.notifications | type == "array") and (.activity_sync | type == "object")' /tmp/notifications-admin.json

          echo "public_status=${PUBLIC_STATUS}" >> "$GITHUB_OUTPUT"
          echo "admin_status=${ADMIN_STATUS}" >> "$GITHUB_OUTPUT"

      - name: Publish DEV notification verification report
        run: |
          set -euo pipefail
          REPORT_PATH='radio-api/docs/TRUE_DEV_NOTIFICATION_ACTIVITY_STATUS.md'
          ACTIVITY_COUNT=$(jq '[.notifications[] | select(.source_type == "activity_engine")] | length' /tmp/notifications-public.json)
          TOTAL_COUNT=$(jq '.count // 0' /tmp/notifications-public.json)
          SYNC_RESULT=$(jq -c '.activity_sync // {}' /tmp/notifications-public.json)

          mkdir -p "$(dirname "${REPORT_PATH}")"
          {
            echo '# TRUE DEV Notification Activity Status'
            echo
            echo "- Verified: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo '- Result: PASS'
            echo '- Target Lambda: `stashbox-radio-api-dev-v2`'
            echo '- Production Lambda touched: No'
            echo "- Public notifications HTTP: ${{ steps.notification_smoke.outputs.public_status }}"
            echo "- Admin notifications HTTP: ${{ steps.notification_smoke.outputs.admin_status }}"
            echo "- Total active public notifications: ${TOTAL_COUNT}"
            echo "- Active automatic like/share notifications: ${ACTIVITY_COUNT}"
            echo "- Activity sync result: \`${SYNC_RESULT}\`"
            echo '- Account auth config route HTTP: 200'
            echo '- Protected account route without token HTTP: 401'
            echo '- Cognito JWT signing keys bundled for private-VPC verification: Yes'
            echo '- Rate limit: 10 automatic activity notifications per clock hour'
            echo '- Duplicate protection: one notification per song and activity type within 30 minutes'
            echo '- Listener identity exposed: No'
            echo
            echo '## Automatic activity notifications'
            echo '```json'
            jq '[.notifications[] | select(.source_type == "activity_engine") | {headline, message, action_url, publish_at, expires_at}]' /tmp/notifications-public.json
            echo '```'
          } > "${REPORT_PATH}"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B "${DEPLOY_REPORT_BRANCH}"
          git add "${REPORT_PATH}"
          git commit -m 'Record TRUE DEV notification activity status'
          git push --force origin "${DEPLOY_REPORT_BRANCH}"
