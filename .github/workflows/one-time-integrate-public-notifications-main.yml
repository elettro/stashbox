name: One-Time Integrate Public Notifications Branch

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/one-time-integrate-public-notifications-main.yml'

permissions:
  contents: write

jobs:
  integrate-feature-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Patch and test feature branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin agent/public-notifications-foundation
          git checkout -B agent/public-notifications-foundation origin/agent/public-notifications-foundation
          python3 radio-api/scripts/integrate-public-notifications.py
          node --check radio-api/index.mjs
          node --check radio-api/notifications.mjs
          node --check radio-admin/notifications/dev/app.js
          node --check radio/dev/notifications.js
          node --test radio-api/tests/notifications.test.mjs
          git rm -f .github/workflows/one-time-integrate-public-notifications.yml
          git rm -f .github/workflows/one-time-integrate-public-notifications-pr.yml
          git rm -f radio-api/scripts/integrate-public-notifications.py
          git add radio-api/index.mjs radio-api/notifications.mjs radio-admin radio/dev/index.html
          git commit -m 'Integrate public notification foundation'
          git push origin HEAD:agent/public-notifications-foundation

      - name: Remove one-time main workflow
        shell: bash
        run: |
          set -euo pipefail
          git checkout main
          git pull --rebase origin main
          git rm .github/workflows/one-time-integrate-public-notifications-main.yml
          git commit -m 'Remove one-time notification integration workflow'
          git push origin HEAD:main
