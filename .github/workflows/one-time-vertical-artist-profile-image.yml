name: One-time vertical artist profile image integration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-vertical-artist-profile-image.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply targeted integration patch
        run: node scripts/apply-vertical-artist-profile-image.mjs

      - name: Validate JavaScript and artist tests
        run: |
          node --check radio-api/artist-routes.mjs
          node --check radio-admin/artists/dev/app.js
          node --check radio/dev/v2/artist/artist.js
          node --test radio-api/tests/artist-foundation.test.mjs

      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radio-api/artist-routes.mjs \
                  radio-api/migrations/20260723_artist_vertical_profile_image_dev.sql \
                  radio-api/tests/artist-foundation.test.mjs \
                  radio-admin/artists/dev/index.html \
                  radio-admin/artists/dev/app.js \
                  radio-admin/artists/dev/styles.css \
                  radio/dev/v2/artist/index.html \
                  radio/dev/v2/artist/artist.js \
                  radio/dev/v2/artist/artist.css
          git diff --cached --quiet && exit 0
          git commit -m "Add vertical artist profile image support"
          git push

# One-time trigger revision: 2
