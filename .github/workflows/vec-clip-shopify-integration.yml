name: VEC Clip Shopify Integration

on:
  push:
    branches:
      - agent/vec-clip-shopify-products
    paths:
      - '.github/workflows/vec-clip-shopify-integration.yml'
      - 'radio-api/scripts/inspect-clip-commerce-targets.mjs'
      - 'radio-api/scripts/apply-clip-shopify-integration.mjs'
      - 'radio/dev/clip-commerce.mjs'
      - 'radio-api/tests/clip-commerce-state.test.mjs'
  pull_request:
    branches:
      - agent/vec-clip-shopify-products
    paths:
      - 'radio-api/scripts/vec-clip-shopify-trigger.txt'

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/vec-clip-shopify-products
          fetch-depth: 0

      - name: Capture integration anchors
        run: node radio-api/scripts/inspect-clip-commerce-targets.mjs > radio-api/scripts/vec-clip-shopify-inspection.txt

      - name: Run clip commerce unit tests
        run: node --test radio-api/tests/clip-commerce-state.test.mjs

      - name: Commit inspection output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radio-api/scripts/vec-clip-shopify-inspection.txt
          if git diff --cached --quiet; then
            echo "Inspection output unchanged."
          else
            git commit -m "Capture VEC clip commerce integration anchors [skip ci]"
            git push origin HEAD:agent/vec-clip-shopify-products
          fi
