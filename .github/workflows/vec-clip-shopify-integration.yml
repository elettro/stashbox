name: VEC Clip Shopify Integration

on:
  push:
    branches:
      - agent/vec-clip-shopify-products
    paths:
      - '.github/workflows/vec-clip-shopify-integration.yml'
      - 'radio-api/scripts/apply_clip_shopify_api.py'
      - 'radio-api/scripts/apply_clip_shopify_cms.py'
      - 'radio-api/scripts/apply_clip_shopify_player.py'
      - 'radio/dev/clip-commerce.mjs'
      - 'radio-api/tests/clip-commerce-state.test.mjs'
  pull_request:
    branches:
      - agent/vec-clip-shopify-products
    paths:
      - 'radio-api/scripts/vec-clip-shopify-trigger.txt'

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/vec-clip-shopify-products
          fetch-depth: 0

      - name: Install API dependencies
        run: npm install --prefix radio-api --no-audit --no-fund

      - name: Scope API patch to folder assets
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          path = Path('radio-api/scripts/apply_clip_shopify_api.py')
          source = path.read_text(encoding='utf-8')
          pattern = r"if 'shopify_product_urls: mediaType ===' not in api:\n.*?\n\napi = api\.replace\("
          replacement = '''if 'shopify_product_urls: mediaType ===' not in api:
              block_start = api.index('function normalizeVisualsFolderAsset(row) {')
              block_end = api.index('\\n}\\n\\nasync function getVisualsFolderAssets', block_start)
              asset_block = api[block_start:block_end]
              asset_block = replace_once(
                  asset_block,
                  "    notes: row.notes || '',\\n    created_at: row.created_at || '',",
                  "    notes: row.notes || '',\\n    shopify_product_urls: mediaType === 'clip' ? normalizeClipShopifyProductUrls(row.shopify_product_urls).urls : [],\\n    shopifyProductUrls: mediaType === 'clip' ? normalizeClipShopifyProductUrls(row.shopify_product_urls).urls : [],\\n    created_at: row.created_at || '',",
                  'return clip Shopify URLs from asset API',
              )
              api = api[:block_start] + asset_block + api[block_end:]

          api = api.replace('''
          updated, count = re.subn(pattern, replacement, source, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'API patch anchor hotfix expected 1 match, found {count}')
          path.write_text(updated, encoding='utf-8')
          PY

      - name: Apply API and schema integration
        id: api_patch
        continue-on-error: true
        run: python radio-api/scripts/apply_clip_shopify_api.py > radio-api/scripts/clip-shopify-api-patch.log 2>&1

      - name: Publish API patch diagnostics
        if: steps.api_patch.outcome == 'failure'
        run: |
          cat radio-api/scripts/clip-shopify-api-patch.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radio-api/scripts/clip-shopify-api-patch.log
          git commit -m "Capture clip Shopify API patch failure [skip ci]"
          git push origin HEAD:agent/vec-clip-shopify-products
          exit 1

      - name: Apply VEC CMS integration
        run: python radio-api/scripts/apply_clip_shopify_cms.py

      - name: Apply DEV player integration
        run: python radio-api/scripts/apply_clip_shopify_player.py

      - name: Validate whitespace and syntax
        run: |
          git diff --check
          node --check radio-api/index.mjs
          node --check radio/dev/app.js
          python -m py_compile radio-api/scripts/apply_clip_shopify_api.py radio-api/scripts/apply_clip_shopify_cms.py radio-api/scripts/apply_clip_shopify_player.py

      - name: Run clip commerce and routing tests
        run: node --test radio-api/tests/clip-commerce-state.test.mjs radio-api/tests/clip-shopify-integration-source.test.mjs radio-api/tests/visual-folder-assets-routing.test.mjs

      - name: Commit integrated DEV feature
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            radio-api/scripts/apply_clip_shopify_api.py \
            radio-api/index.mjs \
            radio-admin/dev/ads/migrations/create_visuals_folder_assets.sql \
            radio-api/db/dev/CREATE_RADIO_DEV_SCHEMA.sql \
            radio/visual-experience/dev/index.html \
            radio/dev/app.js \
            radio-api/tests/clip-shopify-integration-source.test.mjs
          git rm -f --ignore-unmatch radio-api/scripts/clip-shopify-api-patch.log
          if git diff --cached --quiet; then
            echo "Feature integration is already current."
          else
            git commit -m "Wire VEC clip Shopify products in DEV [skip ci]"
            git push origin HEAD:agent/vec-clip-shopify-products
          fi
