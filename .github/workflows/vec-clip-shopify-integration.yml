name: VEC Clip Shopify Finalize

on:
  push:
    branches:
      - agent/vec-clip-shopify-products
    paths:
      - '.github/workflows/vec-clip-shopify-integration.yml'
  pull_request:
    branches:
      - agent/vec-clip-shopify-products
    paths:
      - 'radio-api/scripts/vec-clip-shopify-trigger.txt'

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/vec-clip-shopify-products
          fetch-depth: 0

      - name: Install API dependencies
        run: npm install --prefix radio-api --no-audit --no-fund

      - name: Optimize clip product loading and CMS errors
        run: |
          python - <<'PY'
          from pathlib import Path

          player_path = Path('radio/dev/app.js')
          player = player_path.read_text(encoding='utf-8')

          if 'function preloadSpecificProductUrls' not in player:
              anchor = "\nasync function fetchFallbackProducts() {"
              helper = '''
function preloadSpecificProductUrls(value) {
  normalizeCommerceProductUrls(value).forEach((url, index) => {
    const handle = productUrlHandle(url);
    if (!handle) return;
    fetchSpecificProduct(url, index, handle).catch(error => {
      console.warn('[Stashbox Radio Dev] clip product preload failed', { url, error: error?.message || error });
    });
  });
}
'''
              if player.count(anchor) != 1:
                  raise SystemExit('Specific product preload anchor was not unique.')
              player = player.replace(anchor, helper + anchor, 1)

          old_start = """    let alive = true;
    setProducts([]);
    async function loadProducts() {"""
          new_start = """    let alive = true;
    const immediateProducts = productSource === 'random'
      ? []
      : requestedProductUrls.map((url, index) => productFromUrl(url, index));
    setProducts(dedupeProductList(immediateProducts).slice(0, PRODUCT_POOL_LIMIT));
    async function loadProducts() {"""
          if old_start in player:
              player = player.replace(old_start, new_start, 1)

          old_fallback = """      let fallback = [];
      try {
        fallback = rotateBySeed(await fetchFallbackProducts(), selected?.title).slice(0, PRODUCT_POOL_LIMIT);
      } catch (error) {
        console.warn('Unable to load fallback products.', error.message || error);
      }
      if (productSource === 'random') return fallback;"""
          new_fallback = """      let fallback = Array.isArray(cachedStoreProducts)
        ? rotateBySeed(cachedStoreProducts, selected?.title).slice(0, PRODUCT_POOL_LIMIT)
        : [];
      if (productSource === 'random') {
        if (!fallback.length) {
          try {
            fallback = rotateBySeed(await fetchFallbackProducts(), selected?.title).slice(0, PRODUCT_POOL_LIMIT);
          } catch (error) {
            console.warn('Unable to load fallback products.', error.message || error);
          }
        }
        return fallback;
      }"""
          if old_fallback in player:
              player = player.replace(old_fallback, new_fallback, 1)

          preload_anchor = """  const playbackStartMs = useMemo(() => Date.now(), [selected?.idx, mediaMode, activeVideoEmbedUrl]);

  useEffect(() => {
    onActiveVisualChange?.(activeVisualIsClip ? activeVisualAsset : null);"""
          preload_effect = """  const playbackStartMs = useMemo(() => Date.now(), [selected?.idx, mediaMode, activeVideoEmbedUrl]);

  useEffect(() => {
    const productUrls = (visualSequenceState.assets || []).flatMap(asset => asset?.shopifyProductUrls || asset?.shopify_product_urls || []);
    preloadSpecificProductUrls(productUrls);
  }, [visualSequenceState.songKey, visualSequenceState.assets]);

  useEffect(() => {
    onActiveVisualChange?.(activeVisualIsClip ? activeVisualAsset : null);"""
          if preload_anchor in player:
              player = player.replace(preload_anchor, preload_effect, 1)

          player_path.write_text(player, encoding='utf-8')

          cms_path = Path('radio/visual-experience/dev/index.html')
          cms = cms_path.read_text(encoding='utf-8')
          cms = cms.replace(
              "catch(error){console.error(error);mediaMessage('Could not save asset details.','error')}",
              "catch(error){console.error(error);mediaMessage(error.message||'Could not save asset details.','error')}",
              1,
          )
          cms_path.write_text(cms, encoding='utf-8')

          test_path = Path('radio-api/tests/clip-shopify-integration-source.test.mjs')
          test_source = test_path.read_text(encoding='utf-8')
          if 'preloadSpecificProductUrls' not in test_source:
              test_source = test_source.replace(
                  "  assert.match(player, /clipCommerceState/);",
                  "  assert.match(player, /clipCommerceState/);\n  assert.match(player, /preloadSpecificProductUrls/);\n  assert.doesNotMatch(player, /specific\\.concat\\(fallback\\)/);",
                  1,
              )
          test_path.write_text(test_source, encoding='utf-8')
          PY

      - name: Validate final feature
        run: |
          git diff --check
          node --check radio-api/index.mjs
          node --check radio/dev/app.js
          node --test radio-api/tests/clip-commerce-state.test.mjs radio-api/tests/clip-shopify-integration-source.test.mjs radio-api/tests/visual-folder-assets-routing.test.mjs

      - name: Remove temporary integration tooling and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radio/dev/app.js radio/visual-experience/dev/index.html radio-api/tests/clip-shopify-integration-source.test.mjs
          git rm -f \
            .github/workflows/vec-clip-shopify-integration.yml \
            radio-api/scripts/apply_clip_shopify_api.py \
            radio-api/scripts/apply_clip_shopify_cms.py \
            radio-api/scripts/apply_clip_shopify_player.py \
            radio-api/scripts/inspect-clip-commerce-targets.mjs \
            radio-api/scripts/vec-clip-shopify-inspection.txt
          git commit -m "Finalize VEC clip Shopify products in DEV [skip ci]"
          git push origin HEAD:agent/vec-clip-shopify-products
