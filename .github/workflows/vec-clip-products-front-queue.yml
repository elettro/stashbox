name: VEC Clip Products Front Queue

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/triggers/vec-clip-products-front-queue.txt'

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply clip product front queue fix
        run: python radio-api/scripts/apply-clip-product-front-queue.py

      - name: Validate front queue behavior
        run: |
          git diff --check
          node --check radio/dev/app.js
          node --check radio/dev/clip-commerce.mjs
          node --test radio-api/tests/clip-commerce-state.test.mjs
          node --test radio-api/tests/clip-shopify-integration-source.test.mjs

      - name: Commit tested front queue fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radio/dev/app.js radio/dev/clip-commerce.mjs radio-api/tests/clip-commerce-state.test.mjs radio-api/tests/clip-shopify-integration-source.test.mjs
          git rm radio-api/scripts/apply-clip-product-front-queue.py .github/triggers/vec-clip-products-front-queue.txt
          git commit -m "Promote new clip products to front of merch rail"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
