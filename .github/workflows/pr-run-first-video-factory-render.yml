name: PR Run First Video Factory Render

on:
  pull_request:
    paths:
      - '.github/workflows/pr-run-first-video-factory-render.yml'
      - '.github/scripts/run-first-video-factory-render.mjs'
      - 'radio-api/docs/VIDEO_FACTORY_FIRST_RENDER_TRIGGER.md'

permissions:
  contents: read

jobs:
  run-first-render:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      AWS_REGION: us-east-1
      API_BASE: https://d21fbe6u80.execute-api.us-east-1.amazonaws.com/dev
      ADMIN_TOKEN: ${{ secrets.STASHBOX_DEV_ADMIN_TOKEN }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECS service-linked role exists
        shell: bash
        run: |
          set +e
          RESULT=$(aws iam create-service-linked-role --aws-service-name ecs.amazonaws.com 2>&1)
          CODE=$?
          set -e
          if [ "${CODE}" -eq 0 ]; then
            echo "ECS service-linked role created."
          elif echo "${RESULT}" | grep -Eqi 'already exists|has been taken'; then
            echo "ECS service-linked role already exists."
          else
            echo "${RESULT}" >&2
            exit "${CODE}"
          fi

      - name: Fetch first-render runner
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: curl --fail --silent --show-error --location "https://raw.githubusercontent.com/elettro/stashbox/${HEAD_SHA}/.github/scripts/run-first-video-factory-render.mjs" --output /tmp/run-first-video-factory-render.mjs

      - name: Create, launch, and verify first Space Jam render
        run: node /tmp/run-first-video-factory-render.mjs
