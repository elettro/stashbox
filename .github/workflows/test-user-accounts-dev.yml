name: Test DEV User Accounts

on:
  pull_request:
    paths:
      - 'radio-api/auth.mjs'
      - 'radio-api/rate-limit.mjs'
      - 'radio-api/account-routes.mjs'
      - 'radio-api/account-lifecycle.mjs'
      - 'radio-api/artist-routes.mjs'
      - 'radio-api/artist-follow-routes.mjs'
      - 'radio-api/notifications.mjs'
      - 'radio-api/notification-activity-feed.mjs'
      - 'radio-api/personalized-notifications.mjs'
      - 'radio-api/video-factory/entry.mjs'
      - 'radio-api/package.json'
      - 'radio-api/migrations/20260720_user_accounts_sprint_1a_dev.sql'
      - 'radio-api/migrations/20260721_artist_foundation_follow_system_dev.sql'
      - 'radio-api/tests/user-accounts-foundation.test.mjs'
      - 'radio-api/tests/artist-foundation.test.mjs'
      - 'radio-api/tests/notifications.test.mjs'
      - 'radio-api/tests/notification-activity-feed.test.mjs'
      - 'radio-api/tests/personalized-notifications.test.mjs'
      - 'radio-api/tests/shared-dev-admin-header.test.mjs'
      - 'radio/dev/account.js'
      - 'radio/dev/account-password-policy.js'
      - 'radio/dev/account-dashboard-ui.js'
      - 'radio/dev/account-following-stat.js'
      - 'radio/dev/account.css'
      - 'radio/dev/notifications.js'
      - 'radio/dev/notifications-core.js'
      - 'radio/dev/artist-follow.js'
      - 'radio/dev/artist-metadata-layout.js'
      - 'radio/dev/artist-queue-handoff.js'
      - 'radio-admin/dev/shared-admin-header.js'
      - 'radio-admin/dev/index.html'
      - 'radio-admin/songs/dev/index.html'
      - 'radio-admin/artists/dev/**'
      - 'radio/visual-experience/dev/index.html'
      - 'radio-admin/dev/vec/index.html'
      - 'radio-admin/dev/video-factory/index.html'
      - 'radio-admin/ads/dev/index.html'
      - 'radio-admin/dev/ads/index.html'
      - 'radio-admin/notifications/dev/index.html'
      - 'radio/dashboard/dev/index.html'
      - 'radio/artists/dev/**'
      - 'infra/user-accounts/**'
      - '.github/workflows/test-user-accounts-dev.yml'
  push:
    branches:
      - main
    paths:
      - 'radio-api/account-lifecycle.mjs'
      - 'radio-api/artist-routes.mjs'
      - 'radio-api/artist-follow-routes.mjs'
      - 'radio-api/notifications.mjs'
      - 'radio-api/notification-activity-feed.mjs'
      - 'radio-api/personalized-notifications.mjs'
      - 'radio-api/video-factory/entry.mjs'
      - 'radio-api/tests/user-accounts-foundation.test.mjs'
      - 'radio-api/tests/artist-foundation.test.mjs'
      - 'radio-api/tests/notifications.test.mjs'
      - 'radio-api/tests/notification-activity-feed.test.mjs'
      - 'radio-api/tests/personalized-notifications.test.mjs'
      - 'radio-api/tests/shared-dev-admin-header.test.mjs'
      - 'radio/dev/account-dashboard-ui.js'
      - 'radio/dev/account-following-stat.js'
      - 'radio/dev/artist-follow.js'
      - 'radio/dev/artist-metadata-layout.js'
      - 'radio/dev/artist-queue-handoff.js'
      - 'radio/dev/notifications.js'
      - 'radio/dev/notifications-core.js'
      - 'radio-admin/dev/shared-admin-header.js'
      - 'radio-admin/dev/index.html'
      - 'radio-admin/songs/dev/index.html'
      - 'radio-admin/artists/dev/**'
      - 'radio/visual-experience/dev/index.html'
      - 'radio-admin/dev/vec/index.html'
      - 'radio-admin/dev/video-factory/index.html'
      - 'radio-admin/ads/dev/index.html'
      - 'radio-admin/dev/ads/index.html'
      - 'radio-admin/notifications/dev/index.html'
      - 'radio/dashboard/dev/index.html'
      - 'radio/artists/dev/**'
      - '.github/workflows/test-user-accounts-dev.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-user-accounts:
    name: Validate DEV accounts, artists, notifications, and shared admin UI without deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Lambda production dependencies
        working-directory: radio-api
        run: npm install --omit=dev

      - name: Check JavaScript syntax
        run: |
          node --check radio-api/auth.mjs
          node --check radio-api/rate-limit.mjs
          node --check radio-api/account-routes.mjs
          node --check radio-api/account-lifecycle.mjs
          node --check radio-api/artist-routes.mjs
          node --check radio-api/artist-follow-routes.mjs
          node --check radio-api/notifications.mjs
          node --check radio-api/notification-activity-feed.mjs
          node --check radio-api/personalized-notifications.mjs
          node --check radio-api/video-factory/entry.mjs
          node --check radio/dev/account.js
          node --check radio/dev/account-password-policy.js
          node --check radio/dev/account-dashboard-ui.js
          node --check radio/dev/account-following-stat.js
          node --check radio/dev/notifications.js
          node --check radio/dev/notifications-core.js
          node --check radio/dev/artist-follow.js
          node --check radio/dev/artist-metadata-layout.js
          node --check radio/dev/artist-queue-handoff.js
          node --check radio-admin/artists/dev/app.js
          node --check radio/artists/dev/app.js
          node --check radio/artists/dev/follow-session-fix.js
          node --check radio-admin/dev/shared-admin-header.js

      - name: Verify auth module loads
        working-directory: radio-api
        run: node -e "import('./auth.mjs').then(() => console.log('auth module loaded'))"

      - name: Run account foundation tests
        run: node --test radio-api/tests/user-accounts-foundation.test.mjs

      - name: Run artist foundation tests
        run: node --test radio-api/tests/artist-foundation.test.mjs

      - name: Run notification tests
        run: |
          node --test radio-api/tests/notifications.test.mjs
          node --test radio-api/tests/notification-activity-feed.test.mjs
          node --test radio-api/tests/personalized-notifications.test.mjs

      - name: Run shared DEV admin header tests
        run: node --test radio-api/tests/shared-dev-admin-header.test.mjs

      - name: Confirm production paths remain untouched
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only origin/main...HEAD > /tmp/account-files.txt
          else
            git diff --name-only HEAD^...HEAD > /tmp/account-files.txt
          fi
          if grep -E '^(radio/app\.js|radio/index\.html|radio-api/env/prod|infra/.*/prod)' /tmp/account-files.txt; then
            echo 'Production-facing file changed in DEV account, artist, or notification work.' >&2
            exit 1
          fi
          echo 'No production-facing player or infrastructure files changed.'
