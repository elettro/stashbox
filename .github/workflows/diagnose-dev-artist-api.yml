name: Diagnose DEV Artist API

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-dev-artist-api.yml'
      - 'radio-api/docs/RUN_DEV_ARTIST_API_DIAGNOSTIC.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe DEV API and CORS
        shell: bash
        run: |
          set -euo pipefail
          API='https://d21fbe6u80.execute-api.us-east-1.amazonaws.com/dev'
          report='radio-api/docs/DEV_ARTIST_API_DIAGNOSTIC.md'
          probe() {
            local name="$1" url="$2"
            local headers body status
            headers="$(mktemp)"; body="$(mktemp)"
            status="$(curl -sS --connect-timeout 15 --max-time 30 -D "$headers" -o "$body" -w '%{http_code}' "$url" || true)"
            {
              echo "## $name"
              echo
              echo "- URL: \`$url\`"
              echo "- HTTP: \`$status\`"
              echo "- Access-Control-Allow-Origin: \`$(awk 'BEGIN{IGNORECASE=1}/^access-control-allow-origin:/{gsub(/\r/,""); sub(/^[^:]+:[ ]*/,""); print; exit}' "$headers")\`"
              echo
              echo '```json'
              head -c 1000 "$body" || true
              echo
              echo '```'
              echo
            } >> "$report"
          }
          cat > "$report" <<'EOF'
          # DEV Artist API Diagnostic

          Production touched: No

          EOF
          probe 'Artist profile' "$API/radio/artists/stashbox"
          probe 'Song catalog' "$API/radio/songs"
          headers="$(mktemp)"; body="$(mktemp)"
          status="$(curl -sS --connect-timeout 15 --max-time 30 -X OPTIONS \
            -H 'Origin: https://stashbox.com' \
            -H 'Access-Control-Request-Method: GET' \
            -H 'Access-Control-Request-Headers: authorization,x-cognito-id-token,x-admin-token,content-type' \
            -D "$headers" -o "$body" -w '%{http_code}' "$API/radio/artists/stashbox" || true)"
          {
            echo '## CORS preflight'
            echo
            echo "- HTTP: \`$status\`"
            echo "- Allow-Origin: \`$(awk 'BEGIN{IGNORECASE=1}/^access-control-allow-origin:/{gsub(/\r/,""); sub(/^[^:]+:[ ]*/,""); print; exit}' "$headers")\`"
            echo "- Allow-Headers: \`$(awk 'BEGIN{IGNORECASE=1}/^access-control-allow-headers:/{gsub(/\r/,""); sub(/^[^:]+:[ ]*/,""); print; exit}' "$headers")\`"
            echo
          } >> "$report"
          headers="$(mktemp)"; body="$(mktemp)"
          status="$(curl -sS --connect-timeout 15 --max-time 30 -X POST \
            -H 'Origin: https://stashbox.com' -H 'Content-Type: application/json' \
            -d '{"song_key":"artist-diagnostic-profile","song_name":"Artist diagnostic","artist":"Diagnostic","purpose":"artwork","filename":"test.png","content_type":"image/png"}' \
            -D "$headers" -o "$body" -w '%{http_code}' "$API/admin/uploads/presign" || true)"
          {
            echo '## Upload presign reachability'
            echo
            echo "- HTTP: \`$status\` (401/403 is acceptable without admin token; network failure is not)"
            echo "- Allow-Origin: \`$(awk 'BEGIN{IGNORECASE=1}/^access-control-allow-origin:/{gsub(/\r/,""); sub(/^[^:]+:[ ]*/,""); print; exit}' "$headers")\`"
            echo
            echo '```json'
            head -c 1000 "$body" || true
            echo
            echo '```'
          } >> "$report"
      - name: Commit report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add radio-api/docs/DEV_ARTIST_API_DIAGNOSTIC.md
          git commit -m 'Record DEV artist API diagnostic' || exit 0
          git push
