name: VEC Lab Product Cart Badges

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/triggers/vec-lab-product-cart-badges.txt'

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply VEC Lab cart badge enhancement
        run: python radio-api/scripts/apply-vec-lab-product-cart-badges.py

      - name: Validate cart badge behavior
        run: |
          set +e
          {
            git diff --check
            node --check radio-admin/dev/vec/vec-controller.js
            node --test radio-api/tests/vec-lab-product-cart-badges.test.mjs
          } > vec-lab-badge-validation.log 2>&1
          STATUS=$?
          cat vec-lab-badge-validation.log
          exit ${STATUS}

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vec-lab-badge-validation
          path: vec-lab-badge-validation.log
          if-no-files-found: ignore

      - name: Commit tested VEC Lab enhancement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radio-admin/dev/vec/vec-controller.js radio-admin/dev/styles.css radio-api/tests/vec-lab-product-cart-badges.test.mjs
          git rm radio-api/scripts/apply-vec-lab-product-cart-badges.py .github/triggers/vec-lab-product-cart-badges.txt
          git commit -m "Add VEC Lab product cart badges"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
