name: One-Time Sync Video Factory Navigation

on:
  push:
    branches:
      - agent/video-factory-mvp
    paths:
      - '.github/workflows/one-time-sync-video-factory-nav.yml'

permissions:
  contents: write

jobs:
  sync-navigation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/video-factory-mvp

      - name: Update DEV CMS navigation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          files = [
              'radio-admin/dev/index.html',
              'radio-admin/songs/dev/index.html',
              'radio-admin/dev/vec/index.html',
              'radio-admin/ads/dev/index.html',
              'radio-admin/dev/ads/index.html',
              'radio/dashboard/dev/index.html',
              'radio/visual-experience/dev/index.html',
              'radio-admin/dev/video-factory/index.html',
          ]

          video_factory_anchor = '<a href="/radio-admin/dev/video-factory/">Video Factory</a>'
          vec_pattern = re.compile(r'<a\b[^>]*href="/radio-admin/dev/vec/"[^>]*>VEC Lab</a>')
          changed = []

          for filename in files:
              path = Path(filename)
              if not path.exists():
                  raise SystemExit(f'Missing expected CMS page: {filename}')

              original = path.read_text(encoding='utf-8')
              text = original.replace('>Visual Library</a>', '>Video Library</a>')

              if '/radio-admin/dev/video-factory/' not in text:
                  multiline_pattern = re.compile(
                      r'^(?P<indent>[ \t]*)(?P<anchor><a\b[^>]*href="/radio-admin/dev/vec/"[^>]*>VEC Lab</a>)$',
                      re.MULTILINE,
                  )
                  match = multiline_pattern.search(text)
                  if match:
                      indent = match.group('indent')
                      replacement = f"{indent}{match.group('anchor')}\n{indent}{video_factory_anchor}"
                      text = multiline_pattern.sub(replacement, text, count=1)
                  else:
                      text, count = vec_pattern.subn(lambda m: m.group(0) + video_factory_anchor, text, count=1)
                      if count != 1:
                          raise SystemExit(f'Could not locate VEC Lab navigation anchor in {filename}')

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(filename)

          print('Updated files:')
          for filename in changed:
              print(f'- {filename}')
          PY

      - name: Commit navigation updates
        run: |
          if git diff --quiet; then
            echo "Navigation already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            radio-admin/dev/index.html \
            radio-admin/songs/dev/index.html \
            radio-admin/dev/vec/index.html \
            radio-admin/ads/dev/index.html \
            radio-admin/dev/ads/index.html \
            radio/dashboard/dev/index.html \
            radio/visual-experience/dev/index.html \
            radio-admin/dev/video-factory/index.html
          git commit -m "Add Video Library and Video Factory to DEV CMS navigation"
          git push origin HEAD:agent/video-factory-mvp
