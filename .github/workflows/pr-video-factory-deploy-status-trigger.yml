name: PR Video Factory Deployment Status Trigger

on:
  pull_request:
    paths:
      - '.github/workflows/pr-video-factory-deploy-status-trigger.yml'

permissions:
  actions: read
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Extract compact failed verification
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: '29691446658'
        run: |
          set -euo pipefail
          gh run view "${RUN_ID}" --repo "${REPOSITORY}" --log-failed \
            | sed 's/\x1b\[[0-9;]*m//g' \
            | grep -E 'stashbox-video-factory-renderer-dev|Internal Server Error|Video Factory infrastructure endpoint returned|INFRA_STATUS|curl:|AccessDenied|Task timed out|Timeout|timed out|statusCode|configured|cluster_status|output_bucket|\{"message"|\{"success"|Process completed with exit code' \
            | tail -n 60
