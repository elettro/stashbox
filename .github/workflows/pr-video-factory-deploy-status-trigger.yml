name: PR Video Factory Deployment Status Trigger

on:
  pull_request:
    paths:
      - '.github/workflows/pr-video-factory-deploy-status-trigger.yml'

permissions:
  actions: read
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Extract failed deployment verification
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: '29691446658'
        run: |
          set -euo pipefail
          echo 'RUN_SUMMARY'
          gh run view "${RUN_ID}" \
            --repo "${REPOSITORY}" \
            --json databaseId,status,conclusion,createdAt,updatedAt,url,jobs \
            --jq '{databaseId,status,conclusion,createdAt,updatedAt,url,jobs:[.jobs[]|{name,conclusion,steps:[.steps[]|select(.conclusion=="failure")]}]}'
          echo 'FAILED_LOG_TAIL'
          gh run view "${RUN_ID}" \
            --repo "${REPOSITORY}" \
            --log-failed | tail -n 180
