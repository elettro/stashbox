name: Apply Shared DEV Admin Header

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-shared-dev-admin-header.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  standardize-dev-admin-headers:
    name: Attach one shared header to every DEV admin page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Insert shared header loader
        shell: python
        run: |
          from pathlib import Path
          import re

          files = [
              Path('radio-admin/dev/index.html'),
              Path('radio-admin/songs/dev/index.html'),
              Path('radio-admin/artists/dev/index.html'),
              Path('radio/visual-experience/dev/index.html'),
              Path('radio-admin/dev/vec/index.html'),
              Path('radio-admin/dev/video-factory/index.html'),
              Path('radio-admin/ads/dev/index.html'),
              Path('radio-admin/dev/ads/index.html'),
              Path('radio-admin/notifications/dev/index.html'),
              Path('radio/dashboard/dev/index.html'),
          ]
          script_tag = '  <script src="/radio-admin/dev/shared-admin-header.js?v=20260721-shared-header1" defer></script>\n'
          pattern = re.compile(r'\s*<script\s+src=["\']/radio-admin/dev/shared-admin-header\.js[^>]*></script>\s*', re.I)

          for path in files:
              if not path.exists():
                  raise SystemExit(f'Missing expected DEV admin page: {path}')
              text = path.read_text(encoding='utf-8')
              text = pattern.sub('\n', text)
              if '</body>' not in text:
                  raise SystemExit(f'Missing closing body tag: {path}')
              text = text.replace('</body>', f'{script_tag}</body>', 1)
              path.write_text(text, encoding='utf-8')
              print(f'Attached shared header: {path}')

      - name: Validate shared header and page coverage
        run: |
          node --check radio-admin/dev/shared-admin-header.js
          python - <<'PY'
          from pathlib import Path

          files = [
              'radio-admin/dev/index.html',
              'radio-admin/songs/dev/index.html',
              'radio-admin/artists/dev/index.html',
              'radio/visual-experience/dev/index.html',
              'radio-admin/dev/vec/index.html',
              'radio-admin/dev/video-factory/index.html',
              'radio-admin/ads/dev/index.html',
              'radio-admin/dev/ads/index.html',
              'radio-admin/notifications/dev/index.html',
              'radio/dashboard/dev/index.html',
          ]
          needle = '/radio-admin/dev/shared-admin-header.js?v=20260721-shared-header1'
          for filename in files:
              text = Path(filename).read_text(encoding='utf-8')
              count = text.count(needle)
              if count != 1:
                  raise SystemExit(f'{filename} expected one shared-header loader, found {count}')
          shared = Path('radio-admin/dev/shared-admin-header.js').read_text(encoding='utf-8')
          expected_order = ["label: 'Songs'", "label: 'Video Library'", "label: 'VEC Lab'", "label: 'Video Factory'", "label: 'Ads'", "label: 'Artists'", "label: 'Notifications'", "label: 'Dashboard'", "label: 'Radio Dev'"]
          positions = [shared.index(item) for item in expected_order]
          if positions != sorted(positions):
              raise SystemExit('Shared DEV admin navigation order is incorrect.')
          print('Shared DEV admin header coverage and button order verified.')
          PY

      - name: Commit standardized pages
        run: |
          if git diff --quiet; then
            echo 'All DEV admin pages already use the shared header.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            radio-admin/dev/index.html \
            radio-admin/songs/dev/index.html \
            radio-admin/artists/dev/index.html \
            radio/visual-experience/dev/index.html \
            radio-admin/dev/vec/index.html \
            radio-admin/dev/video-factory/index.html \
            radio-admin/ads/dev/index.html \
            radio-admin/dev/ads/index.html \
            radio-admin/notifications/dev/index.html \
            radio/dashboard/dev/index.html
          git commit -m 'Standardize DEV admin headers across CMS pages'
          git push origin HEAD:main
