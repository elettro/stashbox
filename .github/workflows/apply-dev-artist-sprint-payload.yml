name: Apply DEV Artist Sprint Payload

on:
  workflow_dispatch:
  push:
    branches:
      - dev/artist-foundation-sprint-1a
    paths:
      - '.artist-sprint-payload/**'
      - '.github/workflows/apply-dev-artist-sprint-payload.yml'
      - 'radio-api/docs/ARTIST_SPRINT_PAYLOAD_TRIGGER.md'

permissions:
  contents: write

jobs:
  apply-dev-artist-sprint:
    name: Reconstruct and validate DEV artist sprint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sprint branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lock workflow to DEV sprint branch
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "dev/artist-foundation-sprint-1a"
          test -f radio/dev/app.js
          test -f radio-api/video-factory/entry.mjs
          test ! -e radio-admin/artists/index.html

      - name: Reconstruct and verify payload
        run: |
          set -euo pipefail
          cat .artist-sprint-payload/chunk-* | base64 --decode > /tmp/artist-sprint-payload.tgz
          echo "2e2b290443b5f4a33a2cdd25a64c3a6deccc2e175c1fbc6a4a56e31fa9b52a0e  /tmp/artist-sprint-payload.tgz" | sha256sum --check
          if tar -tzf /tmp/artist-sprint-payload.tgz | grep -E '(^/|(^|/)\.\.(/|$))'; then
            echo 'Unsafe archive path detected.' >&2
            exit 1
          fi
          tar -xzf /tmp/artist-sprint-payload.tgz -C .
          rm -f radio-api/video-factory-entry.mjs

      - name: Validate generated JavaScript
        run: |
          set -euo pipefail
          node --check radio-api/artist-routes.mjs
          node --check radio-api/video-factory/entry.mjs
          node --check radio-admin/artists/dev/app.js
          node --check radio/artists/dev/app.js
          node --check radio/dev/artist-follow.js
          node --check radio/dev/notifications.js
          grep -F "isArtistRequest" radio-api/video-factory/entry.mjs
          grep -F "artist-follow.js?v=20260721-artist1" radio/dev/notifications.js

      - name: Run artist and account tests
        working-directory: radio-api
        run: |
          set -euo pipefail
          node --test tests/artist-foundation.test.mjs
          node --test tests/user-accounts-foundation.test.mjs
          npm run check

      - name: Enforce DEV-only change scope
        run: |
          set -euo pipefail
          git diff --check
          if ! git diff --quiet -- radio/app.js radio/style.css radio/index.html; then
            echo 'Refusing to modify the production radio player.' >&2
            exit 1
          fi
          unexpected="$(git status --short | awk '{print $2}' | grep -Ev '^(.github/workflows/test-artist-foundation-dev\.yml|radio-api/artist-routes\.mjs|radio-api/migrations/20260721_artist_foundation_follow_system_dev\.sql|radio-api/tests/artist-foundation\.test\.mjs|radio-api/docs/ARTIST_FOUNDATION_SPRINT_1A\.md|radio-api/video-factory/entry\.mjs|radio-api/package\.json|radio-admin/artists/dev/.*|radio/artists/dev/.*|radio/dev/artist-follow\.js|radio/dev/notifications\.js)$' || true)"
          if [ -n "${unexpected}" ]; then
            echo 'Refusing unexpected generated files:' >&2
            echo "${unexpected}" >&2
            exit 1
          fi

      - name: Commit validated DEV artist foundation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .github/workflows/test-artist-foundation-dev.yml \
            radio-api/artist-routes.mjs \
            radio-api/migrations/20260721_artist_foundation_follow_system_dev.sql \
            radio-api/tests/artist-foundation.test.mjs \
            radio-api/docs/ARTIST_FOUNDATION_SPRINT_1A.md \
            radio-api/video-factory/entry.mjs \
            radio-api/package.json \
            radio-admin/artists/dev \
            radio/artists/dev \
            radio/dev/artist-follow.js \
            radio/dev/notifications.js
          if git diff --cached --quiet; then
            echo 'DEV artist sprint payload is already applied.'
            exit 0
          fi
          git commit -m 'Add DEV artist foundation and follow system'
          git push origin HEAD:dev/artist-foundation-sprint-1a
