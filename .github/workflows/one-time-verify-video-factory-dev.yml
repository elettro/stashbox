name: One-Time Verify Video Factory DEV

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/one-time-verify-video-factory-dev.yml'

permissions:
  contents: write

jobs:
  verify-video-factory:
    runs-on: ubuntu-latest
    env:
      ADMIN_TOKEN: ${{ secrets.STASHBOX_DEV_ADMIN_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Verify live Video Factory page
        id: page
        run: |
          curl --fail --silent --show-error --location --retry 4 --retry-delay 5 \
            https://stashbox.com/radio-admin/dev/video-factory/ \
            --output /tmp/video-factory.html
          grep -q 'Video Factory' /tmp/video-factory.html

      - name: Verify private Video Factory API
        id: api
        run: |
          curl --fail --silent --show-error --location --retry 4 --retry-delay 5 \
            -H "x-admin-token: ${ADMIN_TOKEN}" \
            https://d21fbe6u80.execute-api.us-east-1.amazonaws.com/dev/admin/video-factory/summary \
            --output /tmp/video-factory-summary.json
          grep -q '"success":true' /tmp/video-factory-summary.json

      - name: Record verification result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PAGE_OUTCOME: ${{ steps.page.outcome }}
          API_OUTCOME: ${{ steps.api.outcome }}
        run: |
          printf '# Video Factory TRUE DEV Verification\n\nStatus: %s\nPage: %s\nAPI: %s\nCommit: %s\nRecorded: %s UTC\n' "$JOB_STATUS" "$PAGE_OUTCOME" "$API_OUTCOME" "$GITHUB_SHA" "$(date -u +'%Y-%m-%d %H:%M:%S')" > radio-api/docs/VIDEO_FACTORY_TRUE_DEV_VERIFIED.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add radio-api/docs/VIDEO_FACTORY_TRUE_DEV_VERIFIED.md
          git commit -m "Record Video Factory TRUE DEV verification ${JOB_STATUS}"
          git push
