name: Monitor VEC Clip Shopify DEV Release

on:
  push:
    branches:
      - main
    paths:
      - '.github/triggers/monitor-vec-clip-shopify-dev.txt'

permissions:
  actions: read
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Capture relevant workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p docs
          {
            echo '# VEC clip Shopify DEV release monitor'
            echo
            echo 'Generated by GitHub Actions.'
            echo
            echo '```json'
            gh run list \
              --repo "${REPOSITORY}" \
              --limit 40 \
              --json databaseId,name,event,status,conclusion,headSha,createdAt,updatedAt,url,workflowName \
              --jq '[.[] | select((.workflowName // .name) | test("VEC Clip Shopify|TRUE DEV|Trigger VEC Clip Shopify"; "i"))]'
            echo '```'
          } > docs/vec-clip-shopify-dev-monitor.md

      - name: Commit monitor report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/vec-clip-shopify-dev-monitor.md
          git commit -m "Monitor VEC clip Shopify DEV release [skip ci]"
          git push origin HEAD:main
